<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>50/50 - Le Jeu du Dilemme Parfait (Local)</title>
  <style>
    /* Styles conservés à l'identique */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; color: #333; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; color: white; }
    .header h1 { font-size: 48px; font-weight: 800; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
    .header .subtitle { font-size: 18px; opacity: 0.95; }
    .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin-bottom: 20px; }
    .scenario-card { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; text-align: center; padding: 40px 30px; }
    .scenario-text { font-size: 24px; font-weight: 600; line-height: 1.4; margin-bottom: 15px; word-wrap: break-word; }
    .scenario-label { font-size: 14px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .phase-indicator { display: flex; justify-content: space-between; margin-bottom: 25px; gap: 10px; }
    .phase-step { flex: 1; text-align: center; padding: 12px; background: #f5f5f5; border-radius: 12px; font-size: 13px; font-weight: 600; color: #999; transition: all 0.3s; }
    .phase-step.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; transform: scale(1.05); }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 14px; }
    input, textarea { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; font-family: inherit; transition: border-color 0.3s; }
    input:focus, textarea:focus { outline: none; border-color: #667eea; }
    textarea { resize: vertical; min-height: 100px; }
    button { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); }
    button.secondary { background: #6c757d; margin-top: 10px; }
    .proposal-item { background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 2px solid transparent; transition: all 0.3s; }
    .vote-buttons { display: flex; gap: 10px; margin-top: 15px; }
    .vote-btn { flex: 1; padding: 12px; border: 2px solid; background: white; border-radius: 10px; font-weight: 700; cursor: pointer; transition: all 0.3s; font-size: 16px; }
    .vote-btn.yes { border-color: #10b981; color: #10b981; }
    .vote-btn.yes.selected { background: #10b981; color: white; }
    .vote-btn.no { border-color: #ef4444; color: #ef4444; }
    .vote-btn.no.selected { background: #ef4444; color: white; }
    .result-item { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 3px solid #e0e0e0; position: relative; }
    .result-item.winner { border-color: #fbbf24; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }
    .winner-badge { position: absolute; top: 15px; right: 15px; background: #fbbf24; color: #92400e; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .vote-bar-container { position: relative; height: 30px; background: #e0e0e0; border-radius: 15px; overflow: hidden; margin: 10px 0; }
    .vote-bar { position: absolute; left: 0; top: 0; height: 100%; background: #10b981; transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 12px; }
    .vote-bar-no { position: absolute; right: 0; top: 0; height: 100%; background: #ef4444; transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 12px; }
    .info-box { background: #eff6ff; border-left: 4px solid #3b82f6; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; color: #1e40af; }
    .error-box { background: #fee; border-left: 4px solid #ef4444; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; color: #991b1b; }
    .countdown { text-align: center; font-size: 14px; color: #666; margin-top: 15px; font-weight: 600; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>50/50</h1>
    <div class="subtitle">Le jeu du dilemme parfait - Local</div>
  </div>
  <div id="app"></div>
</div>

<script type="module">
  // ========== UTILITAIRES ==========
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function sanitizeUsername(name) {
    return (name || '').trim().slice(0, 20);
  }

  function generateId() {
    return Math.random().toString(36).substring(2, 9);
  }

  const SCENARIOS = [
    "Vous gagnez 10 millions d'euros", "Vous pouvez voler comme un oiseau",
    "Vous avez la capacité de lire dans les pensées", "Vous découvrez le secret de l'immortalité",
    "Vous devenez instantanément célèbre", "Vous avez une santé parfaite"
  ];

  const LOCAL_GAME_KEY = "game50_local_storage";
  const PHASE_DURATION = { propose: 60000, vote: 30000 }; // Durées réduites pour test local

  class Game {
    constructor() {
      this.displayName = null;
      this.currentGame = null;
      this.errorMessage = null;
      this.init();
    }

    init() {
      const savedName = sessionStorage.getItem('game50_playerName');
      if (savedName) this.displayName = savedName;

      const savedGame = localStorage.getItem(LOCAL_GAME_KEY);
      if (savedGame) this.currentGame = JSON.parse(savedGame);

      this.render();
      setInterval(() => this.checkPhaseTimeout(), 1000);
    }

    render() {
      const appDiv = document.getElementById('app');
      if (!this.displayName) {
        appDiv.innerHTML = this.renderNameEntry();
      } else if (!this.currentGame) {
        appDiv.innerHTML = this.renderLobby();
      } else {
        switch (this.currentGame.phase) {
          case 'waiting': appDiv.innerHTML = this.renderWaitingPhase(); break;
          case 'propose': appDiv.innerHTML = this.renderProposePhase(); break;
          case 'vote': appDiv.innerHTML = this.renderVotePhase(); break;
          case 'results': appDiv.innerHTML = this.renderResults(); break;
        }
      }
      this.attachEventListeners();
    }

    // --- LOGIQUE DE JEU ---
    saveState() {
      localStorage.setItem(LOCAL_GAME_KEY, JSON.stringify(this.currentGame));
      this.render();
    }

    createRoom() {
      this.currentGame = {
        scenario: '',
        phase: 'waiting',
        host: this.displayName,
        proposals: [],
        votes: {},
        createdAt: Date.now()
      };
      this.saveState();
    }

    startGame() {
      this.currentGame.phase = 'propose';
      this.currentGame.scenario = SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)];
      this.currentGame.phaseStartTime = Date.now();
      this.saveState();
    }

    submitProposal(text) {
      if (!text.trim()) return;
      const proposal = {
        id: generateId(),
        author: this.displayName,
        text: text.trim()
      };
      this.currentGame.proposals.push(proposal);
      this.saveState();
    }

    submitVote(proposalId, vote) {
      if (!this.currentGame.votes[proposalId]) {
        this.currentGame.votes[proposalId] = { yes: 0, no: 0 };
      }
      this.currentGame.votes[proposalId][vote]++;
      this.saveState();
    }

    checkPhaseTimeout() {
      if (!this.currentGame || this.currentGame.phase === 'waiting' || this.currentGame.phase === 'results') return;
      
      const elapsed = Date.now() - this.currentGame.phaseStartTime;
      if (this.currentGame.phase === 'propose' && elapsed > PHASE_DURATION.propose) {
        this.currentGame.phase = 'vote';
        this.currentGame.phaseStartTime = Date.now();
        this.saveState();
      } else if (this.currentGame.phase === 'vote' && elapsed > PHASE_DURATION.vote) {
        this.currentGame.phase = 'results';
        this.calculateResults();
        this.saveState();
      }
      
      const timer = document.getElementById('timerDisplay');
      if (timer) {
        const total = this.currentGame.phase === 'propose' ? PHASE_DURATION.propose : PHASE_DURATION.vote;
        const rem = Math.max(0, Math.floor((total - elapsed) / 1000));
        timer.innerText = `⏱️ Temps restant : ${rem}s`;
      }
    }

    calculateResults() {
      this.currentGame.results = this.currentGame.proposals.map(p => {
        const v = this.currentGame.votes[p.id] || { yes: 0, no: 0 };
        const total = v.yes + v.no;
        const percent = total > 0 ? (v.yes / total * 100) : 0;
        return { ...p, yesPercent: percent, totalVotes: total };
      }).sort((a, b) => Math.abs(50 - a.yesPercent) - Math.abs(50 - b.yesPercent));
    }

    // --- RENDU TEMPLATES ---
    renderNameEntry() {
      return `
        <div class="card">
          <h2>Bienvenue !</h2>
          <div class="input-group"><label>Ton pseudo</label>
          <input type="text" id="playerName" placeholder="Ex: Joueur01"></div>
          <button id="btnSaveName">Commencer</button>
        </div>`;
    }

    renderLobby() {
      return `
        <div class="card">
          <h2>Menu Local</h2>
          <div class="info-box">Bonjour ${escapeHtml(this.displayName)} !</div>
          <button id="btnCreate">Créer une partie</button>
        </div>`;
    }

    renderWaitingPhase() {
      return `
        <div class="card">
          <h2>Salon d'attente</h2>
          <button id="btnStart">▶️ Démarrer la partie</button>
          <button id="btnReset" class="secondary">Quitter</button>
        </div>`;
    }

    renderProposePhase() {
      return `
        <div class="card scenario-card">
          <div class="scenario-label">Scénario</div>
          <div class="scenario-text">${escapeHtml(this.currentGame.scenario)}</div>
        </div>
        <div class="card">
          <div class="phase-step active">1. Proposition</div>
          <div class="input-group">
            <label>Ta contrepartie (Dilemme)</label>
            <textarea id="txtProposal" placeholder="Mais..."></textarea>
          </div>
          <button id="btnSubmitProposal">Envoyer</button>
          <div class="countdown" id="timerDisplay"></div>
        </div>`;
    }

    renderVotePhase() {
      const proposal = this.currentGame.proposals[0] || { text: "Pas de proposition", id: '0' };
      return `
        <div class="card">
          <h2>Votez !</h2>
          <div class="proposal-item">
            <p>"... ${escapeHtml(proposal.text)}"</p>
            <div class="vote-buttons">
              <button class="vote-btn yes" onclick="window.game.submitVote('${proposal.id}', 'yes')">J'ACCEPTE</button>
              <button class="vote-btn no" onclick="window.game.submitVote('${proposal.id}', 'no')">JE REFUSE</button>
            </div>
          </div>
          <div class="countdown" id="timerDisplay"></div>
        </div>`;
    }

    renderResults() {
      return `
        <div class="card">
          <h2>Résultats</h2>
          ${(this.currentGame.results || []).map((r, i) => `
            <div class="result-item ${i === 0 ? 'winner' : ''}">
              ${i === 0 ? '<span class="winner-badge">Le plus proche du 50/50 !</span>' : ''}
              <p><strong>${escapeHtml(r.author)}</strong> : ${escapeHtml(r.text)}</p>
              <div class="vote-bar-container">
                <div class="vote-bar" style="width: ${r.yesPercent}%">${Math.round(r.yesPercent)}%</div>
              </div>
            </div>
          `).join('')}
          <button id="btnReset">Nouvelle partie</button>
        </div>`;
    }

    attachEventListeners() {
      const btnSaveName = document.getElementById('btnSaveName');
      if (btnSaveName) btnSaveName.onclick = () => {
        const val = sanitizeUsername(document.getElementById('playerName').value);
        if (val) { this.displayName = val; sessionStorage.setItem('game50_playerName', val); this.render(); }
      };

      const btnCreate = document.getElementById('btnCreate');
      if (btnCreate) btnCreate.onclick = () => this.createRoom();

      const btnStart = document.getElementById('btnStart');
      if (btnStart) btnStart.onclick = () => this.startGame();

      const btnSubmitProposal = document.getElementById('btnSubmitProposal');
      if (btnSubmitProposal) btnSubmitProposal.onclick = () => {
        this.submitProposal(document.getElementById('txtProposal').value);
      };

      const btnReset = document.getElementById('btnReset');
      if (btnReset) btnReset.onclick = () => {
        localStorage.removeItem(LOCAL_GAME_KEY);
        this.currentGame = null;
        this.render();
      };
    }
  }

  window.game = new Game();
</script>
</body>
</html>
