<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>50/50 - Édition Neo-Pop Party</title>

  <link rel="icon" type="image/png" href="logo.png">

  <style>
    /* ===== RESET & FONTS ===== */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    /* ===== BACKGROUND ANIMÉ ===== */
    body {
      background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #e94560);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      padding: 20px;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ===== CONTAINER RESPONSIVE ===== */
    .container { width: 100%; max-width: 650px; margin: auto; }

    /* ===== HEADER ===== */
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 {
      font-size: 56px; font-weight: 900; margin-bottom: 5px;
      background: -webkit-linear-gradient(0deg, #ff00cc, #3333ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0px 4px 10px rgba(255, 0, 204, 0.3));
    }
    .header .subtitle { font-size: 18px; font-weight: 600; color: #a0aec0; letter-spacing: 2px; text-transform: uppercase; }
    .round-pill {
      display: inline-block; margin-top: 12px; padding: 6px 18px; border-radius: 20px;
      background: rgba(0, 242, 254, 0.12); border: 1px solid rgba(0, 242, 254, 0.4);
      color: #00f2fe; font-weight: 800; font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
    }

    /* ===== GLASSMORPHISM CARDS ===== */
    .card {
      background: rgba(25, 30, 50, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 35px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3); margin-bottom: 25px; transition: transform 0.3s ease;
    }

    /* ===== SCÉNARIOS ET RÈGLES ===== */
    .scenario-card {
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
      color: #1a1a2e; text-align: center; padding: 40px 30px; position: relative; overflow: hidden; border: none;
      box-shadow: 0 15px 35px rgba(255, 154, 158, 0.3);
    }
    .scenario-text { font-size: 26px; font-weight: 800; line-height: 1.4; margin-bottom: 15px; word-wrap: break-word; }
    .scenario-label { font-size: 14px; opacity: 0.8; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 15px; }

    .secret-rule-box {
      margin-top: 25px; padding: 15px; background: #1a1a2e; color: #fff; border-radius: 12px; border: 2px dashed #ff00cc;
      box-shadow: 0 0 15px rgba(255, 0, 204, 0.2); animation: pulseRule 2s infinite;
    }
    .secret-rule-title { font-weight: 900; color: #ff00cc; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; font-size: 13px; }
    @keyframes pulseRule { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 204, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 204, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 204, 0); } }

    /* ===== RÈGLES DU JEU (ACCUEIL) ===== */
    .rules-box {
      background: rgba(0, 0, 0, 0.2);
      border: 2px dashed rgba(0, 242, 254, 0.4);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 30px;
    }
    .rules-box h3 { color: #00f2fe; text-align: center; font-weight: 900; margin-bottom: 5px; font-size: 22px; }
    .rules-list { list-style: none; margin-top: 15px; }
    .rules-list li { margin-bottom: 12px; font-size: 15px; line-height: 1.4; color: #cbd5e1; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; }
    .rules-list li strong { color: #fff; }

    /* ===== INPUTS & TEXTAREA ===== */
    .input-group { margin-bottom: 25px; }
    label { display: block; margin-bottom: 10px; font-weight: 600; color: #cbd5e1; font-size: 14px; }
    input, textarea {
      width: 100%; padding: 18px; background: rgba(0, 0, 0, 0.2); color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 16px; font-size: 16px; transition: all 0.3s;
    }
    input::placeholder, textarea::placeholder { color: #64748b; }
    input:focus, textarea:focus { outline: none; border-color: #00f2fe; background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }
    textarea { resize: vertical; min-height: 120px; }

    /* ===== BOUTONS ===== */
    button {
      width: 100%; padding: 18px; background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
      color: white; border: none; border-radius: 16px; font-size: 18px; font-weight: 800; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); text-transform: uppercase; letter-spacing: 1px;
      box-shadow: 0 10px 20px rgba(0, 114, 255, 0.3);
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0, 114, 255, 0.4); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
    button.secondary { background: rgba(255,255,255,0.1); box-shadow: none; margin-top: 10px; border: 1px solid rgba(255,255,255,0.2); }
    button.secondary:hover { background: rgba(255,255,255,0.2); }
    button.ghost { background: transparent; box-shadow: none; border: 1px solid rgba(255,255,255,0.15); color: #cbd5e1; font-size: 14px; padding: 14px; }
    button.ghost:hover { background: rgba(255,255,255,0.06); transform: none; }

    /* ===== VOTES ===== */
    .vote-buttons { display: flex; gap: 15px; margin-top: 25px; }
    .vote-btn { flex: 1; padding: 20px 10px; background: rgba(0,0,0,0.3); border: 2px solid; border-radius: 16px; font-weight: 800; font-size: 18px; box-shadow: none; }
    .vote-btn.yes { border-color: #00e676; color: #00e676; }
    .vote-btn.yes:active { background: #00e676; color: #1a1a2e; }
    .vote-btn.no { border-color: #ff1744; color: #ff1744; }
    .vote-btn.no:active { background: #ff1744; color: #1a1a2e; }

    /* ===== RÉSULTATS & ANIMATIONS ===== */
    .result-item { background: rgba(0, 0, 0, 0.2); border-radius: 16px; padding: 25px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
    .result-item.winner { border: 2px solid #ffd700; background: rgba(255, 215, 0, 0.05); box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }
    .winner-badge { position: absolute; top: -12px; right: 20px; background: #ffd700; color: #000; padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: 900; text-transform: uppercase; box-shadow: 0 4px 10px rgba(255, 215, 0, 0.4); }

    .vote-bar-container { position: relative; height: 40px; background: rgba(255, 23, 68, 0.2); border-radius: 20px; overflow: hidden; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
    .vote-bar-fill { position: absolute; left: 0; top: 0; height: 100%; background: linear-gradient(90deg, #00e676, #1de9b6); width: 0%; transition: width 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; align-items: center; padding-left: 15px; color: #000; font-weight: 900; font-size: 16px; }

    .points-tag { display:inline-block; margin-top: 14px; padding: 6px 14px; border-radius: 20px; background: rgba(255,215,0,0.12); border:1px solid rgba(255,215,0,0.4); color:#ffd700; font-weight:800; font-size:13px; }

    .author-reveal-btn { background: rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 12px; font-size: 14px; margin-top: 15px; box-shadow: none; }
    .author-reveal-btn:hover { background: rgba(255,255,255,0.2); transform: none; }

    .author-info { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; }
    .author-title { font-size: 14px; font-weight: 800; color: #cbd5e1; text-transform: uppercase; letter-spacing: 2px; }

    /* Roulette Animations */
    .roulette-box { font-size: 32px; font-weight: 900; color: #00f2fe; height: 50px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
    .roulette-blur { filter: blur(2px); opacity: 0.7; transform: scale(1.05); transition: 0.1s; }
    .author-reveal-final { animation: tada 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: #ffd700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }

    @keyframes tada {
      0% { transform: scale(1); }
      10%, 20% { transform: scale(0.9) rotate(-3deg); }
      30%, 50%, 70%, 90% { transform: scale(1.1) rotate(3deg); }
      40%, 60%, 80% { transform: scale(1.1) rotate(-3deg); }
      100% { transform: scale(1) rotate(0); }
    }

    .fade-in-up { animation: fadeInUp 0.6s ease forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== CLASSEMENT ===== */
    .leaderboard { margin-bottom: 30px; }
    .leaderboard h3 { color:#ffd700; text-align:center; font-weight:900; font-size:20px; margin-bottom:15px; text-transform:uppercase; letter-spacing:1px; }
    .lb-row { display:flex; align-items:center; gap:12px; background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.05); border-radius:14px; padding:12px 16px; margin-bottom:10px; }
    .lb-row.lead { border-color: rgba(255,215,0,0.5); background: rgba(255,215,0,0.06); }
    .lb-rank { font-weight:900; font-size:18px; width:34px; text-align:center; }
    .lb-name { flex:1; font-weight:700; font-size:16px; }
    .lb-score { font-weight:900; font-size:18px; color:#00f2fe; }

    .podium { display:flex; justify-content:center; align-items:flex-end; gap:12px; margin: 10px 0 30px; }
    .podium-col { flex:1; max-width:140px; text-align:center; }
    .podium-bar { border-radius:14px 14px 0 0; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; padding:12px 6px; font-weight:900; }
    .podium-name { font-weight:800; font-size:15px; margin-bottom:8px; word-wrap:break-word; }
    .podium-score { font-size:13px; color:#cbd5e1; font-weight:700; }

    /* ===== DIVERS ===== */
    .info-box { background: rgba(0, 198, 255, 0.1); border-left: 4px solid #00c6ff; padding: 15px 20px; border-radius: 0 12px 12px 0; margin-bottom: 25px; font-size: 15px; color: #e2e8f0; font-weight: 600; }
    .info-box.alert { background: rgba(255, 23, 68, 0.2); border-left-color: #ff1744; }
    .player-tag { display: inline-flex; align-items:center; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 16px; border-radius: 20px; margin: 5px; font-weight: 600; font-size: 14px; transition: all 0.2s; }
    .player-tag:hover { background: rgba(255, 23, 68, 0.2); border-color: #ff1744; }
    .player-tag .remove-x { cursor:pointer; color:#ff1744; margin-left:10px; font-weight:900; }
    .transition-screen { text-align: center; padding: 60px 20px; }
    .transition-icon { font-size: 80px; margin-bottom: 30px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>50/50</h1>
    <div class="subtitle">Party Édition 📱</div>
    <div id="roundPill"></div>
  </div>
  <div id="app"></div>
</div>

<script type="module">
  // ==========================================
  // SYSTÈME DE JUICE : AUDIO & VIBRATIONS NATIVES
  // ==========================================
  let audioCtx = null;

  function initInteraction() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'click') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'tick') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(800, now);
      gain.gain.setValueAtTime(0.05, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
      osc.start(now); osc.stop(now + 0.05);
    } else if (type === 'tada') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.setValueAtTime(600, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.5);
      osc.start(now); osc.stop(now + 0.5);
    }
  }

  function vibrate(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  // ==========================================
  // UTILITAIRES
  // ==========================================
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div'); div.textContent = text; return div.innerHTML;
  }
  function generateId() { return Math.random().toString(36).substring(2, 9); }

  const MIN_PLAYERS = 3; // En dessous de 3, un 50/50 est mathématiquement impossible
  const STORAGE_KEY = 'jeu5050_state_v1';

  const SCENARIOS = [
    "Vous gagnez 10 millions d'euros",
    "Vous pouvez voler comme un oiseau",
    "Vous lisez dans les pensées de tout le monde",
    "Vous découvrez le secret de l'immortalité",
    "Vous devenez la personne la plus célèbre du monde",
    "Vous avez une santé parfaite jusqu'à 100 ans",
    "Vous pouvez vous téléporter n'importe où",
    "Vous parlez et comprenez tous les animaux",
    "Vous pouvez arrêter le temps quand vous voulez",
    "Vous devenez invisible à volonté",
    "Vous parlez couramment toutes les langues du monde",
    "Vous ne dormez plus jamais mais restez en pleine forme",
    "Vous pouvez manger tout ce que vous voulez sans grossir",
    "Vous gagnez au loto chaque semaine pendant 10 ans",
    "Vous avez une mémoire parfaite et infaillible",
    "Vous devenez le meilleur du monde dans le sport de votre choix",
    "Vous pouvez revivre une journée de votre passé",
    "Vous ne ressentez plus jamais la peur",
    "Vous possédez une maison de rêve dans chaque pays",
    "Vous pouvez guérir les gens d'un simple toucher"
  ];

  const SECRET_RULES = [
    "La contrepartie doit obligatoirement impliquer un animal.",
    "La contrepartie doit être liée à la nourriture.",
    "La contrepartie doit impliquer un changement physique visible.",
    "La contrepartie doit être extrêmement embarrassante en public.",
    "La contrepartie doit faire intervenir un membre de ta famille.",
    "La contrepartie doit te ruiner financièrement.",
    "La contrepartie doit contenir le mot 'Toujours' ou 'Jamais'.",
    "La contrepartie doit se produire chaque matin au réveil.",
    "La contrepartie doit concerner ton téléphone ou les réseaux sociaux.",
    "La contrepartie doit impliquer une odeur.",
    "La contrepartie doit durer toute ta vie.",
    "La contrepartie doit être un secret que personne ne doit jamais découvrir."
  ];

  // ==========================================
  // LOGIQUE DU JEU
  // ==========================================
  class Game {
    constructor() {
      this.players = [];        // [{ id, name, score }]
      this.phase = 'setup';
      this.round = 0;
      this.usedScenarios = [];  // anti-répétition
      this.currentPlayerIndex = 0;
      this.currentVoteIndex = 0;
      this.scenario = '';
      this.secretRule = null;
      this.proposals = [];
      this.votes = {};
      this.results = [];
      this.load();
      this.render();
    }

    /* ---------- Persistance (localStorage) ---------- */
    save() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          players: this.players, phase: this.phase, round: this.round,
          usedScenarios: this.usedScenarios, currentPlayerIndex: this.currentPlayerIndex,
          currentVoteIndex: this.currentVoteIndex, scenario: this.scenario,
          secretRule: this.secretRule, proposals: this.proposals, votes: this.votes, results: this.results
        }));
      } catch (e) { /* stockage indisponible : on continue sans sauvegarde */ }
    }

    load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        Object.assign(this, JSON.parse(raw));
      } catch (e) { /* sauvegarde corrompue ou indisponible : on ignore */ }
    }

    /* ---------- Saut des propositions dont on est l'auteur ---------- */
    firstVotableIndex(playerId) {
      return this.proposals.findIndex(p => p.authorId !== playerId);
    }
    nextVotableIndex(playerId, fromIndex) {
      for (let i = fromIndex; i < this.proposals.length; i++) {
        if (this.proposals[i].authorId !== playerId) return i;
      }
      return -1;
    }

    /* ---------- Gestion des joueurs ---------- */
    addPlayer(name) {
      initInteraction(); vibrate(50); playSound('click');
      const cleanName = name.trim();
      if (!cleanName) return;
      if (this.players.some(p => p.name.toLowerCase() === cleanName.toLowerCase())) return;
      this.players.push({ id: generateId(), name: cleanName, score: 0 });
      this.render();
    }

    removePlayer(id) {
      initInteraction(); vibrate(50); playSound('click');
      this.players = this.players.filter(p => p.id !== id);
      this.render();
    }

    resetScores() {
      initInteraction(); vibrate(50); playSound('click');
      this.players.forEach(p => p.score = 0);
      this.round = 0;
      this.usedScenarios = [];
      this.render();
    }

    /* ---------- Pioche de scénario sans répétition ---------- */
    pickScenario() {
      if (this.usedScenarios.length >= SCENARIOS.length) this.usedScenarios = [];
      const pool = SCENARIOS.filter(s => !this.usedScenarios.includes(s));
      const choice = pool[Math.floor(Math.random() * pool.length)];
      this.usedScenarios.push(choice);
      return choice;
    }

    /* ---------- Déroulé de la manche ---------- */
    startGame() {
      initInteraction(); vibrate([50, 50, 50]); playSound('tada');
      if (this.players.length < MIN_PLAYERS) return;
      this.round++;
      this.scenario = this.pickScenario();
      this.secretRule = Math.random() < 0.35 ? SECRET_RULES[Math.floor(Math.random() * SECRET_RULES.length)] : null;
      this.proposals = []; this.votes = {}; this.currentPlayerIndex = 0;
      this.phase = 'transition_propose';
      this.render();
    }

    readyForTurn() {
      initInteraction(); vibrate(50); playSound('click');
      if (this.phase === 'transition_propose') this.phase = 'propose';
      if (this.phase === 'transition_vote') this.phase = 'vote';
      this.render();
    }

    submitProposal(text) {
      initInteraction(); vibrate(50); playSound('click');
      if (!text.trim()) return;
      this.proposals.push({ id: generateId(), authorId: this.players[this.currentPlayerIndex].id, text: text.trim() });
      this.currentPlayerIndex++;

      if (this.currentPlayerIndex >= this.players.length) {
        this.proposals = this.proposals.sort(() => Math.random() - 0.5);
        this.currentPlayerIndex = 0;
        this.currentVoteIndex = this.firstVotableIndex(this.players[0].id);
        this.phase = 'transition_vote';
      } else {
        this.phase = 'transition_propose';
      }
      this.render();
    }

    submitVote(voteValue) {
      initInteraction(); vibrate(50); playSound('click');
      const currentProposal = this.proposals[this.currentVoteIndex];
      const currentPlayer = this.players[this.currentPlayerIndex];

      // La proposition affichée n'est jamais celle du joueur courant : on compte directement le vote
      if (!this.votes[currentProposal.id]) this.votes[currentProposal.id] = { yes: [], no: [] };
      this.votes[currentProposal.id][voteValue].push(currentPlayer.name);

      // Proposition votable suivante pour ce joueur (on saute les siennes)
      const next = this.nextVotableIndex(currentPlayer.id, this.currentVoteIndex + 1);
      if (next !== -1) {
        this.currentVoteIndex = next;
      } else {
        this.currentPlayerIndex++;
        if (this.currentPlayerIndex >= this.players.length) {
          this.calculateResults();
          this.phase = 'results';
        } else {
          this.currentVoteIndex = this.firstVotableIndex(this.players[this.currentPlayerIndex].id);
          this.phase = 'transition_vote';
        }
      }
      this.render();
    }

    getHonoraryTitle(percent) {
      if (percent === 50) return "👑 Le Maître Chanteur Parfait";
      if (percent === 100) return "🧸 Le Bisounours (Trop gentil)";
      if (percent === 0) return "😈 Le Tortionnaire Sadique";
      if (Math.abs(50 - percent) <= 15) return "⚖️ L'Équilibriste";
      if (percent > 75) return "🤝 Le Négociateur Sympa";
      if (percent < 25) return "🏴‍☠️ Le Bourreau Sans Pitié";
      return "🤷 Le Créateur de Chaos";
    }

    // Plus on est proche de 50/50, plus on marque (100 pts pour un 50/50 parfait, 0 pour 0%/100%)
    pointsFromDeviation(deviation) {
      return Math.round(Math.max(0, (50 - deviation) / 50 * 100));
    }

    calculateResults() {
      this.results = this.proposals.map(p => {
        const v = this.votes[p.id] || { yes: [], no: [] };
        const totalVotes = v.yes.length + v.no.length;
        const yesPercent = totalVotes > 0 ? (v.yes.length / totalVotes) * 100 : 0;
        const deviation = Math.abs(50 - yesPercent);
        const points = this.pointsFromDeviation(deviation);
        const author = this.players.find(pl => pl.id === p.authorId);
        return { ...p, yesPercent, deviation, points, authorName: author ? author.name : '???', title: this.getHonoraryTitle(yesPercent) };
      });
      this.results.sort((a, b) => a.deviation - b.deviation);

      // Attribution des points au classement général
      this.results.forEach(r => {
        const author = this.players.find(pl => pl.id === r.authorId);
        if (author) author.score += r.points;
      });
    }

    startRoulette(proposalId) {
      initInteraction();
      const result = this.results.find(r => r.id === proposalId);
      if (!result) return;
      const realAuthor = result.authorName;

      const btn = document.getElementById(`btn-reveal-${proposalId}`);
      const infoDiv = document.getElementById(`info-${proposalId}`);
      const rouletteText = document.getElementById(`roulette-text-${proposalId}`);
      const secretStats = document.getElementById(`secret-stats-${proposalId}`);

      btn.style.display = 'none';
      infoDiv.style.display = 'block';

      let ticks = 0;
      const maxTicks = 20;

      const interval = setInterval(() => {
        playSound('tick');
        vibrate(20);
        rouletteText.innerText = this.players[Math.floor(Math.random() * this.players.length)].name;
        rouletteText.classList.add('roulette-blur');

        ticks++;
        if (ticks >= maxTicks) {
          clearInterval(interval);
          rouletteText.classList.remove('roulette-blur');
          rouletteText.classList.add('author-reveal-final');
          rouletteText.innerText = `👑 ${realAuthor} 👑`;

          playSound('tada');
          vibrate([100, 50, 100, 50, 200]);

          setTimeout(() => { secretStats.style.display = 'block'; }, 500);
        }
      }, 100);
    }

    nextRound() { this.startGame(); }

    finishGame() {
      initInteraction(); vibrate([50, 50, 50]); playSound('tada');
      this.phase = 'final';
      this.render();
    }

    resetGame() {
      initInteraction(); vibrate(50); playSound('click');
      this.phase = 'setup'; this.render();
    }

    /* ==========================================
       MOTEUR DE RENDU
    ========================================== */
    render() {
      this.save();
      const appDiv = document.getElementById('app');
      const pill = document.getElementById('roundPill');
      pill.innerHTML = (this.round > 0 && this.phase !== 'final') ? `<span class="round-pill">Manche ${this.round}</span>` : '';

      if (this.phase === 'setup') appDiv.innerHTML = this.renderSetup();
      else if (this.phase === 'transition_propose' || this.phase === 'transition_vote') appDiv.innerHTML = this.renderTransition();
      else if (this.phase === 'propose') appDiv.innerHTML = this.renderPropose();
      else if (this.phase === 'vote') appDiv.innerHTML = this.renderVote();
      else if (this.phase === 'final') appDiv.innerHTML = this.renderFinal();
      else if (this.phase === 'results') {
        appDiv.innerHTML = this.renderResults();
        setTimeout(() => {
          document.querySelectorAll('.vote-bar-fill').forEach(bar => { bar.style.width = bar.getAttribute('data-target-width'); });
        }, 100);
      }
      this.attachEventListeners();
    }

    renderLeaderboard() {
      if (this.players.every(p => p.score === 0)) return '';
      const sorted = [...this.players].sort((a, b) => b.score - a.score);
      const medals = ['🥇', '🥈', '🥉'];
      return `
        <div class="leaderboard">
          <h3>🏅 Classement général</h3>
          ${sorted.map((p, i) => `
            <div class="lb-row ${i === 0 ? 'lead' : ''}">
              <span class="lb-rank">${medals[i] || (i + 1)}</span>
              <span class="lb-name">${escapeHtml(p.name)}</span>
              <span class="lb-score">${p.score} pts</span>
            </div>`).join('')}
        </div>`;
    }

    renderSetup() {
      const canStart = this.players.length >= MIN_PLAYERS;
      return `
        <div class="card">
          ${this.round === 0 ? `
          <div class="rules-box">
            <h3>📜 Comment on joue ?</h3>
            <p style="text-align:center; margin-bottom: 15px; font-size: 13px; color: #a0aec0; text-transform:uppercase; letter-spacing:1px; font-weight:800;">
              Le but : Couper les copains en deux ! ✂️
            </p>
            <ul class="rules-list">
              <li>⚡ <strong>1. Le Super-Pouvoir :</strong> Le jeu te donne une capacité extraordinaire (ex: "Tu peux voler !").</li>
              <li>😈 <strong>2. Le Piège :</strong> Tu inventes en cachette un "MAIS..." (ex: "...mais tu as des plumes sur le nez").</li>
              <li>🗳️ <strong>3. Le Vote :</strong> Les autres décident s'ils veulent ton super-pouvoir ou pas.</li>
              <li>⚖️ <strong>4. La Victoire :</strong> Tu marques un maximum de points si tu t'approches le plus possible du <strong>50/50</strong> !</li>
            </ul>
          </div>` : ''}

          ${this.renderLeaderboard()}

          <h2 style="text-align:center; margin-bottom:25px; font-weight:800;">👥 Les Joueurs</h2>
          <div class="info-box">Ajoutez tous les joueurs présents (3 minimum). L'appareil va tourner !</div>
          <div style="margin-bottom: 25px; display:flex; flex-wrap:wrap; justify-content:center;">
            ${this.players.map(p => `<span class="player-tag">${escapeHtml(p.name)} <span class="remove-x" data-action="remove" data-id="${p.id}">✖</span></span>`).join('')}
            ${this.players.length === 0 ? '<em style="color:#64748b; font-size:14px;">La table est vide...</em>' : ''}
          </div>
          <div class="input-group">
            <input type="text" id="newPlayerName" maxlength="20" placeholder="Prénom du joueur...">
          </div>
          <button id="btnAddPlayer" class="secondary" style="margin-bottom: 30px;">+ Ajouter à la partie</button>
          <button id="btnStartGame" ${canStart ? '' : 'disabled'}>🚀 ${this.round === 0 ? 'Décoller' : 'Lancer la manche'}</button>
          ${!canStart ? `<p style="text-align:center; color:#94a3b8; font-size:13px; margin-top:12px;">Encore ${MIN_PLAYERS - this.players.length} joueur(s) avant de pouvoir lancer.</p>` : ''}
          ${this.round > 0 ? `<button id="btnResetScores" class="ghost" style="margin-top:14px;">♻️ Réinitialiser les scores</button>` : ''}
        </div>`;
    }

    renderTransition() {
      const action = this.phase === 'transition_propose' ? 'faire ta proposition' : 'voter';
      const player = escapeHtml(this.players[this.currentPlayerIndex].name);
      return `
        <div class="card transition-screen">
          <div class="transition-icon">🤫</div>
          <h2 style="margin-bottom: 15px; font-size: 32px;">À toi <span style="color: #00f2fe;">${player}</span></h2>
          <p style="color: #cbd5e1; margin-bottom: 40px; font-size: 18px;">Les autres, on détourne le regard ! C'est le moment de ${action}.</p>
          <button id="btnReady">C'est bon, je suis caché !</button>
        </div>`;
    }

    renderPropose() {
      const player = escapeHtml(this.players[this.currentPlayerIndex].name);
      return `
        <div class="card scenario-card">
          <div class="scenario-label">Le Scénario</div>
          <div class="scenario-text">${escapeHtml(this.scenario)}</div>
          ${this.secretRule ? `
            <div class="secret-rule-box"><div class="secret-rule-title">⚠️ Règle Secrète ⚠️</div><div style="font-size: 16px; font-weight:600;">${escapeHtml(this.secretRule)}</div></div>
          ` : ''}
        </div>
        <div class="card">
          <div class="info-box">C'est à <strong>${player}</strong> de jouer !</div>
          <div class="input-group">
            <label>Ta pire contrepartie (Objectif : 50% de oui)</label>
            <textarea id="txtProposal" placeholder="...mais tu dois manger un citron chaque matin."></textarea>
          </div>
          <button id="btnSubmitProposal">Valider en secret</button>
        </div>`;
    }

    renderVote() {
      const player = this.players[this.currentPlayerIndex];
      const proposal = this.proposals[this.currentVoteIndex];
      const votable = this.proposals.filter(p => p.authorId !== player.id);
      const pos = votable.findIndex(p => p.id === proposal.id) + 1;

      return `
        <div class="card scenario-card" style="padding: 25px;">
          <div class="scenario-label">Rappel</div>
          <div style="font-size: 20px; font-weight: 800;">${escapeHtml(this.scenario)}</div>
        </div>
        <div class="card">
          <div class="info-box"><strong>${escapeHtml(player.name)}</strong>, fais ton choix. (${pos}/${votable.length})</div>

          <div style="background: rgba(0,0,0,0.3); padding: 30px; border-radius: 16px; text-align: center; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05);">
            <p style="color: #94a3b8; font-size: 14px; margin-bottom: 15px; text-transform:uppercase; letter-spacing:1px; font-weight:800;">La contrepartie proposée :</p>
            <h3 style="font-size: 24px; color: #fff; font-weight:800;">"... ${escapeHtml(proposal.text)}"</h3>
          </div>
          <div class="vote-buttons">
            <button class="vote-btn yes" data-action="vote" data-vote="yes">J'ACCEPTE</button>
            <button class="vote-btn no" data-action="vote" data-vote="no">JE REFUSE</button>
          </div>
        </div>`;
    }

    renderResults() {
      return `
        <div class="card scenario-card" style="padding: 25px;">
          <div class="scenario-label">Bilan de la manche</div>
          <div style="font-size: 20px; font-weight:800;">${escapeHtml(this.scenario)}</div>
        </div>
        <div class="card">
          <h2 style="text-align:center; margin-bottom: 25px; font-size:32px; font-weight:900;">🏆 Résultats</h2>
          <div class="info-box" style="text-align:center; margin-bottom: 30px;">L'heure des comptes ! Débattez avant de lancer la roulette.</div>

          ${this.results.map((r, i) => {
            const v = this.votes[r.id] || { yes: [], no: [] };
            return `
            <div class="result-item ${i === 0 ? 'winner' : ''}">
              ${i === 0 ? '<span class="winner-badge">Dilemme Parfait !</span>' : ''}
              <h3 style="font-size: 20px; margin-bottom: 15px; color: #fff; font-weight:800;">"... ${escapeHtml(r.text)}"</h3>
              <div class="vote-bar-container"><div class="vote-bar-fill" data-target-width="${r.yesPercent}%">${Math.round(r.yesPercent)}% OUI</div></div>
              <div class="points-tag">+${r.points} pts pour l'auteur</div>

              <button class="author-reveal-btn" id="btn-reveal-${r.id}" data-action="reveal" data-id="${r.id}">
                🎰 Lancer la roulette du coupable
              </button>

              <div class="author-info" id="info-${r.id}" style="display:none;">
                <div class="author-title">${escapeHtml(r.title)}</div>
                <div class="roulette-box" id="roulette-text-${r.id}">???</div>

                <div id="secret-stats-${r.id}" class="fade-in-up" style="display:none;">
                  <div style="display:flex; justify-content:center; gap:20px; font-size: 15px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                    <div style="flex: 1; text-align: center;">
                      <span style="color:#00e676; font-weight:900; display:block; margin-bottom:5px;">✅ OUI</span>
                      <span style="color:#e2e8f0;">${v.yes.map(escapeHtml).join('<br>') || 'Aucun'}</span>
                    </div>
                    <div style="width: 1px; background: rgba(255,255,255,0.1);"></div>
                    <div style="flex: 1; text-align: center;">
                      <span style="color:#ff1744; font-weight:900; display:block; margin-bottom:5px;">❌ NON</span>
                      <span style="color:#e2e8f0;">${v.no.map(escapeHtml).join('<br>') || 'Aucun'}</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>`;
          }).join('')}

          ${this.renderLeaderboard()}

          <button id="btnNextRound" style="margin-top: 10px;">▶️ Manche suivante</button>
          <button id="btnFinish" class="secondary">🏁 Terminer la partie</button>
        </div>`;
    }

    renderFinal() {
      const sorted = [...this.players].sort((a, b) => b.score - a.score);
      const top = sorted.slice(0, 3);
      const order = [1, 0, 2]; // 2e, 1er, 3e pour un vrai podium
      const heights = { 0: 130, 1: 95, 2: 70 };
      const colors = { 0: 'linear-gradient(180deg,#ffd700,#bfa100)', 1: 'linear-gradient(180deg,#c0c0c0,#8a8a8a)', 2: 'linear-gradient(180deg,#cd7f32,#8a5524)' };
      const medals = ['🥇', '🥈', '🥉'];

      return `
        <div class="card" style="text-align:center;">
          <h2 style="font-size:34px; font-weight:900; margin-bottom:6px;">🎉 Partie terminée !</h2>
          <p style="color:#a0aec0; margin-bottom:30px; font-weight:600;">${this.round} manche(s) jouée(s)</p>

          <div class="podium">
            ${order.filter(i => top[i]).map(i => `
              <div class="podium-col">
                <div class="podium-name">${medals[i]} ${escapeHtml(top[i].name)}</div>
                <div class="podium-bar" style="height:${heights[i]}px; background:${colors[i]}; color:#1a1a2e;">${top[i].score}</div>
                <div class="podium-score">pts</div>
              </div>`).join('')}
          </div>

          ${sorted.length > 3 ? `
            <div class="leaderboard" style="margin-top:20px;">
              ${sorted.slice(3).map((p, i) => `
                <div class="lb-row">
                  <span class="lb-rank">${i + 4}</span>
                  <span class="lb-name">${escapeHtml(p.name)}</span>
                  <span class="lb-score">${p.score} pts</span>
                </div>`).join('')}
            </div>` : ''}

          <button id="btnReplayKeep" style="margin-top:25px;">🔁 Rejouer (mêmes joueurs)</button>
          <button id="btnReset" class="secondary">🆕 Nouvelle partie</button>
        </div>`;
    }

    /* ==========================================
       ÉCOUTEURS — délégation d'événements (aucune string JS inline => zéro bug d'apostrophe)
    ========================================== */
    attachEventListeners() {
      const app = document.getElementById('app');

      const btnAddPlayer = document.getElementById('btnAddPlayer');
      const input = document.getElementById('newPlayerName');
      if (btnAddPlayer && input) {
        const add = () => { this.addPlayer(input.value); };
        btnAddPlayer.onclick = add;
        input.onkeypress = (e) => { if (e.key === 'Enter') add(); };
        input.focus();
      }

      const bind = (id, fn) => { const el = document.getElementById(id); if (el) el.onclick = fn; };
      bind('btnStartGame', () => this.startGame());
      bind('btnResetScores', () => this.resetScores());
      bind('btnReady', () => this.readyForTurn());
      bind('btnSubmitProposal', () => this.submitProposal(document.getElementById('txtProposal').value));
      bind('btnNextRound', () => this.nextRound());
      bind('btnFinish', () => this.finishGame());
      bind('btnReplayKeep', () => { this.round = 0; this.usedScenarios = []; this.players.forEach(p => p.score = 0); this.phase = 'setup'; this.render(); });
      bind('btnReset', () => { this.players = []; this.round = 0; this.usedScenarios = []; this.phase = 'setup'; this.render(); });

      // Délégation pour les éléments dynamiques (remove / vote / reveal)
      app.onclick = (e) => {
        const el = e.target.closest('[data-action]');
        if (!el) return;
        const action = el.getAttribute('data-action');
        if (action === 'remove') this.removePlayer(el.getAttribute('data-id'));
        else if (action === 'vote') this.submitVote(el.getAttribute('data-vote'));
        else if (action === 'reveal') this.startRoulette(el.getAttribute('data-id'));
      };
    }
  }

  window.game = new Game();
</script>
</body>
</html>
