<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>50/50 - Le Jeu du Dilemme (Multijoueur)</title>
  <style>
    /* ===== TON STYLE EXISTANT (garde-le intégralement) ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; color: white; }
    .header h1 { font-size: 48px; font-weight: 800; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
    .header .subtitle { font-size: 18px; opacity: 0.95; }
    .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin-bottom: 20px; }
    .scenario-card { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; text-align: center; padding: 40px 30px; }
    .scenario-text { font-size: 24px; font-weight: 600; line-height: 1.4; margin-bottom: 15px; word-wrap: break-word; }
    .scenario-label { font-size: 14px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .phase-indicator { display: flex; justify-content: space-between; margin-bottom: 25px; gap: 10px; }
    .phase-step { flex: 1; text-align: center; padding: 12px; background: #f5f5f5; border-radius: 12px; font-size: 13px; font-weight: 600; color: #999; transition: all 0.3s; }
    .phase-step.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; transform: scale(1.05); }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 14px; }
    input, textarea { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; font-family: inherit; transition: border-color 0.3s; }
    input:focus, textarea:focus { outline: none; border-color: #667eea; }
    textarea { resize: vertical; min-height: 100px; }
    button { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); }
    button.secondary { background: #6c757d; margin-top: 10px; }
    .proposal-item { background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 2px solid transparent; transition: all 0.3s; }
    .proposal-item:hover { border-color: #667eea; }
    .proposal-author { font-weight: 700; color: #667eea; margin-bottom: 8px; font-size: 14px; word-break: break-word; }
    .proposal-text { font-size: 16px; color: #333; margin-bottom: 15px; line-height: 1.5; }
    .vote-buttons { display: flex; gap: 10px; }
    .vote-btn { flex: 1; padding: 12px; border: 2px solid; background: white; border-radius: 10px; font-weight: 700; cursor: pointer; transition: all 0.3s; font-size: 16px; }
    .vote-btn.yes { border-color: #10b981; color: #10b981; }
    .vote-btn.yes:hover, .vote-btn.yes.selected { background: #10b981; color: white; }
    .vote-btn.no { border-color: #ef4444; color: #ef4444; }
    .vote-btn.no:hover, .vote-btn.no.selected { background: #ef4444; color: white; }
    .result-item { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 3px solid #e0e0e0; position: relative; }
    .result-item.winner { border-color: #fbbf24; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }
    .winner-badge { position: absolute; top: 15px; right: 15px; background: #fbbf24; color: #92400e; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .result-author { font-weight: 700; color: #667eea; }
    .result-score { font-size: 24px; font-weight: 800; }
    .result-score.perfect { color: #10b981; }
    .vote-bar-container { position: relative; height: 30px; background: #e0e0e0; border-radius: 15px; overflow: hidden; margin-bottom: 8px; }
    .vote-bar { position: absolute; left: 0; top: 0; height: 100%; background: linear-gradient(90deg, #10b981 0%, #34d399 100%); transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; }
    .vote-bar-no { position: absolute; right: 0; top: 0; height: 100%; background: linear-gradient(90deg, #f87171 0%, #ef4444 100%); transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; }
    .vote-stats { display: flex; justify-content: space-between; font-size: 13px; color: #666; }
    .empty-state { text-align: center; padding: 40px 20px; color: #999; }
    .empty-state-icon { font-size: 48px; margin-bottom: 15px; }
    .countdown { text-align: center; font-size: 14px; color: #666; margin-top: 15px; font-weight: 600; }
    .player-count { text-align: center; margin-top: 15px; padding: 12px; background: #f0fdf4; border-radius: 10px; color: #166534; font-weight: 600; font-size: 14px; }
    .info-box { background: #eff6ff; border-left: 4px solid #3b82f6; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; color: #1e40af; }
    .error-box { background: #fee; border-left: 4px solid #ef4444; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; color: #991b1b; }
    .room-code { background: #f3f4f6; border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 20px; font-family: monospace; font-size: 18px; font-weight: bold; letter-spacing: 2px; }
    @media (max-width: 640px) { .header h1 { font-size: 36px; } .scenario-text { font-size: 20px; } .card { padding: 20px; } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>50/50</h1>
    <div class="subtitle">Le jeu du dilemme parfait - Multijoueur</div>
  </div>
  <div id="app"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBPbFNDsn5CVF-4krrYtw1z2IzwkkILLoE",
    authDomain: "game-ef3a0.firebaseapp.com",
    databaseURL: "https://game-ef3a0-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "game-ef3a0",
    storageBucket: "game-ef3a0.firebasestorage.app",
    messagingSenderId: "1091069158786",
    appId: "1:1091069158786:web:fd14c503c7726de7a51b9b",
    measurementId: "G-ZMJ2TLB230"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ========== SECURITE ==========
  function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
  function sanitizeUsername(name) { if (typeof name !== 'string') return ''; return name.trim().slice(0, 20).replace(/\s+/g, ' '); }
  function sanitizeText(text) { if (typeof text !== 'string') return ''; return text.trim().slice(0, 500).replace(/\s+/g, ' '); }
  function validateGameData(game) {
    if (!game || typeof game !== 'object') return false;
    if (typeof game.scenario !== 'string' || game.scenario.length > 500) return false;
    if (!['propose', 'vote', 'results'].includes(game.phase)) return false;
    if (!Array.isArray(game.proposals)) return false;
    if (typeof game.votes !== 'object') return false;
    return true;
  }
  const PHASE_DURATION = { propose: 120000, vote: 180000 };

  class Game {
    constructor() {
      this.displayName = null;
      this.currentGame = null;
      this.roomId = null;
      this.unsubscribe = null;
      this.errorMessage = null;
      this.phaseInterval = null;
      this.isTyping = false;
      this.init();
    }

    init() {
      const savedName = localStorage.getItem('game50_playerName');
      if (savedName) this.displayName = sanitizeUsername(savedName);
      const savedRoom = localStorage.getItem('game50_currentRoom');
      if (savedRoom && this.displayName) this.joinRoomById(savedRoom);
      else this.render();
      this.phaseInterval = setInterval(() => this.checkPhaseTimeout(), 1000);
      document.addEventListener('focusin', (e) => { if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') this.isTyping = true; });
      document.addEventListener('focusout', (e) => { if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') { this.isTyping = false; this.render(); } });
    }

    async savePlayerName(name) {
      const sanitized = sanitizeUsername(name);
      if (!sanitized) { this.errorMessage = 'Pseudo invalide'; this.render(); return false; }
      this.displayName = sanitized;
      localStorage.setItem('game50_playerName', sanitized);
      this.errorMessage = null;
      this.render();
      return true;
    }

    async createRoom(scenario) {
      const sanitizedScenario = sanitizeText(scenario);
      if (!sanitizedScenario) { this.errorMessage = 'Scénario invalide'; this.render(); return; }
      const id = Math.random().toString(36).substring(2, 8).toUpperCase();
      this.roomId = id;
      const gameData = { scenario: sanitizedScenario, phase: 'propose', phaseStartTime: Date.now(), proposals: [], votes: {}, createdAt: Date.now() };
      try {
        await set(ref(db, 'rooms/' + id), gameData);
        localStorage.setItem('game50_currentRoom', id);
        this.currentGame = gameData;
        this.setupRoomListener();
        this.errorMessage = null;
        this.render();
        alert(`✅ Salon créé ! Code : ${id}`);
      } catch (err) { console.error(err); this.errorMessage = 'Erreur création salon'; this.render(); }
    }

    async joinRoomById(roomId) {
      if (!roomId) return;
      const cleanId = roomId.trim().toUpperCase();
      try {
        const snapshot = await get(ref(db, 'rooms/' + cleanId));
        if (snapshot.exists()) {
          this.roomId = cleanId;
          this.currentGame = snapshot.val();
          localStorage.setItem('game50_currentRoom', cleanId);
          this.setupRoomListener();
          this.errorMessage = null;
          this.render();
        } else { this.errorMessage = 'Salon introuvable'; this.render(); }
      } catch (err) { console.error(err); this.errorMessage = 'Erreur connexion'; this.render(); }
    }

    setupRoomListener() {
      if (this.unsubscribe) this.unsubscribe();
      const roomRef = ref(db, 'rooms/' + this.roomId);
      this.unsubscribe = onValue(roomRef, (snapshot) => {
        if (snapshot.exists()) {
          const newData = snapshot.val();
          if (validateGameData(newData)) { this.currentGame = newData; if (!this.isTyping) this.render(); }
        } else { this.resetGame(); this.errorMessage = 'Partie terminée'; this.render(); }
      });
    }

    async saveGame() { if (!this.roomId || !this.currentGame) return; try { await set(ref(db, 'rooms/' + this.roomId), this.currentGame); } catch (err) { console.error(err); } }
    async deleteRoom() { if (!this.roomId) return; try { await remove(ref(db, 'rooms/' + this.roomId)); } catch (err) { console.error(err); } }

    async resetGame() {
      if (this.unsubscribe) this.unsubscribe();
      if (this.roomId) await this.deleteRoom();
      this.currentGame = null; this.roomId = null; this.errorMessage = null;
      localStorage.removeItem('game50_currentRoom');
      this.render();
    }

    checkPhaseTimeout() {
      if (!this.currentGame) return;
      const now = Date.now();
      const elapsed = now - this.currentGame.phaseStartTime;
      let changed = false;
      if (this.currentGame.phase === 'propose' && elapsed > PHASE_DURATION.propose) { this.currentGame.phase = 'vote'; this.currentGame.phaseStartTime = now; changed = true; }
      else if (this.currentGame.phase === 'vote' && elapsed > PHASE_DURATION.vote) { this.currentGame.phase = 'results'; this.calculateResults(); changed = true; }
      if (changed) { this.saveGame(); if (!this.isTyping) this.render(); }
    }

    getTimeRemaining() {
      if (!this.currentGame) return "0:00";
      const elapsed = Date.now() - this.currentGame.phaseStartTime;
      const duration = this.currentGame.phase === 'propose' ? PHASE_DURATION.propose : PHASE_DURATION.vote;
      const remaining = Math.max(0, duration - elapsed);
      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    async submitProposal(counterpart) {
      if (!this.displayName || !this.currentGame) return;
      if (this.currentGame.phase !== 'propose') { this.errorMessage = 'Phase proposition terminée'; this.render(); return; }
      const sanitized = sanitizeText(counterpart);
      if (!sanitized) { this.errorMessage = 'Proposition invalide'; this.render(); return; }
      const existingIndex = this.currentGame.proposals.findIndex(p => p.author === this.displayName);
      const proposal = { author: this.displayName, text: sanitized, id: existingIndex >= 0 ? this.currentGame.proposals[existingIndex].id : Date.now() };
      if (existingIndex >= 0) this.currentGame.proposals[existingIndex] = proposal;
      else this.currentGame.proposals.push(proposal);
      this.errorMessage = null;
      await this.saveGame();
      if (!this.isTyping) this.render();
    }

    async submitVote(proposalId, vote) {
      if (!this.displayName || !this.currentGame) return;
      if (this.currentGame.phase !== 'vote') { this.errorMessage = 'Phase vote terminée'; this.render(); return; }
      if (!this.currentGame.votes[proposalId]) this.currentGame.votes[proposalId] = { yes: [], no: [] };
      const votesObj = this.currentGame.votes[proposalId];
      votesObj.yes = votesObj.yes.filter(name => name !== this.displayName);
      votesObj.no = votesObj.no.filter(name => name !== this.displayName);
      if (vote === 'yes') votesObj.yes.push(this.displayName);
      else votesObj.no.push(this.displayName);
      await this.saveGame();
      if (!this.isTyping) this.render();
    }

    calculateResults() {
      if (!this.currentGame) return;
      this.currentGame.results = this.currentGame.proposals.map(proposal => {
        const votes = this.currentGame.votes[proposal.id] || { yes: [], no: [] };
        const total = votes.yes.length + votes.no.length;
        const yesPercent = total > 0 ? (votes.yes.length / total) * 100 : 0;
        const deviation = Math.abs(50 - yesPercent);
        return { ...proposal, yesVotes: votes.yes.length, noVotes: votes.no.length, yesPercent, deviation };
      });
      this.currentGame.results.sort((a, b) => a.deviation - b.deviation);
    }

    render() {
      const appDiv = document.getElementById('app');
      if (!this.displayName) appDiv.innerHTML = this.renderNameEntry();
      else if (!this.currentGame) appDiv.innerHTML = this.renderLobby();
      else {
        switch (this.currentGame.phase) {
          case 'propose': appDiv.innerHTML = this.renderProposePhase(); break;
          case 'vote': appDiv.innerHTML = this.renderVotePhase(); break;
          case 'results': appDiv.innerHTML = this.renderResults(); break;
          default: appDiv.innerHTML = '<div class="card">Erreur phase</div>';
        }
      }
      this.attachEventListeners();
    }

    renderNameEntry() {
      return `
        <div class="card">
          <h2 style="margin-bottom:20px;">Bienvenue !</h2>
          ${this.errorMessage ? `<div class="error-box">${escapeHtml(this.errorMessage)}</div>` : ''}
          <div class="info-box">Choisis un pseudo pour commencer.</div>
          <div class="input-group">
            <input type="text" id="playerName" placeholder="Pseudo" maxlength="20" autocomplete="off">
          </div>
          <button id="submitName">Commencer</button>
        </div>
      `;
    }

    renderLobby() {
      return `
        <div class="card">
          <h2 style="margin-bottom:20px;">Menu principal</h2>
          <div class="info-box">👋 Bonjour ${escapeHtml(this.displayName)}</div>
          ${this.errorMessage ? `<div class="error-box">${escapeHtml(this.errorMessage)}</div>` : ''}
          <div style="margin-bottom:30px;">
            <h3>🎲 Créer une partie</h3>
            <textarea id="scenario" placeholder="Scénario..." maxlength="500">Vous gagnez 10 millions d'euros</textarea>
            <button id="createGame">Créer un salon</button>
          </div>
          <div>
            <h3>🔗 Rejoindre</h3>
            <input type="text" id="roomCode" placeholder="Code" maxlength="6" style="text-transform:uppercase;">
            <button id="joinGame">Rejoindre</button>
          </div>
        </div>
      `;
    }

    renderProposePhase() {
      const myProposal = this.currentGame.proposals.find(p => p.author === this.displayName);
      const timeRemaining = this.getTimeRemaining();
      return `
        <div class="card scenario-card"><div class="scenario-label">Scénario</div><div class="scenario-text">${escapeHtml(this.currentGame.scenario)}</div></div>
        <div class="card">
          <div class="phase-indicator"><div class="phase-step active">1. Propositions</div><div class="phase-step">2. Votes</div><div class="phase-step">3. Résultats</div></div>
          <div class="room-code">🔑 Code : ${escapeHtml(this.roomId)}</div>
          ${this.errorMessage ? `<div class="error-box">${escapeHtml(this.errorMessage)}</div>` : ''}
          <div class="info-box">Propose une contrepartie 50/50 !</div>
          <div class="input-group"><textarea id="counterpart" placeholder="Contrepartie..." maxlength="500">${myProposal ? escapeHtml(myProposal.text) : ''}</textarea></div>
          <button id="submitProposal">${myProposal ? 'Modifier' : 'Envoyer'}</button>
          ${myProposal ? '<div class="player-count">✓ Proposition enregistrée</div>' : ''}
          <div class="countdown">⏱️ ${escapeHtml(timeRemaining)}</div>
          <div class="player-count">📝 ${this.currentGame.proposals.length} proposition(s)</div>
          <button id="leaveGame" class="secondary">Quitter</button>
        </div>
      `;
    }

    renderVotePhase() {
      const timeRemaining = this.getTimeRemaining();
      return `
        <div class="card scenario-card"><div class="scenario-label">Scénario</div><div class="scenario-text">${escapeHtml(this.currentGame.scenario)}</div></div>
        <div class="card">
          <div class="phase-indicator"><div class="phase-step">1. Propositions</div><div class="phase-step active">2. Votes</div><div class="phase-step">3. Résultats</div></div>
          <div class="room-code">🔑 Code : ${escapeHtml(this.roomId)}</div>
          <div class="info-box">Vote pour chaque proposition</div>
          <div class="countdown">⏱️ ${escapeHtml(timeRemaining)}</div>
          ${this.currentGame.proposals.length === 0 ? '<div class="empty-state">Aucune proposition</div>' : this.currentGame.proposals.map(proposal => {
            const votes = this.currentGame.votes[proposal.id] || { yes: [], no: [] };
            const myVote = votes.yes.includes(this.displayName) ? 'yes' : votes.no.includes(this.displayName) ? 'no' : null;
            return `
              <div class="proposal-item">
                <div class="proposal-author">${escapeHtml(proposal.author)}</div>
                <div class="proposal-text">${escapeHtml(proposal.text)}</div>
                <div class="vote-buttons">
                  <button class="vote-btn yes ${myVote === 'yes' ? 'selected' : ''}" data-proposal-id="${proposal.id}" data-vote="yes">${myVote === 'yes' ? '✓ ' : ''}OUI</button>
                  <button class="vote-btn no ${myVote === 'no' ? 'selected' : ''}" data-proposal-id="${proposal.id}" data-vote="no">${myVote === 'no' ? '✓ ' : ''}NON</button>
                </div>
              </div>
            `;
          }).join('')}
          <button id="leaveGame" class="secondary">Quitter</button>
        </div>
      `;
    }

    renderResults() {
      if (!this.currentGame.results || this.currentGame.results.length === 0) {
        return `
          <div class="card scenario-card"><div class="scenario-text">${escapeHtml(this.currentGame.scenario)}</div></div>
          <div class="card"><div class="empty-state">Aucun vote</div><button id="newGame">Nouvelle partie</button></div>
        `;
      }
      return `
        <div class="card scenario-card"><div class="scenario-text">${escapeHtml(this.currentGame.scenario)}</div></div>
        <div class="card">
          <h2 style="text-align:center;">🏆 Résultats</h2>
          ${this.currentGame.results.map((result, idx) => {
            const isWinner = idx === 0;
            const total = result.yesVotes + result.noVotes;
            const yesWidth = total > 0 ? (result.yesVotes / total) * 100 : 50;
            return `
              <div class="result-item ${isWinner ? 'winner' : ''}">
                ${isWinner ? '<div class="winner-badge">🏆 Gagnant</div>' : ''}
                <div class="result-header"><div class="result-author">${escapeHtml(result.author)}</div><div class="result-score">${result.yesPercent.toFixed(1)}% OUI</div></div>
                <div class="result-text">${escapeHtml(result.text)}</div>
                <div class="vote-bar-container"><div class="vote-bar" style="width:${yesWidth}%;">${result.yesVotes} OUI</div><div class="vote-bar-no" style="width:${100-yesWidth}%;">${result.noVotes} NON</div></div>
                <div class="vote-stats"><span>Écart : ${result.deviation.toFixed(1)}%</span><span>${total} vote(s)</span></div>
              </div>
            `;
          }).join('')}
          <button id="newGame">Nouvelle partie</button>
        </div>
      `;
    }

    attachEventListeners() {
      const submitName = document.getElementById('submitName');
      if (submitName) submitName.onclick = () => { const name = document.getElementById('playerName').value; this.savePlayerName(name); };
      const createGame = document.getElementById('createGame');
      if (createGame) createGame.onclick = () => { const scenario = document.getElementById('scenario').value; this.createRoom(scenario); };
      const joinGame = document.getElementById('joinGame');
      if (joinGame) joinGame.onclick = () => { const code = document.getElementById('roomCode').value; this.joinRoomById(code); };
      const submitProposal = document.getElementById('submitProposal');
      if (submitProposal) submitProposal.onclick = () => { const text = document.getElementById('counterpart').value; this.submitProposal(text); };
      const newGame = document.getElementById('newGame');
      if (newGame) newGame.onclick = () => this.resetGame();
      const leaveGame = document.getElementById('leaveGame');
      if (leaveGame) leaveGame.onclick = () => { if (confirm('Quitter ?')) this.resetGame(); };
      document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.onclick = () => { const id = parseInt(btn.getAttribute('data-proposal-id')); const vote = btn.getAttribute('data-vote'); this.submitVote(id, vote); };
      });
    }
  }

  window.game = new Game();
</script>
</body>
</html>
