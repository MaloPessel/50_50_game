        return this.render();
      }
      this.joinSubscription(code);
    }

    async joinRoom(codeRaw) {
      initInteraction(); vibrate(50); playSound('click');
      const name = this.pseudo.trim();
      const code = (codeRaw || '').trim().toUpperCase();
      if (!name) { this.error = "Choisis d'abord un pseudo."; return this.render(); }
      if (code.length !== 4) { this.error = "Le code fait 4 caractères."; return this.render(); }
      const snap = await get(this.rref('rooms/' + code));
      if (!snap.exists()) { this.error = "Aucune partie avec ce code."; return this.render(); }
      const data = snap.val();
      if (data.meta.phase !== 'lobby' && !(data.players && data.players[this.uid])) {
        this.error = "La partie a déjà commencé."; return this.render();
      }
      const existing = data.players && data.players[this.uid];
      await update(this.rref(`rooms/${code}/players/${this.uid}`), {
        name, connected: true, score: existing ? existing.score : 0, isHost: data.meta.hostId === this.uid
      });
      this.joinSubscription(code);
    }

    joinSubscription(code) {
      this.code = code; this.error = null; this._dcMode = null;
      localStorage.setItem('pseudo5050', this.pseudo.trim());

      // Présence : on se marque en ligne ; la gestion de déconnexion est (ré)armée à chaque snapshot
      set(this.rref(`rooms/${code}/players/${this.uid}/connected`), true);

      if (this.unsub) this.unsub();
      this.unsub = onValue(this.rref('rooms/' + code), (snap) => {
        if (!snap.exists()) { this.leaveLocal("La partie a été fermée."); return; }
        this.room = snap.val();
        this.hostTick();                 // l'hôte fait avancer le jeu si besoin
        this.updateDisconnectHandler();  // dernier connecté => suppression de la room en partant
        this.render();
      });
    }

    // Recalcule, à chaque changement, ce qu'il faut faire si CET appareil se déconnecte.
    // - Seul connecté  => programmer la suppression de TOUTE la room.
    // - D'autres là    => se marquer simplement hors-ligne.
    updateDisconnectHandler() {
      if (!this.code || !this.uid) return;
      const me = this.players()[this.uid];
      if (!me) return;
      const solo = this.connectedIds().length <= 1; // moi seul encore connecté
      const mode = solo ? 'solo' : 'multi';
      if (mode === this._dcMode) return;             // déjà dans le bon mode, on évite le spam réseau
      this._dcMode = mode;

      const connRef = this.rref(`rooms/${this.code}/players/${this.uid}/connected`);
      const roomRef = this.rref('rooms/' + this.code);
      onDisconnect(connRef).cancel();
      onDisconnect(roomRef).cancel();
      if (solo) onDisconnect(roomRef).remove();      // ménage complet quand le dernier s'en va
      else      onDisconnect(connRef).set(false);    // sinon, juste hors-ligne
    }

    leaveLocal(msg) {
      if (this.unsub) { this.unsub(); this.unsub = null; }
      this._dcMode = null;
      this.code = null; this.room = null; this.error = msg || null; this.render();
    }

    async quitRoom() {
      initInteraction(); vibrate(50); playSound('click');
      if (this.code && this.uid) {
        const others = this.connectedIds().filter(id => id !== this.uid);
        const connRef = this.rref(`rooms/${this.code}/players/${this.uid}/connected`);
        const roomRef = this.rref('rooms/' + this.code);
        // On annule les actions de déconnexion : on fait le ménage nous-mêmes, maintenant.
        try { await onDisconnect(connRef).cancel(); } catch (e) {}
        try { await onDisconnect(roomRef).cancel(); } catch (e) {}
        try {
          if (others.length === 0) {
            // Dernier joueur : on supprime toute la room (on devient hôte si besoin, pour passer les règles)
            if (!this.isHost()) { try { await update(this.rref(`rooms/${this.code}/meta`), { hostId: this.uid }); } catch (e) {} }
            await remove(roomRef);
          } else {
            await remove(this.rref(`rooms/${this.code}/players/${this.uid}`));
          }
        } catch (e) {}
      }
      this._dcMode = null;
      this.leaveLocal();
    }

    /* ---------- Réglages lobby (hôte) ---------- */
    setSpice(level) { if (!this.isHost()) return; initInteraction(); playSound('click'); update(this.rref(`rooms/${this.code}/meta`), { spice: level }); }
    addCustomScenario(text) {
      if (!this.isHost()) return;
      const clean = (text || '').trim(); if (!clean) return;
      initInteraction(); playSound('click');
      const id = randomCode(6);
      set(this.rref(`rooms/${this.code}/customScenarios/${id}`), { text: clean });
      this.focusScenario = true;
    }
    removeCustomScenario(id) { if (!this.isHost()) return; playSound('click'); remove(this.rref(`rooms/${this.code}/customScenarios/${id}`)); }
    kickPlayer(id) { if (!this.isHost() || id === this.uid) return; playSound('click'); remove(this.rref(`rooms/${this.code}/players/${id}`)); }

    /* ---------- Pioche ---------- */
    scenarioPool() {
      const spice = this.meta().spice || 2;
      let pool = [];
      for (let l = 1; l <= spice; l++) pool = pool.concat(SCENARIOS_BY_TIER[l]);
      const custom = this.room.customScenarios ? Object.values(this.room.customScenarios).map(s => s.text) : [];
      return pool.concat(custom);
    }
    rulePool() { const spice = this.meta().spice || 2; let pool = []; for (let l = 1; l <= spice; l++) pool = pool.concat(SECRET_RULES_BY_TIER[l]); return pool; }

    /* ---------- Démarrer une manche (hôte) ---------- */
    async startRound() {
      if (!this.isHost()) return;
      initInteraction(); vibrate([50,50,50]); playSound('tada');
      const connected = this.connectedIds();
      if (connected.length < MIN_PLAYERS) return;

      const used = this.meta().usedScenarios || [];
      const pool = this.scenarioPool();
      let avail = pool.filter(s => !used.includes(s));
      if (avail.length === 0) avail = pool;
      const scenario = avail[Math.floor(Math.random() * avail.length)];
      const rules = this.rulePool();
      const secretRule = Math.random() < 0.35 ? rules[Math.floor(Math.random() * rules.length)] : null;

      await update(this.rref(`rooms/${this.code}`), {
        proposals: null, votes: null,
        meta: {
          ...this.meta(),
          phase: 'propose',
          round: (this.meta().round || 0) + 1,
          scenario, secretRule: secretRule || null,
          roundPlayers: connected,
          order: null,
          usedScenarios: [...used, scenario].slice(-40),
          scored: this.meta().scored
        }
      });
    }

    /* ---------- Soumettre une proposition ---------- */
    submitProposal(text) {
      initInteraction(); vibrate(50); playSound('click');
      const clean = (text || '').trim(); if (!clean) return;
      set(this.rref(`rooms/${this.code}/proposals/${this.uid}`), { text: clean });
    }

    /* ---------- Voter ---------- */
    submitVote(authorId, value) {
      initInteraction(); vibrate(50); playSound('click');
      set(this.rref(`rooms/${this.code}/votes/${authorId}/${this.uid}`), value);
    }

    /* ---------- Transitions pilotées par l'hôte ---------- */
    hostTick() {
      // Migration d'hôte : si l'hôte est déconnecté, le 1er joueur connecté (ordre alphabétique d'uid) reprend la main
      const players = this.players();
      const hostId = this.meta().hostId;
      const hostOk = hostId && players[hostId] && players[hostId].connected;
      if (!hostOk) {
        const candidate = this.connectedIds().sort()[0];
        if (candidate && candidate === this.uid) {
          update(this.rref(`rooms/${this.code}/meta`), { hostId: this.uid });
          update(this.rref(`rooms/${this.code}/players/${this.uid}`), { isHost: true });
        }
        return; // on attend la stabilisation
      }
      if (!this.isHost()) return;

      const phase = this.meta().phase;
      if (phase === 'propose' && this.allProposed()) this.openVote();
      else if (phase === 'vote' && this.allVoted()) this.computeResults();
    }

    activeRoundPlayers() {
      const players = this.players();
      return this.roundPlayers().filter(id => players[id]); // encore présents
    }

    allProposed() {
      const props = this.proposals();
      return this.activeRoundPlayers().every(id => props[id]);
    }

    async openVote() {
      const order = shuffle(this.activeRoundPlayers().filter(id => this.proposals()[id]));
      await update(this.rref(`rooms/${this.code}/meta`), { phase: 'vote', order });
    }

    voterDone(voterId) {
      const order = this.meta().order || [];
      const votes = this.votes();
      return order.filter(a => a !== voterId).every(a => votes[a] && votes[a][voterId] !== undefined);
    }
    allVoted() {
      const voters = this.activeRoundPlayers();
      return voters.length > 0 && voters.every(v => this.voterDone(v));
    }

    async computeResults() {
      if (this.meta().scored === this.meta().round) return; // déjà compté
      const order = this.meta().order || [];
      const votes = this.votes();
      const players = this.players();
      const scoreUpdates = {};
      order.forEach(authorId => {
        const v = votes[authorId] || {};
        const vals = Object.values(v);
        const yes = vals.filter(x => x === 'yes').length;
        const total = vals.length;
        const yesPercent = total > 0 ? (yes / total) * 100 : 0;
        const pts = pointsFromDeviation(Math.abs(50 - yesPercent));
        if (players[authorId]) scoreUpdates[`players/${authorId}/score`] = (players[authorId].score || 0) + pts;
      });
      scoreUpdates['meta/phase'] = 'results';
      scoreUpdates['meta/scored'] = this.meta().round;
      await update(this.rref('rooms/' + this.code), scoreUpdates);
    }

    forceNext() {
      if (!this.isHost()) return;
      initInteraction(); playSound('click');
      if (this.meta().phase === 'propose') this.openVote();
      else if (this.meta().phase === 'vote') this.computeResults();
    }

    nextRound() { this.startRound(); }
    async finishGame() { if (!this.isHost()) return; playSound('tada'); await update(this.rref(`rooms/${this.code}/meta`), { phase: 'final' }); }
    async backToLobby() { if (!this.isHost()) return; playSound('click'); await update(this.rref(`rooms/${this.code}/meta`), { phase: 'lobby' }); }

    /* ==========================================================
       RENDU
    ========================================================== */
    render() {
      const appDiv = document.getElementById('app');
      const pills = document.getElementById('pills');
      pills.innerHTML = '';

      if (this.fatal) { appDiv.innerHTML = `<div class="card"><div class="banner-error">⚠️ ${escapeHtml(this.fatal)}</div></div>`; return; }
      if (!this.uid) { appDiv.innerHTML = `<div class="card transition-screen"><div class="spinner"></div><p style="color:#cbd5e1;">Connexion…</p></div>`; return; }

      if (!this.code || !this.room) { appDiv.innerHTML = this.renderHome(); this.bindHome(); return; }

      // Pills (code room + manche)
      const phase = this.meta().phase;
      pills.innerHTML = `<span class="pill code" id="pillCode">CODE ${escapeHtml(this.code)} 📋</span>` +
        (this.meta().round > 0 && phase !== 'final' ? `<span class="pill round">Manche ${this.meta().round}</span>` : '');

      if (phase === 'lobby') appDiv.innerHTML = this.renderLobby();
      else if (phase === 'propose') appDiv.innerHTML = this.renderPropose();
      else if (phase === 'vote') appDiv.innerHTML = this.renderVote();
      else if (phase === 'results') { appDiv.innerHTML = this.renderResults(); setTimeout(() => document.querySelectorAll('.vote-bar-fill').forEach(b => b.style.width = b.dataset.w), 80); }
      else if (phase === 'final') appDiv.innerHTML = this.renderFinal();

      this.bindRoom();
    }

    renderHome() {
      return `
        <div class="card">
          ${this.error ? `<div class="banner-error">${escapeHtml(this.error)}</div>` : ''}
          <div class="rules-box">
            <h3>📜 Le principe</h3>
            <ul class="rules-list">
              <li>⚡ <strong>1.</strong> Le jeu donne un super-pouvoir à tout le monde.</li>
              <li>😈 <strong>2.</strong> Chacun invente en secret une contrepartie ("...mais...").</li>
              <li>🗳️ <strong>3.</strong> Tout le monde vote sur chaque contrepartie (sauf la sienne).</li>
              <li>⚖️ <strong>4.</strong> Tu marques un max de points en t'approchant du <strong>50/50</strong> !</li>
            </ul>
          </div>
          <div class="input-group">
            <label>Ton pseudo</label>
            <input type="text" id="pseudo" maxlength="16" placeholder="Ton prénom..." value="${escapeHtml(this.pseudo)}">
          </div>
          <button id="btnCreate">🚀 Créer une partie</button>
          <div style="text-align:center; color:#64748b; margin:18px 0; font-weight:700;">— ou —</div>
          <div class="input-group">
            <label>Rejoindre avec un code</label>
            <input type="text" id="joinCode" maxlength="4" class="code-input" placeholder="ABCD">
          </div>
          <button id="btnJoin" class="secondary">Rejoindre la partie</button>
        </div>`;
    }

    renderPlayerTags(opts = {}) {
      const players = this.players();
      const props = this.proposals();
      return Object.keys(players).map(id => {
        const p = players[id];
        const host = this.meta().hostId === id;
        const submitted = opts.showSubmitted && props[id];
        const canKick = this.isHost() && id !== this.uid && this.meta().phase === 'lobby';
        return `<span class="player-tag">
          <span class="dot ${p.connected ? '' : 'off'}"></span>${escapeHtml(p.name)}
          ${host ? '<span class="crown">👑</span>' : ''}
          ${submitted ? '<span class="check">✓</span>' : ''}
          ${canKick ? `<span class="remove-x" data-action="kick" data-id="${id}">✖</span>` : ''}
        </span>`;
      }).join('');
    }

    renderLeaderboard() {
      const players = this.players();
      if (Object.values(players).every(p => !p.score)) return '';
      const sorted = Object.values(players).sort((a, b) => (b.score || 0) - (a.score || 0));
      const medals = ['🥇', '🥈', '🥉'];
      return `<div class="leaderboard"><h3>🏅 Classement</h3>${sorted.map((p, i) =>
        `<div class="lb-row ${i === 0 ? 'lead' : ''}"><span class="lb-rank">${medals[i] || (i + 1)}</span><span class="lb-name">${escapeHtml(p.name)}</span><span class="lb-score">${p.score || 0} pts</span></div>`).join('')}</div>`;
    }

    renderLobby() {
      const spice = this.meta().spice || 2;
      const count = this.connectedIds().length;
      const custom = this.room.customScenarios || {};
      return `
        <div class="card">
          ${this.renderLeaderboard()}
          <div class="info-box ok">Partagez le code <strong>${escapeHtml(this.code)}</strong> aux autres joueurs pour qu'ils rejoignent !</div>
          <h2 style="text-align:center; margin-bottom:18px; font-weight:800;">👥 Salon (${count})</h2>
          <div style="margin-bottom: 25px; display:flex; flex-wrap:wrap; justify-content:center;">${this.renderPlayerTags()}</div>

          ${this.isHost() ? `
            <div class="spice-select">
              <label style="text-align:center;">🔥 Intensité</label>
              <div class="spice-row">${[1,2,3].map(l => `<button class="spice-btn ${spice === l ? 'active' : ''}" data-action="spice" data-level="${l}">${SPICE_LABELS[l]}</button>`).join('')}</div>
              <p class="hint">${spice === 3 ? 'Humour noir / contenu border assumé 💀' : spice === 1 ? 'Tranquille, sortable en famille.' : 'Le bon équilibre pour chauffer la salle.'}</p>
            </div>
            <div class="custom-box">
              <label style="text-align:center;">✍️ Scénarios maison <span style="color:#64748b;">(facultatif)</span></label>
              <div style="margin:10px 0; display:flex; flex-wrap:wrap; justify-content:center;">
                ${Object.keys(custom).map(id => `<span class="player-tag" style="max-width:100%;">${escapeHtml(custom[id].text)} <span class="remove-x" data-action="rmscenario" data-id="${id}">✖</span></span>`).join('')}
              </div>
              <div class="input-group" style="margin-bottom:12px;"><input type="text" id="newScenario" maxlength="90" placeholder="Vous pouvez parler aux fantômes..."></div>
              <button id="btnAddScenario" class="ghost">+ Ajouter ce scénario</button>
            </div>
            <button id="btnStart" ${count >= MIN_PLAYERS ? '' : 'disabled'}>🎬 ${this.meta().round > 0 ? 'Manche suivante' : 'Lancer la partie'}</button>
            ${count < MIN_PLAYERS ? `<p class="hint">Il faut au moins ${MIN_PLAYERS} joueurs connectés.</p>` : ''}
          ` : `<div class="info-box">En attente de l'hôte 👑 pour lancer la manche…</div>`}
          <button id="btnQuit" class="ghost" style="margin-top:14px;">🚪 Quitter</button>
        </div>`;
    }

    renderScenarioCard(small) {
      const m = this.meta();
      return `<div class="card scenario-card" ${small ? 'style="padding:25px;"' : ''}>
        <div class="scenario-label">${small ? 'Rappel' : 'Le Scénario'}</div>
        <div class="${small ? '' : 'scenario-text'}" style="${small ? 'font-size:20px;font-weight:800;' : ''}">${escapeHtml(m.scenario)}</div>
        ${(!small && m.secretRule) ? `<div class="secret-rule-box"><div class="secret-rule-title">⚠️ Règle Secrète ⚠️</div><div style="font-size:16px;font-weight:600;">${escapeHtml(m.secretRule)}</div></div>` : ''}
      </div>`;
    }

    renderPropose() {
      const props = this.proposals();
      const mine = props[this.uid];
      const total = this.activeRoundPlayers().length;
      const done = this.activeRoundPlayers().filter(id => props[id]).length;
      if (mine) {
        return this.renderScenarioCard(true) + `
          <div class="card transition-screen">
            <div class="transition-icon">⏳</div>
            <h2 style="margin-bottom:10px;">Proposition envoyée !</h2>
            <div class="progress-text">${done}/${total}</div>
            <p style="color:#cbd5e1;">On attend les autres joueurs…</p>
            <div style="margin-top:20px; display:flex; flex-wrap:wrap; justify-content:center;">${this.renderPlayerTags({ showSubmitted: true })}</div>
            ${this.isHost() && done >= MIN_PLAYERS ? `<button id="btnForce" class="ghost" style="margin-top:20px;">⏭️ Forcer le vote (sans les retardataires)</button>` : ''}
          </div>`;
      }
      return this.renderScenarioCard(false) + `
        <div class="card">
          <div class="input-group">
            <label>Ta pire contrepartie (objectif : 50% de oui)</label>
            <textarea id="txtProposal" placeholder="...mais tu dois manger un citron chaque matin."></textarea>
          </div>
          <button id="btnSubmitProposal">Valider en secret</button>
        </div>`;
    }

    renderVote() {
      const order = this.meta().order || [];
      const votes = this.votes();
      const votable = order.filter(a => a !== this.uid);
      const next = votable.find(a => !(votes[a] && votes[a][this.uid] !== undefined));

      if (!next) {
        const voters = this.activeRoundPlayers();
        const done = voters.filter(v => this.voterDone(v)).length;
        return this.renderScenarioCard(true) + `
          <div class="card transition-screen">
            <div class="transition-icon">🗳️</div>
            <h2 style="margin-bottom:10px;">Vote terminé !</h2>
            <div class="progress-text">${done}/${voters.length}</div>
            <p style="color:#cbd5e1;">On attend les derniers votes…</p>
            ${this.isHost() ? `<button id="btnForce" class="ghost" style="margin-top:20px;">⏭️ Forcer les résultats</button>` : ''}
          </div>`;
      }

      const proposal = this.proposals()[next];
      const pos = votable.filter(a => votes[a] && votes[a][this.uid] !== undefined).length + 1;
      return this.renderScenarioCard(true) + `
        <div class="card">
          <div class="info-box">À ton tour de voter. (${pos}/${votable.length})</div>
          <div style="background: rgba(0,0,0,0.3); padding: 30px; border-radius: 16px; text-align: center; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05);">
            <p style="color:#94a3b8; font-size:14px; margin-bottom:15px; text-transform:uppercase; letter-spacing:1px; font-weight:800;">La contrepartie proposée :</p>
            <h3 style="font-size:24px; color:#fff; font-weight:800;">"... ${escapeHtml(proposal.text)}"</h3>
          </div>
          <div class="vote-buttons">
            <button class="vote-btn yes" data-action="vote" data-author="${next}" data-value="yes">J'ACCEPTE</button>
            <button class="vote-btn no" data-action="vote" data-author="${next}" data-value="no">JE REFUSE</button>
          </div>
        </div>`;
    }

    renderResults() {
      const order = this.meta().order || [];
      const votes = this.votes();
      const props = this.proposals();
      const players = this.players();
      const rows = order.map(authorId => {
        const v = votes[authorId] || {};
        const entries = Object.entries(v);
        const yes = entries.filter(([, x]) => x === 'yes').map(([id]) => players[id] ? players[id].name : '?');
        const no = entries.filter(([, x]) => x === 'no').map(([id]) => players[id] ? players[id].name : '?');
        const total = yes.length + no.length;
        const yesPercent = total > 0 ? (yes.length / total) * 100 : 0;
        return {
          authorId, text: props[authorId] ? props[authorId].text : '',
          authorName: players[authorId] ? players[authorId].name : '???',
          yesPercent, deviation: Math.abs(50 - yesPercent), points: pointsFromDeviation(Math.abs(50 - yesPercent)),
          title: honoraryTitle(yesPercent), yes, no
        };
      }).sort((a, b) => a.deviation - b.deviation);

      return this.renderScenarioCard(true) + `
        <div class="card">
          <h2 style="text-align:center; margin-bottom:25px; font-size:32px; font-weight:900;">🏆 Résultats</h2>
          ${rows.map((r, i) => `
            <div class="result-item ${i === 0 ? 'winner' : ''}">
              ${i === 0 ? '<span class="winner-badge">Dilemme Parfait !</span>' : ''}
              <h3 style="font-size:20px; margin-bottom:15px; color:#fff; font-weight:800;">"... ${escapeHtml(r.text)}"</h3>
              <div class="vote-bar-container"><div class="vote-bar-fill" data-w="${r.yesPercent}%">${Math.round(r.yesPercent)}% OUI</div></div>
              <div class="points-tag">+${r.points} pts</div>
              <div class="author-line">
                <div class="author-title">${escapeHtml(r.title)}</div>
                <div class="author-name">👑 ${escapeHtml(r.authorName)}</div>
              </div>
              <div class="who-voted">
                <div style="flex:1;"><span style="color:#00e676; font-weight:900; display:block; margin-bottom:5px;">✅ OUI</span><span style="color:#e2e8f0;">${r.yes.map(escapeHtml).join('<br>') || 'Aucun'}</span></div>
                <div style="width:1px; background:rgba(255,255,255,0.1);"></div>
                <div style="flex:1;"><span style="color:#ff1744; font-weight:900; display:block; margin-bottom:5px;">❌ NON</span><span style="color:#e2e8f0;">${r.no.map(escapeHtml).join('<br>') || 'Aucun'}</span></div>
              </div>
            </div>`).join('')}
          ${this.renderLeaderboard()}
          ${this.isHost()
            ? `<button id="btnNextRound" style="margin-top:10px;">▶️ Manche suivante</button><button id="btnFinish" class="secondary">🏁 Terminer la partie</button>`
            : `<div class="info-box">En attente de l'hôte 👑…</div>`}
        </div>`;
    }

    renderFinal() {
      const sorted = Object.values(this.players()).sort((a, b) => (b.score || 0) - (a.score || 0));
      const top = sorted.slice(0, 3);
      const order = [1, 0, 2]; const heights = { 0: 130, 1: 95, 2: 70 };
      const colors = { 0: 'linear-gradient(180deg,#ffd700,#bfa100)', 1: 'linear-gradient(180deg,#c0c0c0,#8a8a8a)', 2: 'linear-gradient(180deg,#cd7f32,#8a5524)' };
      const medals = ['🥇', '🥈', '🥉'];
      return `
        <div class="card" style="text-align:center;">
          <h2 style="font-size:34px; font-weight:900; margin-bottom:6px;">🎉 Partie terminée !</h2>
          <p style="color:#a0aec0; margin-bottom:30px; font-weight:600;">${this.meta().round} manche(s) jouée(s)</p>
          <div class="podium">
            ${order.filter(i => top[i]).map(i => `<div class="podium-col">
              <div class="podium-name">${medals[i]} ${escapeHtml(top[i].name)}</div>
              <div class="podium-bar" style="height:${heights[i]}px; background:${colors[i]}; color:#1a1a2e;">${top[i].score || 0}</div>
              <div class="podium-score">pts</div></div>`).join('')}
          </div>
          ${sorted.length > 3 ? `<div class="leaderboard">${sorted.slice(3).map((p, i) => `<div class="lb-row"><span class="lb-rank">${i + 4}</span><span class="lb-name">${escapeHtml(p.name)}</span><span class="lb-score">${p.score || 0} pts</span></div>`).join('')}</div>` : ''}
          ${this.isHost() ? `<button id="btnLobby" style="margin-top:20px;">🔁 Retour au salon (rejouer)</button>` : `<div class="info-box">En attente de l'hôte 👑…</div>`}
          <button id="btnQuit" class="ghost" style="margin-top:14px;">🚪 Quitter</button>
        </div>`;
    }

    /* ---------- Bindings ---------- */
    bindHome() {
      const pseudo = document.getElementById('pseudo');
      if (pseudo) pseudo.oninput = (e) => { this.pseudo = e.target.value; };
      const c = document.getElementById('btnCreate'); if (c) c.onclick = () => this.createRoom();
      const j = document.getElementById('btnJoin'); if (j) j.onclick = () => this.joinRoom(document.getElementById('joinCode').value);
    }

    bindRoom() {
      const app = document.getElementById('app');
      const pillCode = document.getElementById('pillCode');
      if (pillCode) pillCode.onclick = () => {
        navigator.clipboard && navigator.clipboard.writeText(this.code);
        pillCode.textContent = 'COPIÉ ✓';
        setTimeout(() => { if (document.getElementById('pillCode')) document.getElementById('pillCode').textContent = `CODE ${this.code} 📋`; }, 1200);
      };

      const bind = (id, fn) => { const el = document.getElementById(id); if (el) el.onclick = fn; };
      bind('btnStart', () => this.startRound());
      bind('btnSubmitProposal', () => this.submitProposal(document.getElementById('txtProposal').value));
      bind('btnForce', () => this.forceNext());
      bind('btnNextRound', () => this.nextRound());
      bind('btnFinish', () => this.finishGame());
      bind('btnLobby', () => this.backToLobby());
      bind('btnQuit', () => this.quitRoom());

      const addSc = document.getElementById('btnAddScenario');
      const scIn = document.getElementById('newScenario');
      if (addSc && scIn) {
        addSc.onclick = () => this.addCustomScenario(scIn.value);
        scIn.onkeypress = (e) => { if (e.key === 'Enter') this.addCustomScenario(scIn.value); };
        if (this.focusScenario) { scIn.focus(); this.focusScenario = false; }
      }

      app.onclick = (e) => {
        const el = e.target.closest('[data-action]');
        if (!el) return;
        const a = el.dataset.action;
        if (a === 'spice') this.setSpice(parseInt(el.dataset.level, 10));
        else if (a === 'rmscenario') this.removeCustomScenario(el.dataset.id);
        else if (a === 'kick') this.kickPlayer(el.dataset.id);
        else if (a === 'vote') this.submitVote(el.dataset.author, el.dataset.value);
      };
    }
  }

  window.app = new App();
</script>
</body>
</html>
