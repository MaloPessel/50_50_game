<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>50/50 - Le Jeu du Dilemme (Pass & Play)</title>
  <style>
    /* ===== TON STYLE CONSERVÉ ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; color: #333; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; color: white; }
    .header h1 { font-size: 48px; font-weight: 800; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
    .header .subtitle { font-size: 18px; opacity: 0.95; }
    .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin-bottom: 20px; }
    .scenario-card { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; text-align: center; padding: 40px 30px; }
    .scenario-text { font-size: 24px; font-weight: 600; line-height: 1.4; margin-bottom: 15px; word-wrap: break-word; }
    .scenario-label { font-size: 14px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 14px; }
    input, textarea { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; font-family: inherit; transition: border-color 0.3s; }
    input:focus, textarea:focus { outline: none; border-color: #667eea; }
    textarea { resize: vertical; min-height: 100px; }
    button { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); }
    button.secondary { background: #6c757d; margin-top: 10px; }
    .vote-buttons { display: flex; gap: 10px; margin-top: 15px; }
    .vote-btn { flex: 1; padding: 12px; border: 2px solid; background: white; border-radius: 10px; font-weight: 700; cursor: pointer; transition: all 0.3s; font-size: 16px; }
    .vote-btn.yes { border-color: #10b981; color: #10b981; }
    .vote-btn.yes:hover { background: #10b981; color: white; }
    .vote-btn.no { border-color: #ef4444; color: #ef4444; }
    .vote-btn.no:hover { background: #ef4444; color: white; }
    .result-item { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 3px solid #e0e0e0; position: relative; }
    .result-item.winner { border-color: #fbbf24; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }
    .winner-badge { position: absolute; top: 15px; right: 15px; background: #fbbf24; color: #92400e; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .vote-bar-container { position: relative; height: 30px; background: #e0e0e0; border-radius: 15px; overflow: hidden; margin: 10px 0; }
    .vote-bar { position: absolute; left: 0; top: 0; height: 100%; background: #10b981; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 12px; }
    .info-box { background: #eff6ff; border-left: 4px solid #3b82f6; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; color: #1e40af; }
    .player-tag { display: inline-block; background: #e0e7ff; color: #3730a3; padding: 5px 10px; border-radius: 15px; margin: 5px; font-weight: 600; font-size: 14px; }
    .transition-screen { text-align: center; padding: 40px 20px; }
    .transition-icon { font-size: 64px; margin-bottom: 20px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>50/50</h1>
    <div class="subtitle">Passe le téléphone ! 📱</div>
  </div>
  <div id="app"></div>
</div>

<script type="module">
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function generateId() {
    return Math.random().toString(36).substring(2, 9);
  }

  const SCENARIOS = [
    "Vous gagnez 10 millions d'euros", "Vous pouvez voler comme un oiseau",
    "Vous avez la capacité de lire dans les pensées", "Vous découvrez le secret de l'immortalité",
    "Vous devenez instantanément célèbre", "Vous avez une santé parfaite"
  ];

  class Game {
    constructor() {
      this.players = [];
      this.phase = 'setup'; // setup, transition_propose, propose, transition_vote, vote, results
      this.currentPlayerIndex = 0;
      this.currentVoteIndex = 0;
      this.scenario = '';
      this.proposals = [];
      this.votes = {}; // format: { proposalId: { yes: [], no: [] } }
      
      this.render();
    }

    // --- ACTIONS DU JEU ---

    addPlayer(name) {
      const cleanName = name.trim();
      if (cleanName && !this.players.includes(cleanName)) {
        this.players.push(cleanName);
        this.render();
      }
    }

    removePlayer(name) {
      this.players = this.players.filter(p => p !== name);
      this.render();
    }

    startGame() {
      if (this.players.length < 2) return alert("Il faut au moins 2 joueurs !");
      this.scenario = SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)];
      this.proposals = [];
      this.votes = {};
      this.currentPlayerIndex = 0;
      this.phase = 'transition_propose';
      this.render();
    }

    readyForTurn() {
      if (this.phase === 'transition_propose') this.phase = 'propose';
      if (this.phase === 'transition_vote') this.phase = 'vote';
      this.render();
    }

    submitProposal(text) {
      if (!text.trim()) return;
      
      this.proposals.push({
        id: generateId(),
        author: this.players[this.currentPlayerIndex],
        text: text.trim()
      });

      this.currentPlayerIndex++;
      
      if (this.currentPlayerIndex >= this.players.length) {
        // Tous les joueurs ont proposé, on passe au vote
        this.currentPlayerIndex = 0;
        this.currentVoteIndex = 0;
        this.phase = 'transition_vote';
      } else {
        // Au joueur suivant
        this.phase = 'transition_propose';
      }
      this.render();
    }

    submitVote(voteValue) {
      const currentProposal = this.proposals[this.currentVoteIndex];
      const currentPlayer = this.players[this.currentPlayerIndex];

      if (!this.votes[currentProposal.id]) {
        this.votes[currentProposal.id] = { yes: [], no: [] };
      }

      this.votes[currentProposal.id][voteValue].push(currentPlayer);
      this.currentVoteIndex++;

      // Si le joueur a voté pour toutes les propositions
      if (this.currentVoteIndex >= this.proposals.length) {
        this.currentVoteIndex = 0;
        this.currentPlayerIndex++;

        // Si tous les joueurs ont fini de voter
        if (this.currentPlayerIndex >= this.players.length) {
          this.calculateResults();
          this.phase = 'results';
        } else {
          // Joueur suivant
          this.phase = 'transition_vote';
        }
      }
      this.render();
    }

    calculateResults() {
      this.results = this.proposals.map(p => {
        const v = this.votes[p.id] || { yes: [], no: [] };
        const totalVotes = v.yes.length + v.no.length;
        const yesPercent = totalVotes > 0 ? (v.yes.length / totalVotes) * 100 : 0;
        return {
          ...p,
          yesPercent: yesPercent,
          deviation: Math.abs(50 - yesPercent), // Pour trouver le plus proche de 50/50
          totalVotes: totalVotes
        };
      });
      // Trier par le plus proche de 50%
      this.results.sort((a, b) => a.deviation - b.deviation);
    }

    resetGame() {
      this.phase = 'setup';
      this.render();
    }

    // --- RENDU HTML ---

    render() {
      const appDiv = document.getElementById('app');
      
      if (this.phase === 'setup') appDiv.innerHTML = this.renderSetup();
      else if (this.phase === 'transition_propose' || this.phase === 'transition_vote') appDiv.innerHTML = this.renderTransition();
      else if (this.phase === 'propose') appDiv.innerHTML = this.renderPropose();
      else if (this.phase === 'vote') appDiv.innerHTML = this.renderVote();
      else if (this.phase === 'results') appDiv.innerHTML = this.renderResults();

      this.attachEventListeners();
    }

    renderSetup() {
      return `
        <div class="card">
          <h2 style="text-align:center; margin-bottom:20px;">👥 Les Joueurs</h2>
          <div class="info-box">Ajoutez tous les joueurs présents. Chacun jouera à tour de rôle sur cet appareil.</div>
          
          <div style="margin-bottom: 20px;">
            ${this.players.map(p => `<span class="player-tag">${escapeHtml(p)} <span style="cursor:pointer; color:#ef4444;" onclick="window.game.removePlayer('${escapeHtml(p)}')">✖</span></span>`).join('')}
            ${this.players.length === 0 ? '<em style="color:#999; font-size:14px;">Aucun joueur pour le moment...</em>' : ''}
          </div>

          <div class="input-group">
            <input type="text" id="newPlayerName" placeholder="Prénom du joueur..." onkeypress="if(event.key === 'Enter') document.getElementById('btnAddPlayer').click()">
          </div>
          <button id="btnAddPlayer" class="secondary" style="margin-bottom: 20px;">+ Ajouter</button>
          
          <button id="btnStartGame" ${this.players.length < 2 ? 'style="opacity:0.5; cursor:not-allowed;"' : ''}>▶️ Lancer la partie</button>
        </div>`;
    }

    renderTransition() {
      const action = this.phase === 'transition_propose' ? 'faire sa proposition' : 'voter';
      const player = escapeHtml(this.players[this.currentPlayerIndex]);
      return `
        <div class="card transition-screen">
          <div class="transition-icon">🤫</div>
          <h2 style="margin-bottom: 15px;">Passez le téléphone à <strong style="color: #667eea;">${player}</strong></h2>
          <p style="color: #666; margin-bottom: 30px;">Ne regardez pas l'écran, c'est à ${player} de ${action} !</p>
          <button id="btnReady">C'est bien moi, je suis prêt !</button>
        </div>`;
    }

    renderPropose() {
      const player = escapeHtml(this.players[this.currentPlayerIndex]);
      return `
        <div class="card scenario-card">
          <div class="scenario-label">Le Scénario</div>
          <div class="scenario-text">${escapeHtml(this.scenario)}</div>
        </div>
        <div class="card">
          <div class="info-box">Au tour de <strong>${player}</strong> de faire une proposition !</div>
          <div class="input-group">
            <label>Ta contrepartie (pour diviser le groupe en 50/50)</label>
            <textarea id="txtProposal" placeholder="Ex: Mais tu dois manger un citron chaque matin..."></textarea>
          </div>
          <button id="btnSubmitProposal">Valider ma proposition</button>
        </div>`;
    }

    renderVote() {
      const player = escapeHtml(this.players[this.currentPlayerIndex]);
      const proposal = this.proposals[this.currentVoteIndex];
      return `
        <div class="card scenario-card">
          <div class="scenario-label">Rappel du Scénario</div>
          <div style="font-size: 18px; font-weight: 600;">${escapeHtml(this.scenario)}</div>
        </div>
        <div class="card">
          <div class="info-box"><strong>${player}</strong>, vote ! (Proposition ${this.currentVoteIndex + 1}/${this.proposals.length})</div>
          
          <div style="background: #f8f9fa; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px;">
            <p style="color: #666; font-size: 14px; margin-bottom: 10px;">Quelqu'un a proposé :</p>
            <h3 style="font-size: 22px; color: #333;">"... ${escapeHtml(proposal.text)}"</h3>
          </div>

          <div class="vote-buttons">
            <button class="vote-btn yes" onclick="window.game.submitVote('yes')">J'ACCEPTE</button>
            <button class="vote-btn no" onclick="window.game.submitVote('no')">JE REFUSE</button>
          </div>
        </div>`;
    }

    renderResults() {
      return `
        <div class="card scenario-card" style="padding: 20px;">
          <div class="scenario-label">Scénario de base</div>
          <div style="font-size: 18px;">${escapeHtml(this.scenario)}</div>
        </div>
        <div class="card">
          <h2 style="text-align:center; margin-bottom: 25px;">🏆 Résultats</h2>
          ${this.results.map((r, i) => `
            <div class="result-item ${i === 0 ? 'winner' : ''}">
              ${i === 0 ? '<span class="winner-badge">Le Dilemme Parfait !</span>' : ''}
              <p style="margin-bottom: 10px;"><strong>${escapeHtml(r.author)}</strong> avait proposé : <br/><em>"${escapeHtml(r.text)}"</em></p>
              <div class="vote-bar-container">
                <div class="vote-bar" style="width: ${r.yesPercent}%">${Math.round(r.yesPercent)}% Oui</div>
              </div>
            </div>
          `).join('')}
          <button id="btnReset" style="margin-top: 20px;">Rejouer une partie</button>
        </div>`;
    }

    attachEventListeners() {
      const btnAddPlayer = document.getElementById('btnAddPlayer');
      if (btnAddPlayer) {
        btnAddPlayer.onclick = () => {
          const input = document.getElementById('newPlayerName');
          this.addPlayer(input.value);
          input.value = '';
          input.focus();
        };
      }

      const btnStartGame = document.getElementById('btnStartGame');
      if (btnStartGame) btnStartGame.onclick = () => this.startGame();

      const btnReady = document.getElementById('btnReady');
      if (btnReady) btnReady.onclick = () => this.readyForTurn();

      const btnSubmitProposal = document.getElementById('btnSubmitProposal');
      if (btnSubmitProposal) btnSubmitProposal.onclick = () => {
        this.submitProposal(document.getElementById('txtProposal').value);
      };

      const btnReset = document.getElementById('btnReset');
      if (btnReset) btnReset.onclick = () => this.resetGame();
    }
  }

  // Initialisation
  window.game = new Game();
</script>
</body>
</html>
