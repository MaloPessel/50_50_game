<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>50/50 - Le Jeu du Dilemme Parfait (Multijoueur sécurisé)</title>
  <style>
    /* ===== TON STYLE EXISTANT (garde-le exactement comme avant) ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
      color: white;
    }
    .header h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    .header .subtitle {
      font-size: 18px;
      opacity: 0.95;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }
    .scenario-card {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      text-align: center;
      padding: 40px 30px;
    }
    .scenario-text {
      font-size: 24px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 15px;
      word-wrap: break-word;
    }
    .scenario-label {
      font-size: 14px;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }
    .phase-indicator {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
      gap: 10px;
    }
    .phase-step {
      flex: 1;
      text-align: center;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #999;
      transition: all 0.3s;
    }
    .phase-step.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      transform: scale(1.05);
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
      font-size: 14px;
    }
    input, textarea {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.3s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    button.secondary {
      background: #6c757d;
      margin-top: 10px;
    }
    .proposal-item {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      border: 2px solid transparent;
      transition: all 0.3s;
    }
    .proposal-item:hover {
      border-color: #667eea;
    }
    .proposal-author {
      font-weight: 700;
      color: #667eea;
      margin-bottom: 8px;
      font-size: 14px;
      word-break: break-word;
    }
    .proposal-text {
      font-size: 16px;
      color: #333;
      margin-bottom: 15px;
      line-height: 1.5;
    }
    .vote-buttons {
      display: flex;
      gap: 10px;
    }
    .vote-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid;
      background: white;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 16px;
    }
    .vote-btn.yes {
      border-color: #10b981;
      color: #10b981;
    }
    .vote-btn.yes:hover, .vote-btn.yes.selected {
      background: #10b981;
      color: white;
    }
    .vote-btn.no {
      border-color: #ef4444;
      color: #ef4444;
    }
    .vote-btn.no:hover, .vote-btn.no.selected {
      background: #ef4444;
      color: white;
    }
    .result-item {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      border: 3px solid #e0e0e0;
      position: relative;
    }
    .result-item.winner {
      border-color: #fbbf24;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    }
    .winner-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #fbbf24;
      color: #92400e;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .result-author {
      font-weight: 700;
      color: #667eea;
    }
    .result-score {
      font-size: 24px;
      font-weight: 800;
    }
    .result-score.perfect {
      color: #10b981;
    }
    .vote-bar-container {
      position: relative;
      height: 30px;
      background: #e0e0e0;
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .vote-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: linear-gradient(90deg, #10b981 0%, #34d399 100%);
      transition: width 0.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }
    .vote-bar-no {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      background: linear-gradient(90deg, #f87171 0%, #ef4444 100%);
      transition: width 0.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }
    .vote-stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #666;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    .countdown {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 15px;
      font-weight: 600;
    }
    .player-count {
      text-align: center;
      margin-top: 15px;
      padding: 12px;
      background: #f0fdf4;
      border-radius: 10px;
      color: #166534;
      font-weight: 600;
      font-size: 14px;
    }
    .info-box {
      background: #eff6ff;
      border-left: 4px solid #3b82f6;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #1e40af;
    }
    .error-box {
      background: #fee;
      border-left: 4px solid #ef4444;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #991b1b;
    }
    .room-code {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      margin-bottom: 20px;
      font-family: monospace;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    @media (max-width: 640px) {
      .header h1 { font-size: 36px; }
      .scenario-text { font-size: 20px; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>50/50</h1>
    <div class="subtitle">Le jeu du dilemme parfait - Multijoueur sécurisé</div>
  </div>
  <div id="app"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBPbFNDsn5CVF-4krrYtw1z2IzwkkILLoE",
    authDomain: "game-ef3a0.firebaseapp.com",
    databaseURL: "https://game-ef3a0-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "game-ef3a0",
    storageBucket: "game-ef3a0.firebasestorage.app",
    messagingSenderId: "1091069158786",
    appId: "1:1091069158786:web:fd14c503c7726de7a51b9b",
    measurementId: "G-ZMJ2TLB230"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // ========== SECURITE ==========
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  function sanitizeUsername(name) {
    if (typeof name !== 'string') return '';
    return name.trim().slice(0, 20).replace(/\s+/g, ' ');
  }
  function sanitizeText(text) {
    if (typeof text !== 'string') return '';
    return text.trim().slice(0, 500).replace(/\s+/g, ' ');
  }
  function validateGameData(game) {
    if (!game || typeof game !== 'object') return false;
    if (typeof game.scenario !== 'string' || game.scenario.length > 500) return false;
    if (!['propose', 'vote', 'results'].includes(game.phase)) return false;
    if (!Array.isArray(game.proposals)) return false;
    if (typeof game.votes !== 'object') return false;
    return true;
  }

  const PHASE_DURATION = { propose: 120000, vote: 180000 };

  class Game {
    constructor() {
      this.userId = null;
      this.displayName = null;
      this.currentGame = null;
      this.roomId = null;
      this.unsubscribe = null;
      this.errorMessage = null;
      this.phaseInterval = null;
      this.isTyping = false;
      this.initAuth();
    }

    async initAuth() {
      try {
        const userCred = await signInAnonymously(auth);
        this.userId = userCred.user.uid;
        console.log("✅ Authentifié avec UID:", this.userId);
        
        const savedName = localStorage.getItem('game50_playerName');
        if (savedName) {
          this.displayName = sanitizeUsername(savedName);
          console.log("📛 Pseudo chargé:", this.displayName);
        }
        
        const savedRoom = localStorage.getItem('game50_currentRoom');
        if (savedRoom && this.displayName) {
          console.log("🏠 Salon en cours détecté, tentative de reconnexion...");
          await this.joinRoomById(savedRoom);
        } else {
          this.render();
        }
        
        this.phaseInterval = setInterval(() => this.checkPhaseTimeout(), 1000);
        
        document.addEventListener('focusin', (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') this.isTyping = true;
        });
        document.addEventListener('focusout', (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
            this.isTyping = false;
            this.render();
          }
        });
      } catch (err) {
        console.error("❌ Erreur d'authentification:", err);
        this.errorMessage = "Impossible de se connecter au serveur. Vérifie ta connexion internet.";
        this.render();
      }
    }

    async savePlayerName(name) {
      const sanitized = sanitizeUsername(name);
      if (!sanitized) {
        this.errorMessage = 'Pseudo invalide (vide ou trop d\'espaces)';
        this.render();
        return false;
      }
      this.displayName = sanitized;
      localStorage.setItem('game50_playerName', sanitized);
      this.errorMessage = null;
      console.log("✅ Pseudo enregistré:", this.displayName);
      this.render(); // ← passe du formulaire au lobby
      return true;
    }

    async createRoom(scenario) {
      const sanitizedScenario = sanitizeText(scenario);
      if (!sanitizedScenario) {
        this.errorMessage = 'Scénario invalide';
        this.render();
        return;
      }
      const id = Math.random().toString(36).substring(2, 8).toUpperCase();
      this.roomId = id;
      const gameData = {
        scenario: sanitizedScenario,
        phase: 'propose',
        phaseStartTime: Date.now(),
        proposals: [],
        votes: {},
        createdAt: Date.now()
      };
      try {
        await set(ref(db, 'rooms/' + id), gameData);
        localStorage.setItem('game50_currentRoom', id);
        this.currentGame = gameData;
        this.setupRoomListener();
        this.errorMessage = null;
        this.render();
        alert(`✅ Salon créé !\nCode : ${id}\nPartage ce code avec tes amis.`);
      } catch (err) {
        console.error(err);
        this.errorMessage = 'Erreur lors de la création du salon';
        this.render();
      }
    }

    async joinRoomById(roomId) {
      if (!roomId) return;
      const cleanId = roomId.trim().toUpperCase();
      try {
        const snapshot = await get(ref(db, 'rooms/' + cleanId));
        if (snapshot.exists()) {
          this.roomId = cleanId;
          this.currentGame = snapshot.val();
          localStorage.setItem('game50_currentRoom', cleanId);
          this.setupRoomListener();
          this.errorMessage = null;
          this.render();
        } else {
          this.errorMessage = 'Salon introuvable. Vérifie le code.';
          this.render();
        }
      } catch (err) {
        console.error(err);
        this.errorMessage = 'Erreur lors de la connexion au salon';
        this.render();
      }
    }

    setupRoomListener() {
      if (this.unsubscribe) this.unsubscribe();
      const roomRef = ref(db, 'rooms/' + this.roomId);
      this.unsubscribe = onValue(roomRef, (snapshot) => {
        if (snapshot.exists()) {
          const newData = snapshot.val();
          if (validateGameData(newData)) {
            this.currentGame = newData;
            if (!this.isTyping) this.render();
          } else {
            console.warn("Données de jeu invalides");
          }
        } else {
          this.resetGame();
          this.errorMessage = 'La partie a été terminée par le créateur.';
          this.render();
        }
      });
    }

    async saveGame() {
      if (!this.roomId || !this.currentGame) return;
      try {
        await set(ref(db, 'rooms/' + this.roomId), this.currentGame);
      } catch (err) {
        console.error("Erreur sauvegarde:", err);
      }
    }

    async deleteRoom() {
      if (!this.roomId) return;
      try {
        await remove(ref(db, 'rooms/' + this.roomId));
      } catch (err) {
        console.error("Erreur suppression:", err);
      }
    }

    async resetGame() {
      if (this.unsubscribe) {
        this.unsubscribe();
        this.unsubscribe = null;
      }
      if (this.roomId) await this.deleteRoom();
      this.currentGame = null;
      this.roomId = null;
      this.errorMessage = null;
      localStorage.removeItem('game50_currentRoom');
      this.render();
    }

    checkPhaseTimeout() {
      if (!this.currentGame) return;
      const now = Date.now();
      const elapsed = now - this.currentGame.phaseStartTime;
      let phaseChanged = false;
      if (this.currentGame.phase === 'propose' && elapsed > PHASE_DURATION.propose) {
        this.currentGame.phase = 'vote';
        this.currentGame.phaseStartTime = now;
        phaseChanged = true;
      } else if (this.currentGame.phase === 'vote' && elapsed > PHASE_DURATION.vote) {
        this.currentGame.phase = 'results';
        this.calculateResults();
        phaseChanged = true;
      }
      if (phaseChanged) {
        this.saveGame();
        if (!this.isTyping) this.render();
      }
    }

    getTimeRemaining() {
      if (!this.currentGame) return "0:00";
      const elapsed = Date.now() - this.currentGame.phaseStartTime;
      const duration = this.currentGame.phase === 'propose' ? PHASE_DURATION.propose : PHASE_DURATION.vote;
      const remaining = Math.max(0, duration - elapsed);
      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    async submitProposal(counterpart) {
      if (!this.userId || !this.displayName || !this.currentGame) return;
      if (this.currentGame.phase !== 'propose') {
        this.errorMessage = 'La phase de proposition est terminée.';
        this.render();
        return;
      }
      const sanitized = sanitizeText(counterpart);
      if (!sanitized) {
        this.errorMessage = 'Proposition invalide (vide ou trop longue).';
        this.render();
        return;
      }
      const existingIndex = this.currentGame.proposals.findIndex(p => p.userId === this.userId);
      const proposal = {
        userId: this.userId,
        author: this.displayName,
        text: sanitized,
        id: existingIndex >= 0 ? this.currentGame.proposals[existingIndex].id : Date.now()
      };
      if (existingIndex >= 0) {
        this.currentGame.proposals[existingIndex] = proposal;
      } else {
        this.currentGame.proposals.push(proposal);
      }
      this.errorMessage = null;
      await this.saveGame();
      if (!this.isTyping) this.render();
    }

    async submitVote(proposalId, vote) {
      if (!this.userId || !this.currentGame) return;
      if (this.currentGame.phase !== 'vote') {
        this.errorMessage = 'La phase de vote est terminée.';
        this.render();
        return;
      }
      if (vote !== 'yes' && vote !== 'no') return;
      if (!this.currentGame.votes[proposalId]) {
        this.currentGame.votes[proposalId] = { yes: [], no: [] };
      }
      const votesObj = this.currentGame.votes[proposalId];
      votesObj.yes = votesObj.yes.filter(uid => uid !== this.userId);
      votesObj.no = votesObj.no.filter(uid => uid !== this.userId);
      if (vote === 'yes') votesObj.yes.push(this.userId);
      else votesObj.no.push(this.userId);
      await this.saveGame();
      if (!this.isTyping) this.render();
    }

    calculateResults() {
      if (!this.currentGame) return;
      this.currentGame.results = this.currentGame.proposals.map(proposal => {
        const votes = this.currentGame.votes[proposal.id] || { yes: [], no: [] };
        const totalVotes = votes.yes.length + votes.no.length;
        const yesPercent = totalVotes > 0 ? (votes.yes.length / totalVotes) * 100 : 0;
        const deviation = Math.abs(50 - yesPercent);
        return {
          ...proposal,
          yesVotes: votes.yes.length,
          noVotes: votes.no.length,
          yesPercent: yesPercent,
          deviation: deviation
        };
      });
      this.currentGame.results.sort((a, b) => a.deviation - b.deviation);
    }

    // ---------- RENDU ----------
    render() {
      try {
        const appDiv = document.getElementById('app');
        if (!this.userId) {
          appDiv.innerHTML = `<div class="card"><div class="info-box">🔐 Connexion au serveur en cours...</div></div>`;
          return;
        }
        if (!this.displayName) {
          appDiv.innerHTML = this.renderNameEntry();
        } else if (!this.currentGame) {
          appDiv.innerHTML = this.renderLobby();
        } else {
          switch (this.currentGame.phase) {
            case 'propose': appDiv.innerHTML = this.renderProposePhase(); break;
            case 'vote': appDiv.innerHTML = this.renderVotePhase(); break;
            case 'results': appDiv.innerHTML = this.renderResults(); break;
            default: appDiv.innerHTML = '<div class="card">Erreur de phase</div>';
          }
        }
        this.attachEventListeners();
      } catch (err) {
        console.error("ERREUR RENDER:", err);
        document.getElementById('app').innerHTML = `<div class="card error-box">Erreur d'affichage: ${err.message}</div>`;
      }
    }

    renderNameEntry() {
      return `
        <div class="card">
          <h2 style="margin-bottom:20px;">Bienvenue !</h2>
          ${this.errorMessage ? `<div class="error-box">${escapeHtml(this.errorMessage)}</div>` : ''}
          <div class="info-box">Choisis un pseudo pour commencer à jouer.</div>
          <div class="input-group">
            <label>Ton pseudo</label>
            <input type="text" id="playerName" placeholder="Ex: Joueur01" maxlength="20" autocomplete="off">
          </div>
          <button id="submitName">Commencer</button>
        </div>
      `;
    }

    renderLobby() {
      // Vérification supplémentaire : si l'utilisateur n'a pas de pseudo, on ne doit pas arriver ici.
      if (!this.displayName) {
        console.warn("renderLobby appelé alors que displayName est null");
        return this.renderNameEntry();
      }
      return `
        <div class="card">
          <h2 style="margin-bottom:20px;">Menu principal</h2>
          <div class="info-box">👋 Bonjour ${escapeHtml(this.displayName)} !</div>
          ${this.errorMessage ? `<div class="error-box">${escapeHtml(this.errorMessage)}</div>` : ''}
          <div style="margin-bottom:30px;">
            <h3 style="margin-bottom:15px;color:#667eea;">🎲 Créer une partie</h3>
            <div class="input-group">
              <label>Scénario de départ</label>
              <textarea id="scenario" placeholder="Ex: Vous gagnez 10 millions d'euros..." maxlength="500">Vous gagnez 10 millions d'euros</textarea>
            </div>
            <button id="createGame">Créer un salon</button>
          </div>
          <div style="border-top:1px solid #e0e0e0; padding-top:20px;">
            <h3 style="margin-bottom:15px;color:#667eea;">🔗 Rejoindre une partie</h3>
            <div class="input-group">
              <label>Code du salon</label>
              <input type="text" id="roomCode" placeholder="Ex: AB3F7K" maxlength="6" style="text-transform:uppercase;" autocomplete="off">
            </div>
            <button id="joinGame">Rejoindre</button>
          </div>
        </div>
      `;
    }

    renderProposePhase() {
      const myProposal = this.currentGame.proposals.find(p => p.userId === this.userId);
      const timeRemaining = this.getTimeRemaining();
      return `
        <div class="card scenario-card">
          <div class="scenario-label">Scénario</div>
          <div class="scenario-text">${escapeHtml(this.currentGame.scenario)}</div>
        </div>
        <div class="card">
          <div class="phase-indicator">
            <div class="phase-step active">1. Propositions</div>
            <div class="phase-step">2. Votes</div>
            <div class="phase-step">3. Résultats</div>
          </div>
          <div class="room-code">🔑 Code salon : ${escapeHtml(this.roomId)}</div>
          ${this.errorMessage ? `<div class="error-box">${escapeHtml(this.errorMessage)}</div>` : ''}
          <div class="info-box">Propose une contrepartie qui divisera l'opinion en 50/50 !</div>
          <div class="input-group">
            <label>Ta contrepartie</label>
            <textarea id="counterpart" placeholder="Ex: Mais vous ne pourrez plus jamais manger de chocolat..." maxlength="500">${myProposal ? escapeHtml(myProposal.text) : ''}</textarea>
          </div>
          <button id="submitProposal">${myProposal ? 'Modifier ma proposition' : 'Envoyer ma proposition'}</button>
          ${myProposal ? '<div class="player-count">✓ Proposition enregistrée !</div>' : ''}
          <div class="countdown">⏱️ Temps restant : ${escapeHtml(timeRemaining)}</div>
          <div class="player-count">📝 ${this.currentGame.proposals.length} proposition${this.currentGame.proposals.length > 1 ? 's' : ''}</div>
          <button id="leaveGame" class="secondary" style="margin-top:15px;">Quitter la partie</button>
        </div>
      `;
    }

    renderVotePhase() {
      const timeRemaining = this.getTimeRemaining();
      return `
        <div class="card scenario-card">
          <div class="scenario-label">Scénario</div>
          <div class="scenario-text">${escapeHtml(this.currentGame.scenario)}</div>
        </div>
        <div class="card">
          <div class="phase-indicator">
            <div class="phase-step">1. Propositions</div>
            <div class="phase-step active">2. Votes</div>
            <div class="phase-step">3. Résultats</div>
          </div>
          <div class="room-code">🔑 Code salon : ${escapeHtml(this.roomId)}</div>
          <div class="info-box">Vote pour chaque proposition : accepterais-tu ce deal ?</div>
          <div class="countdown">⏱️ Temps restant : ${escapeHtml(timeRemaining)}</div>
          ${this.currentGame.proposals.length === 0 ? `
            <div class="empty-state"><div class="empty-state-icon">🤷</div><p>Aucune proposition n'a été faite...</p></div>
          ` : this.currentGame.proposals.map(proposal => {
            const votes = this.currentGame.votes[proposal.id] || { yes: [], no: [] };
            const myVote = votes.yes.includes(this.userId) ? 'yes' : votes.no.includes(this.userId) ? 'no' : null;
            return `
              <div class="proposal-item">
                <div class="proposal-author">${escapeHtml(proposal.author)}</div>
                <div class="proposal-text">${escapeHtml(proposal.text)}</div>
                <div class="vote-buttons">
                  <button class="vote-btn yes ${myVote === 'yes' ? 'selected' : ''}" data-proposal-id="${proposal.id}" data-vote="yes">${myVote === 'yes' ? '✓ ' : ''}OUI</button>
                  <button class="vote-btn no ${myVote === 'no' ? 'selected' : ''}" data-proposal-id="${proposal.id}" data-vote="no">${myVote === 'no' ? '✓ ' : ''}NON</button>
                </div>
              </div>
            `;
          }).join('')}
          <button id="leaveGame" class="secondary" style="margin-top:15px;">Quitter la partie</button>
        </div>
      `;
    }

    renderResults() {
      if (!this.currentGame.results || this.currentGame.results.length === 0) {
        return `
          <div class="card scenario-card"><div class="scenario-label">Scénario</div><div class="scenario-text">${escapeHtml(this.currentGame.scenario)}</div></div>
          <div class="card">
            <div class="phase-indicator"><div class="phase-step">1. Propositions</div><div class="phase-step">2. Votes</div><div class="phase-step active">3. Résultats</div></div>
            <div class="empty-state"><div class="empty-state-icon">🤷</div><p>Aucun vote n'a été enregistré...</p></div>
            <button id="newGame">Nouvelle partie</button>
          </div>
        `;
      }
      return `
        <div class="card scenario-card"><div class="scenario-label">Scénario</div><div class="scenario-text">${escapeHtml(this.currentGame.scenario)}</div></div>
        <div class="card">
          <div class="phase-indicator"><div class="phase-step">1. Propositions</div><div class="phase-step">2. Votes</div><div class="phase-step active">3. Résultats</div></div>
          <h2 style="margin-bottom:20px;text-align:center;">🏆 Résultats</h2>
          ${this.currentGame.results.map((result, idx) => {
            const isWinner = idx === 0;
            const total = result.yesVotes + result.noVotes;
            const yesWidth = total > 0 ? (result.yesVotes / total) * 100 : 50;
            const noWidth = total > 0 ? (result.noVotes / total) * 100 : 50;
            return `
              <div class="result-item ${isWinner ? 'winner' : ''}">
                ${isWinner ? '<div class="winner-badge">🏆 Gagnant</div>' : ''}
                <div class="result-header"><div class="result-author">${escapeHtml(result.author)}</div><div class="result-score ${result.deviation < 1 ? 'perfect' : ''}">${result.yesPercent.toFixed(1)}% OUI</div></div>
                <div class="result-text">${escapeHtml(result.text)}</div>
                <div class="vote-bar-container"><div class="vote-bar" style="width:${yesWidth}%;">${result.yesVotes > 0 ? result.yesVotes + ' OUI' : ''}</div><div class="vote-bar-no" style="width:${noWidth}%;">${result.noVotes > 0 ? result.noVotes + ' NON' : ''}</div></div>
                <div class="vote-stats"><span>Écart au 50/50 : ${result.deviation.toFixed(1)}%</span><span>${total} vote${total > 1 ? 's' : ''}</span></div>
              </div>
            `;
          }).join('')}
          <button id="newGame">Nouvelle partie</button>
        </div>
      `;
    }

    attachEventListeners() {
      const submitName = document.getElementById('submitName');
      if (submitName) {
        submitName.onclick = async () => {
          const nameInput = document.getElementById('playerName');
          if (nameInput) {
            await this.savePlayerName(nameInput.value);
          }
        };
      }
      const createGame = document.getElementById('createGame');
      if (createGame) createGame.onclick = () => {
        const scenario = document.getElementById('scenario').value;
        this.createRoom(scenario);
      };
      const joinGame = document.getElementById('joinGame');
      if (joinGame) joinGame.onclick = () => {
        const code = document.getElementById('roomCode').value;
        this.joinRoomById(code);
      };
      const submitProposal = document.getElementById('submitProposal');
      if (submitProposal) submitProposal.onclick = () => {
        const counterpart = document.getElementById('counterpart').value;
        this.submitProposal(counterpart);
      };
      const newGame = document.getElementById('newGame');
      if (newGame) newGame.onclick = () => this.resetGame();
      const leaveGame = document.getElementById('leaveGame');
      if (leaveGame) leaveGame.onclick = () => {
        if (confirm('Quitter la partie ? Tu pourras la rejoindre plus tard avec le code.')) this.resetGame();
      };
      document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.onclick = () => {
          const proposalId = parseInt(btn.getAttribute('data-proposal-id'));
          const vote = btn.getAttribute('data-vote');
          this.submitVote(proposalId, vote);
        };
      });
    }
  }

  window.game = new Game();
</script>
</body>
</html>
