<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#141021">
  <title>50/50 — Coupez la salle en deux</title>
  <link rel="icon" type="image/png" href="favicon_256.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root{
      /* Encres */
      --ink:#141021; --ink-2:#1b1531; --surface:#221b3c; --surface-2:#2b2350;
      --line:#392f5e; --line-2:#4b3f78;
      /* Texte */
      --paper:#f2eeff; --muted:#9b93c4; --faint:#847cab;
      /* Le split = la marque. OUI à gauche, NON à droite, comme le logo. */
      --oui:#ff2e9a; --oui-ink:#ff6cb8;
      --non:#4f6bff; --non-ink:#8d9eff;
      --gold:#ffce3a; --ok:#19e08a; --danger:#ff3b5c; --danger-ink:#ffd2da;
      /* Type */
      --display:'Anton',sans-serif; --ui:'Space Grotesk',sans-serif; --mono:'Space Mono',monospace;
      /* Géométrie */
      --r-s:8px; --r-m:12px; --r-l:16px;
      --seam:101deg; /* l'angle de coupe du logo */
      --z-sticky:10;
      --ease-out:cubic-bezier(.22,1,.36,1);
    }
    *{ margin:0; padding:0; box-sizing:border-box; }
    html{ -webkit-text-size-adjust:100%; }
    body{
      font-family:var(--ui); font-size:16px; color:var(--paper); background:var(--ink);
      background-image:
        radial-gradient(120% 70% at 50% -14%, rgba(79,107,255,.16), transparent 55%),
        radial-gradient(95% 55% at 50% 114%, rgba(255,46,154,.11), transparent 52%);
      background-attachment:fixed;
      min-height:100vh; line-height:1.5; -webkit-font-smoothing:antialiased;
    }
    .container{ width:100%; max-width:600px; margin:0 auto; padding:0 16px 56px; }
    body.tv .container{ max-width:960px; }
    body.home main{ padding-top:18px; }

    h1,h2{ font-family:var(--display); font-weight:400; line-height:1.08; text-transform:uppercase; letter-spacing:.015em; text-wrap:balance; }
    h2{ font-size:24px; }
    h3{ font-size:16px; font-weight:700; }
    button{ font:inherit; color:inherit; }

    /* ---- TOPBAR ---- */
    .topbar{
      position:sticky; top:0; z-index:var(--z-sticky);
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      margin:0 -16px 18px; padding:12px 16px;
      background:rgba(20,16,33,.92); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(57,47,94,.55);
    }
    body.home .topbar{ display:none; }
    .brand{ display:flex; align-items:center; gap:10px; }
    .brand-logo{ width:34px; height:34px; border-radius:9px; }
    .brand-name{ font-family:var(--display); font-size:19px; letter-spacing:.04em; }
    .chips{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .chip{ display:inline-flex; align-items:center; gap:6px; padding:7px 12px; border-radius:999px; font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
    .chip--code{ background:var(--surface); border:1px solid var(--line-2); color:var(--paper); cursor:pointer; }
    .chip--code:hover{ border-color:var(--oui); }
    .chip--round{ background:rgba(79,107,255,.14); border:1px solid rgba(79,107,255,.45); color:var(--non-ink); }

    /* ---- ACCUEIL ---- */
    .hero{ text-align:center; padding:20px 0 24px; }
    .hero-logo{ width:92px; height:92px; display:block; margin:0 auto 14px; border-radius:24px; }
    .hero h1{ font-size:46px; }
    .hero p{ color:var(--muted); margin-top:6px; }
    .principle{ margin-top:26px; padding:0 6px; }
    .steps{ list-style:none; margin-top:10px; }
    .steps li{ display:flex; gap:14px; align-items:baseline; padding:10px 0; color:var(--muted); font-size:15px; border-top:1px solid var(--line); }
    .steps li:first-child{ border-top:none; }
    .steps .n{ font-family:var(--mono); font-weight:700; font-size:13px; color:var(--oui-ink); flex:none; }
    .steps strong{ color:var(--paper); font-weight:600; }

    /* ---- CARTES ---- */
    .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-l); padding:24px; margin-bottom:16px; }
    @media (min-width:480px){ .card{ padding:28px; } }
    body.tv .card{ padding:32px 36px; }
    .section-title{ font-size:16px; font-weight:700; margin-bottom:12px; }

    /* ---- CARTE SCÉNARIO — signature : la coupe du logo ---- */
    .scenario-card{
      position:relative; text-align:center; padding:28px 22px 26px; margin-bottom:16px;
      border-radius:var(--r-l); color:#fff;
      background:linear-gradient(var(--seam), var(--oui) 0 49.6%, rgba(255,255,255,.85) 49.6% 50.4%, var(--non) 50.4% 100%);
    }
    .scenario-kicker{
      display:inline-block; padding:6px 14px; margin-bottom:14px; border-radius:999px;
      background:rgba(20,16,33,.55);
      font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
    }
    .scenario-text{ font-family:var(--display); font-size:30px; line-height:1.07; text-transform:uppercase; text-wrap:balance; overflow-wrap:break-word; text-shadow:0 2px 12px rgba(0,0,0,.45); }
    .scenario-card--small{ padding:16px 18px 15px; }
    .scenario-card--small .scenario-kicker{ margin-bottom:8px; padding:4px 12px; }
    .scenario-card--small .scenario-text{ font-size:19px; }
    body.tv .scenario-text{ font-size:48px; }
    body.tv .scenario-card--small .scenario-text{ font-size:26px; }
    .secret-rule{ margin-top:18px; padding:13px 16px; background:rgba(15,11,28,.62); border:1.5px dashed rgba(255,206,58,.7); border-radius:var(--r-m); }
    .secret-rule .tag{ font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); }
    .secret-rule .txt{ margin-top:5px; font-size:16px; font-weight:600; }
    body.tv .secret-rule .txt{ font-size:20px; }

    /* ---- MANCHE À L'AVEUGLE ---- */
    .blind-banner{ display:flex; align-items:center; gap:12px; margin-bottom:16px; padding:12px 16px; border-radius:var(--r-m); background:var(--surface-2); border:1.5px dashed var(--line-2); text-align:left; }
    .blind-banner .eye{ font-size:24px; line-height:1; flex:none; }
    .blind-banner .bb-txt{ display:block; min-width:0; }
    .blind-banner .bb-kicker{ display:block; font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--paper); }
    .blind-banner .bb-sub{ display:block; font-size:13px; color:var(--muted); margin-top:2px; }
    body.tv .blind-banner{ padding:16px 20px; }
    body.tv .blind-banner .bb-kicker{ font-size:15px; }
    body.tv .blind-banner .bb-sub{ font-size:15px; }

    /* ---- BOUTONS ---- */
    .btn{
      display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
      min-height:52px; padding:14px 18px; border:none; border-radius:var(--r-m); cursor:pointer;
      font-family:var(--ui); font-weight:700; font-size:15px; letter-spacing:.05em; text-transform:uppercase;
      background:var(--surface-2); color:var(--paper);
      transition:filter .15s var(--ease-out), transform .15s var(--ease-out), background .15s var(--ease-out);
    }
    .btn:hover{ filter:brightness(1.12); }
    .btn:active{ transform:translateY(1px); }
    .btn:disabled{ opacity:.4; cursor:not-allowed; filter:none; }
    .btn--primary{ background:var(--paper); color:var(--ink); }
    .btn--primary:hover{ filter:brightness(.93); }
    .btn--secondary{ background:var(--surface-2); border:1px solid var(--line-2); }
    .btn--ghost{ background:transparent; border:1px solid var(--line-2); color:var(--muted); font-weight:600; font-size:14px; letter-spacing:0; text-transform:none; min-height:46px; }
    .btn--ghost:hover{ filter:none; background:rgba(255,255,255,.04); color:var(--paper); }
    .btn + .btn{ margin-top:10px; }
    .btn--mode{ flex-direction:column; gap:2px; min-height:64px; }
    .btn--mode .sub{ font-weight:400; font-size:13px; letter-spacing:0; text-transform:none; color:var(--muted); }
    .wait .btn{ margin-top:22px; }

    /* ---- PAIRE DE VOTE — les deux moitiés du logo ---- */
    .vote-pair{ display:flex; gap:10px; margin-top:22px; }
    .vote-btn{
      flex:1; min-height:86px; border:none; cursor:pointer; color:#fff; border-radius:var(--r-m);
      font-family:var(--display); font-size:22px; letter-spacing:.02em; text-transform:uppercase;
      transition:filter .15s var(--ease-out), transform .15s var(--ease-out);
    }
    .vote-btn:hover{ filter:brightness(1.08); }
    .vote-btn:active{ transform:scale(.97); }
    .vote-btn--oui{ background:var(--oui); clip-path:polygon(0 0, 100% 0, calc(100% - 14px) 100%, 0 100%); padding-right:14px; }
    .vote-btn--non{ background:var(--non); clip-path:polygon(14px 0, 100% 0, 100% 100%, 0 100%); padding-left:14px; }

    /* ---- FORMULAIRES ---- */
    .input-group{ margin-bottom:20px; }
    label{ display:block; margin-bottom:8px; font-size:14px; font-weight:600; color:var(--muted); }
    .opt{ font-weight:400; color:var(--faint); }
    input,textarea{
      width:100%; padding:14px 16px; background:var(--ink-2); color:var(--paper);
      border:1px solid var(--line); border-radius:var(--r-m); font-size:16px; font-family:var(--ui);
      transition:border-color .15s, box-shadow .15s;
    }
    input::placeholder,textarea::placeholder{ color:var(--muted); opacity:.8; }
    input:focus,textarea:focus{ outline:none; border-color:var(--oui); box-shadow:0 0 0 3px rgba(255,46,154,.16); }
    textarea{ resize:vertical; min-height:104px; }
    .code-input{ text-align:center; font-family:var(--mono); font-weight:700; font-size:28px; letter-spacing:.35em; text-indent:.35em; text-transform:uppercase; }
    .prop-field{ display:flex; border:1px solid var(--line); border-radius:var(--r-m); background:var(--ink-2); overflow:hidden; transition:border-color .15s, box-shadow .15s; }
    .prop-field:focus-within{ border-color:var(--oui); box-shadow:0 0 0 3px rgba(255,46,154,.16); }
    .prop-field .prefix{ padding:15px 4px 0 16px; font-family:var(--display); font-size:19px; color:var(--oui-ink); white-space:nowrap; user-select:none; }
    .prop-field textarea{ border:none; background:transparent; padding-left:8px; }
    .prop-field textarea:focus{ border:none; box-shadow:none; }
    .or-divider{ display:flex; align-items:center; gap:14px; margin:20px 0; color:var(--faint); font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; }
    .or-divider::before,.or-divider::after{ content:''; flex:1; height:1px; background:var(--line); }

    /* ---- SEGMENTED (intensité) ---- */
    .seg{ display:flex; gap:4px; padding:4px; background:var(--ink-2); border:1px solid var(--line); border-radius:var(--r-m); }
    .seg-btn{ flex:1; min-height:44px; border:none; border-radius:var(--r-s); background:transparent; color:var(--muted); font-weight:600; font-size:14px; cursor:pointer; transition:background .15s, color .15s; }
    .seg-btn:hover{ color:var(--paper); }
    .seg-btn.active{ background:var(--surface-2); color:var(--paper); box-shadow:inset 0 0 0 1px var(--line-2); }
    .hint{ text-align:center; margin-top:10px; font-size:14px; color:var(--muted); min-height:20px; }

    /* ---- NOTES / ERREURS ---- */
    .note{ padding:12px 16px; margin-bottom:18px; border-radius:var(--r-m); font-size:15px; background:rgba(79,107,255,.12); border:1px solid rgba(79,107,255,.4); color:#dfe2ff; }
    .card > .note:last-child{ margin-bottom:0; margin-top:18px; }
    .banner-error{ padding:12px 16px; margin-bottom:18px; border-radius:var(--r-m); font-size:14px; font-weight:600; text-align:center; background:rgba(255,59,92,.13); border:1px solid var(--danger); color:var(--danger-ink); }

    /* ---- JOUEURS ---- */
    .players{ display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:22px; }
    .wait .players{ margin-top:20px; margin-bottom:0; }
    .chip-player{ display:inline-flex; align-items:center; gap:8px; max-width:100%; padding:8px 14px; border-radius:999px; background:var(--ink-2); border:1px solid var(--line); font-weight:600; font-size:14px; }
    .chip-player .dot{ width:8px; height:8px; border-radius:50%; background:var(--ok); flex:none; }
    .chip-player .dot.off{ background:var(--faint); }
    .badge{ font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:2px 7px; border-radius:999px; }
    .badge--host{ color:var(--gold); border:1px solid rgba(255,206,58,.5); }
    .badge--ready{ color:var(--ok); border:1px solid rgba(25,224,138,.5); }
    .chip-x{ border:none; background:none; cursor:pointer; color:var(--danger); font-size:16px; font-weight:700; line-height:1; padding:2px 4px; }

    /* ---- CODE DE PARTIE ---- */
    .share-code{ text-align:center; margin-bottom:22px; }
    .share-code .lbl{ font-size:14px; color:var(--muted); }
    .big-code{ font-family:var(--mono); font-weight:700; font-size:44px; letter-spacing:.26em; text-indent:.26em; color:var(--paper); text-shadow:0 0 24px rgba(255,46,154,.35); cursor:pointer; }
    body.tv .big-code{ font-size:76px; }

    /* ---- SPLITBAR — chaque résultat redessine le logo ---- */
    .splitbar{ position:relative; height:48px; margin:18px 0 14px; border-radius:10px; overflow:hidden; background:var(--non); }
    .splitbar-fill{ position:absolute; top:0; bottom:0; left:0; width:var(--pct,0%); background:var(--oui); clip-path:polygon(0 0, 100% 0, calc(100% - 10px) 100%, 0 100%); animation:bar-grow .9s var(--ease-out) both; }
    /* Vote unanime : on supprime la couture penchée (100 % = magenta plein) ou le remplissage (0 % = bleu plein),
       sinon le biseau de 10px laisse dépasser un triangle de la couleur opposée sur le bord. */
    .splitbar-fill--full{ clip-path:none; }
    .splitbar-fill--empty{ display:none; }
    @keyframes bar-grow{ from{ width:0; } }
    /* Repère du 50/50 : même inclinaison que la couture des couleurs (10px sur toute la hauteur),
       ancré en haut pour coïncider pile avec la couture lors d'un vrai 50/50. */
    .splitbar-mid{ position:absolute; left:50%; top:0; bottom:0; width:2px; margin-left:-1px; background:var(--gold); transform:skewX(-11.8deg); transform-origin:top; }
    /* Pourcentages OUI (gauche) / NON (droite) : pastilles encre translucides, lisibles quel que soit
       le fond (magenta ou bleu) et quelle que soit la largeur du remplissage. */
    .splitbar-tag{ position:absolute; top:50%; transform:translateY(-50%); padding:3px 9px; border-radius:999px; background:rgba(20,16,33,.55); font-family:var(--mono); font-weight:700; font-size:13px; color:#fff; white-space:nowrap; pointer-events:none; }
    .splitbar-tag--oui{ left:10px; }
    .splitbar-tag--non{ right:10px; }
    .splitbar-tag--none{ left:50%; transform:translate(-50%,-50%); color:var(--muted); } /* état « aucun vote » */
    body.tv .splitbar{ height:58px; }
    body.tv .splitbar-mid{ transform:skewX(-9.8deg); } /* 10px sur 58px de haut */
    body.tv .splitbar-tag{ font-size:16px; padding:4px 12px; }

    /* ---- RÉSULTATS ---- */
    .counter{ text-align:center; font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
    .quote{ background:var(--ink-2); border:1px solid var(--line); border-radius:var(--r-m); padding:18px 20px; text-align:center; font-size:20px; font-weight:600; line-height:1.35; overflow-wrap:break-word; }
    body.tv .quote{ font-size:30px; padding:24px 28px; }
    .card--best{ border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset; }
    .reveal-best{ text-align:center; margin-bottom:12px; }
    .pts{ display:inline-block; padding:5px 12px; border-radius:999px; background:rgba(255,206,58,.1); border:1px solid rgba(255,206,58,.4); color:var(--gold); font-family:var(--mono); font-size:13px; font-weight:700; }
    .pts-line{ text-align:center; margin-bottom:2px; }
    .author-line{ margin-top:16px; text-align:center; }
    .author-title{ font-size:14px; font-style:italic; color:var(--muted); }
    .author-name{ font-family:var(--display); font-size:24px; color:var(--gold); margin-top:4px; text-transform:uppercase; }
    .who-voted{ display:flex; gap:16px; margin-top:16px; padding:14px; background:rgba(0,0,0,.25); border-radius:var(--r-m); font-size:14px; text-align:center; }
    .who-voted .col{ flex:1; min-width:0; overflow-wrap:break-word; }
    .who-voted .col + .col{ border-left:1px solid rgba(255,255,255,.1); padding-left:16px; }
    .who-voted .h{ display:block; margin-bottom:6px; font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; }
    .who-voted .h--oui{ color:var(--oui-ink); }
    .who-voted .h--non{ color:var(--non-ink); }
    .reveal-pop{ animation:pop .4s var(--ease-out); }
    @keyframes pop{ from{ transform:scale(.96); opacity:0; } }

    /* ---- LEADERBOARD ---- */
    .leaderboard{ margin-bottom:20px; }
    .leaderboard h3{ text-align:center; margin-bottom:2px; }
    .lb-note{ text-align:center; font-size:13px; color:var(--muted); margin-bottom:12px; }
    .lb-row{ display:flex; align-items:center; gap:12px; background:var(--ink-2); border:1px solid var(--line); border-radius:var(--r-m); padding:11px 14px; margin-bottom:8px; text-align:left; }
    .lb-row.lead{ border-color:var(--gold); background:rgba(255,206,58,.06); }
    .lb-rank{ font-family:var(--mono); font-weight:700; font-size:14px; width:28px; text-align:center; color:var(--muted); flex:none; }
    .lb-row.lead .lb-rank{ color:var(--gold); }
    .lb-name{ flex:1; font-weight:600; font-size:15px; min-width:0; overflow-wrap:break-word; }
    .lb-score{ font-family:var(--mono); font-weight:700; font-size:14px; color:var(--non-ink); }
    .lb-row.lead .lb-score{ color:var(--gold); }

    /* ---- PODIUM ---- */
    .podium{ display:flex; justify-content:center; align-items:flex-end; gap:10px; margin:18px 0 26px; }
    .podium-col{ flex:1; max-width:150px; text-align:center; min-width:0; }
    .podium-rank{ font-family:var(--mono); font-weight:700; font-size:12px; color:var(--muted); margin-bottom:4px; }
    .podium-name{ font-weight:700; font-size:15px; margin-bottom:8px; overflow-wrap:break-word; }
    .podium-bar{ display:flex; align-items:flex-end; justify-content:center; padding:10px 6px; border-radius:var(--r-s) var(--r-s) 0 0; font-family:var(--display); font-size:24px; color:#141021; }
    .podium-bar--1{ height:128px; background:var(--gold); }
    .podium-bar--2{ height:94px; background:#c9c9d6; }
    .podium-bar--3{ height:70px; background:#cd8d52; }
    .podium-pts{ font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:6px; }

    /* ---- ATTENTE ---- */
    .wait{ text-align:center; padding:36px 18px; }
    .wait h2{ margin-bottom:8px; }
    .mark{ width:64px; height:64px; margin:0 auto 20px; border-radius:50%; background:linear-gradient(var(--seam), var(--oui) 0 48.5%, rgba(255,255,255,.85) 48.5% 51.5%, var(--non) 51.5% 100%); box-shadow:0 0 34px rgba(255,46,154,.3); animation:breathe 2.2s ease-in-out infinite; }
    @keyframes breathe{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.06); } }
    .progress-big{ font-family:var(--display); font-size:38px; margin:8px 0; }
    body.tv .progress-big{ font-size:54px; }
    .spinner{ width:44px; height:44px; margin:0 auto 18px; border:4px solid rgba(255,255,255,.14); border-top-color:var(--oui); border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin{ to{ transform:rotate(360deg); } }

    /* ---- SCÉNARIOS MAISON ---- */
    .custom-sc{ margin:20px 0; border-top:1px solid var(--line); padding-top:16px; text-align:left; }
    .custom-sc summary{ cursor:pointer; font-weight:600; font-size:14px; color:var(--muted); list-style:none; display:flex; align-items:center; gap:8px; }
    .custom-sc summary:hover{ color:var(--paper); }
    .custom-sc summary::before{ content:'+'; font-family:var(--mono); font-weight:700; color:var(--oui-ink); }
    .custom-sc[open] summary::before{ content:'–'; }
    .custom-sc summary::-webkit-details-marker{ display:none; }
    .custom-sc .body{ margin-top:14px; }
    .sc-list{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
    .sc-list:empty{ display:none; }

    /* ---- DIVERS ---- */
    .muted{ color:var(--muted); }
    .center{ text-align:center; }
    button:focus-visible,input:focus-visible,textarea:focus-visible,summary:focus-visible,[role="button"]:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{ animation:none!important; transition:none!important; }
    }
  </style>
</head>
<body class="home">
<div class="container">
  <header class="topbar">

  // ============================================================
  // AUDIO & VIBRATION

  let audioCtx = null;
  function initInteraction() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (type === 'click') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'tada') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.setValueAtTime(600, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.5);
      osc.start(now); osc.stop(now + 0.5);
    }
  }
  function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

  // Retour d'interaction unifié (initialise l'audio au premier geste, requis par les navigateurs).
  //  'click' : tap utilisateur — son + vibration courte
  //  'soft'  : réglage / navigation — son seul
  //  'tada'  : moment fort (lancement, fin de partie) — fanfare + triple vibration
  function feedback(type = 'click') {
    initInteraction();
    if (type === 'click') { vibrate(50); playSound('click'); }
    else if (type === 'soft') { playSound('click'); }
    else if (type === 'tada') { vibrate([50, 50, 50]); playSound('tada'); }
  }

  // ============================================================
  // UTILITAIRES
  // ============================================================
  function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
  const CODE_CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  function randomCode(n = 4) { let s = ''; for (let i = 0; i < n; i++) s += CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)]; return s; }
  function shuffle(arr) { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

  // ---- Règles du jeu ----
  const MIN_PLAYERS = 3;            // joueurs connectés minimum pour lancer une manche
  const CODE_LENGTH = 4;            // longueur du code de partie
  const SECRET_RULE_CHANCE = 0.05;  // règle secrète = événement rare (~1 manche sur 20)
  const BLIND_ROUND_CHANCE = 0.15;  // manche à l'aveugle = ~1 manche sur 7 (jamais à la 1re manche)
  const USED_SCENARIOS_MAX = 40;    // mémoire anti-répétition des scénarios
  const COPY_FEEDBACK_MS = 1200;    // durée de l'état « COPIÉ » après un tap sur le code

  const SCENARIOS_BY_TIER = {
    1: ["Vous gagnez 10 millions d'euros","Vous pouvez voler comme un oiseau","Vous pouvez vous téléporter n'importe où","Vous parlez et comprenez tous les animaux","Vous avez une santé parfaite jusqu'à 100 ans","Vous parlez couramment toutes les langues du monde","Vous devenez le meilleur du monde dans le sport de votre choix","Vous pouvez manger tout ce que vous voulez sans grossir","Vous avez une mémoire parfaite et infaillible","Vous possédez une maison de rêve dans chaque pays","Vous ne dormez plus jamais mais restez en pleine forme","Vous pouvez guérir les gens d'un simple toucher"],
    2: ["Vous lisez dans les pensées de tout le monde","Vous devenez invisible à volonté","Vous pouvez arrêter le temps quand vous voulez","Vous découvrez le secret de l'immortalité","Vous devenez la personne la plus célèbre du monde","Vous gagnez à chaque pari et chaque jeu d'argent","Vous pouvez revivre une journée de votre passé et la changer","Vous séduisez instantanément n'importe qui","Vous ne ressentez plus jamais la gueule de bois","Vous savez toujours quand quelqu'un vous ment"],
    3: ["Vous pouvez ressusciter une personne morte (une seule fois)","Vous savez en permanence ce que les gens pensent VRAIMENT de vous","Vous pouvez effacer un souvenir précis dans la tête de n'importe qui","Vous gagnez 1 million d'euros à chaque fois qu'un inconnu meurt dans le monde","Vous pouvez forcer quelqu'un à dire la vérité pendant une minute","Vous pouvez voir 24 heures dans le futur","Vous pouvez échanger de corps avec n'importe qui pendant 24 h","Vous gagnez 10 ans de vie à chaque couple que vous faites rompre","Vous pouvez rendre n'importe qui fou amoureux de vous d'un simple regard","Personne ne peut vous dire non : toutes vos demandes finissent par un oui","Vous gardez pour toujours le corps et l'énergie de vos 25 ans","Vous pouvez faire disparaître quelqu'un de l'existence : plus personne ne se souviendra de lui","Vous lisez tous les messages privés de n'importe qui, à vie","Vous gagnez 100 000 € à chaque enterrement auquel vous assistez","Vous connaissez le pire secret de toutes les personnes que vous croisez","Vous êtes invincible : aucune blessure ni maladie ne peut vous atteindre","Vous pouvez voler n'importe quoi sans jamais vous faire prendre","Vous héritez de 50 millions d'euros d'un parfait inconnu, sans aucune condition","Vous pouvez lire l'historique de recherche de n'importe qui","Vous pouvez transférer votre gueule de bois à la personne de votre choix"]
  };
  const SECRET_RULES_BY_TIER = {
    1: ["La contrepartie doit obligatoirement impliquer un animal.","La contrepartie doit être liée à la nourriture.","La contrepartie doit impliquer un changement physique visible.","La contrepartie doit contenir le mot 'Toujours' ou 'Jamais'.","La contrepartie doit se produire chaque matin au réveil.","La contrepartie doit concerner ton téléphone ou les réseaux sociaux.","La contrepartie doit durer toute ta vie."],
    2: ["La contrepartie doit être extrêmement embarrassante en public.","La contrepartie doit faire intervenir un membre de ta famille.","La contrepartie doit te ruiner financièrement.","La contrepartie doit impliquer une odeur insupportable.","La contrepartie doit te faire perdre tous tes amis actuels.","La contrepartie doit se déclencher à chaque fois que tu mens."],
    3: ["La contrepartie doit impliquer ton ex.","La contrepartie doit concerner ta vie de couple ou ta vie intime.","La contrepartie doit raccourcir ta vie de quelques années.","La contrepartie doit impliquer la mort d'un parfait inconnu.","La contrepartie doit être un secret honteux que tout le monde finira par découvrir.","La contrepartie doit te forcer à trahir une personne que tu aimes.","La contrepartie doit impliquer une fonction corporelle bien gênante.","La contrepartie doit te faire passer pour un monstre aux yeux des autres.","La contrepartie doit te coûter une amitié à laquelle tu tiens vraiment.","La contrepartie doit être quelque chose dont tu auras honte sur ton lit de mort.","La contrepartie doit te suivre dans chacune de tes futures relations.","La contrepartie doit faire de toi la risée d'Internet pour toujours.","La contrepartie doit impliquer du sang ou une douleur physique.","La contrepartie doit mettre tes parents au courant de TOUT ce que tu fais."]
  };
  const SPICE_LABELS = { 1: 'Doux', 2: 'Normal', 3: 'Trash' };

  function honoraryTitle(p) {
    if (p === 50) return "Le Maître Chanteur Parfait";
    if (p === 100) return "Le Bisounours (trop gentil)";
    if (p === 0) return "Le Tortionnaire Sadique";
    if (Math.abs(50 - p) <= 15) return "L'Équilibriste";
    if (p > 75) return "Le Négociateur Sympa";
    if (p < 25) return "Le Bourreau Sans Pitié";
    return "Le Créateur de Chaos";
  }
  // Score = distance au 50/50 (écart). Plus c'est petit, mieux c'est. Un 50/50 parfait = 0.
  function pointsFromDeviation(d) { return Math.round(d); }

  // ============================================================
  // COUCHE RÉSEAU + LOGIQUE
  // ============================================================
  class App {
    constructor() {
      this.uid = null;
      this.code = null;          // room courante
      this.room = null;          // dernier snapshot de la room
      this.unsub = null;         // désabonnement onValue
      this.error = null;
      this.pseudo = localStorage.getItem('pseudo5050') || '';
      this.fatal = null;

      try {
        const fbApp = initializeApp(firebaseConfig);
        this.auth = getAuth(fbApp);
        this.db = getDatabase(fbApp);
      } catch (e) {
        this.fatal = "Config Firebase invalide. As-tu collé ta vraie config en haut du fichier ?";
        this.render(); return;
      }

      signInAnonymously(this.auth).catch(() => {
        this.fatal = "Connexion anonyme refusée. Active 'Anonyme' dans Firebase > Authentication > Sign-in method.";
        this.render();
      });
      onAuthStateChanged(this.auth, (user) => {
        if (user) { this.uid = user.uid; this.tryResume(); this.render(); }
      });
      this.render();
    }

    // Reprise auto après un rechargement de page (l'uid anonyme est stable dans ce navigateur)
    async tryResume() {
      if (this._resumed || this.code) return;
      this._resumed = true;
      const code = localStorage.getItem('room5050');
      if (!code) return;
      try {
        const snap = await get(this.rref('rooms/' + code));
        if (snap.exists() && snap.val().players && snap.val().players[this.uid]) {
          this.joinSubscription(code);
        } else {
          localStorage.removeItem('room5050');
        }
      } catch (e) { localStorage.removeItem('room5050'); }
    }

    rref(path) { return ref(this.db, path); }
    // Référence dans la room courante : roomRef('meta'), roomRef(`players/${id}`)… roomRef() = la room entière.
    roomRef(sub = '') { return this.rref('rooms/' + this.code + (sub ? '/' + sub : '')); }
    meta() { return (this.room && this.room.meta) || {}; }
    players() { return (this.room && this.room.players) || {}; }
    proposals() { return (this.room && this.room.proposals) || {}; }
    votes() { return (this.room && this.room.votes) || {}; }
    me() { return this.players()[this.uid] || null; }
    isHost() { return this.meta().hostId === this.uid; }
    connectedIds() { const p = this.players(); return Object.keys(p).filter(id => p[id].connected); }
    roundPlayers() { return this.meta().roundPlayers || []; }

    // Mode écran/salon : l'ordinateur est l'écran + hôte, il ne joue pas.
    isTV() { return !!this.meta().tv; }
    isScreen() { return this.isTV() && this.meta().screenId === this.uid; }
    isBlind() { return !!this.meta().blind; } // manche à l'aveugle : on masque tous les noms (auteurs + votants)
    gamePlayers() { const p = this.players(); return Object.keys(p).filter(id => !p[id].isScreen); }            // vrais joueurs (hors écran)
    connectedGameIds() { const p = this.players(); return Object.keys(p).filter(id => p[id].connected && !p[id].isScreen); }

    /* ---------- Création / connexion ---------- */
    async createRoom(mode = 'phone') {
      feedback();
      const tv = (mode === 'tv');
      const name = this.pseudo.trim();
      if (!tv && !name) { this.error = "Choisis d'abord un pseudo."; return this.render(); }
      let code, exists = true, tries = 0;
      do { code = randomCode(CODE_LENGTH); exists = (await get(this.rref('rooms/' + code))).exists(); tries++; } while (exists && tries < 10);

      const meta = { phase: 'lobby', round: 0, spice: 2, hostId: this.uid, scored: -1, createdAt: serverTimestamp() };
      let players;
      if (tv) {
        meta.tv = true; meta.screenId = this.uid;
        // L'écran est enregistré comme un "joueur" marqué isScreen : il sert juste à la présence et au pilotage, il ne joue pas.
        players = { [this.uid]: { name: 'Écran', score: 0, connected: true, isHost: true, isScreen: true } };
      } else {
        players = { [this.uid]: { name, score: 0, connected: true, isHost: true } };
      }

      const roomObj = { meta, players };
      try {
        await update(ref(this.db), {
          ['rooms/' + code]: roomObj,
          ['throttle/' + this.uid]: serverTimestamp()
        });
      } catch (e) {
        this.error = "Tu crées des parties trop vite — attends quelques secondes et réessaie.";
        return this.render();
      }
      this.joinSubscription(code);
    }

    async joinRoom(codeRaw) {
      feedback();
      const name = this.pseudo.trim();
      const code = (codeRaw || '').trim().toUpperCase();
      if (!name) { this.error = "Choisis d'abord un pseudo."; return this.render(); }
      if (code.length !== CODE_LENGTH) { this.error = `Le code fait ${CODE_LENGTH} caractères.`; return this.render(); }
      const snap = await get(this.rref('rooms/' + code));
      if (!snap.exists()) { this.error = "Aucune partie avec ce code."; return this.render(); }
      const data = snap.val();
      if (data.meta.phase !== 'lobby' && !(data.players && data.players[this.uid])) {
        this.error = "La partie a déjà commencé."; return this.render();
      }
      const existing = data.players && data.players[this.uid];
      await update(this.rref(`rooms/${code}/players/${this.uid}`), {
        name, connected: true, score: existing ? existing.score : 0, isHost: data.meta.hostId === this.uid
      });
      this.joinSubscription(code);
    }

    joinSubscription(code) {
      this.code = code; this.error = null; this._dcMode = null;
      localStorage.setItem('pseudo5050', this.pseudo.trim());
      localStorage.setItem('room5050', code);

      // Présence : on se marque en ligne ; la gestion de déconnexion est (ré)armée à chaque snapshot
      set(this.roomRef(`players/${this.uid}/connected`), true);

      if (this.unsub) this.unsub();
      this.unsub = onValue(this.roomRef(), (snap) => {
        if (!snap.exists()) { this.leaveLocal("La partie a été fermée."); return; }
        this.room = snap.val();
        this.hostTick();                 // l'hôte fait avancer le jeu si besoin
        this.updateDisconnectHandler();  // dernier connecté => suppression de la room en partant
        this.render();
      });
    }

    // Recalcule, à chaque changement, ce qu'il faut faire si CET appareil se déconnecte.
    // - Seul connecté  => programmer la suppression de TOUTE la room.
    // - D'autres là    => se marquer simplement hors-ligne.
    updateDisconnectHandler() {
      if (!this.code || !this.uid) return;
      const me = this.players()[this.uid];
      if (!me) return;
      const solo = this.connectedIds().length <= 1; // moi seul encore connecté
      const mode = solo ? 'solo' : 'multi';
      if (mode === this._dcMode) return;             // déjà dans le bon mode, on évite le spam réseau
      this._dcMode = mode;

      const connRef = this.roomRef(`players/${this.uid}/connected`);
      const roomRef = this.roomRef();
      onDisconnect(connRef).cancel();
      onDisconnect(roomRef).cancel();
      if (solo) onDisconnect(roomRef).remove();      // ménage complet quand le dernier s'en va
      else      onDisconnect(connRef).set(false);    // sinon, juste hors-ligne
    }

    leaveLocal(msg) {
      if (this.unsub) { this.unsub(); this.unsub = null; }
      this._dcMode = null;
      localStorage.removeItem('room5050');
      this.code = null; this.room = null; this.error = msg || null; this.render();
    }

    async quitRoom() {
      feedback();
      if (this.code && this.uid) {
        const others = this.connectedIds().filter(id => id !== this.uid);
        const connRef = this.roomRef(`players/${this.uid}/connected`);
        const roomRef = this.roomRef();
        // On annule les actions de déconnexion : on fait le ménage nous-mêmes, maintenant.
        try { await onDisconnect(connRef).cancel(); } catch (e) {}
        try { await onDisconnect(roomRef).cancel(); } catch (e) {}
        try {
          if (others.length === 0) {
            // Dernier joueur : on supprime toute la room (on devient hôte si besoin, pour passer les règles)
            if (!this.isHost()) { try { await update(this.roomRef('meta'), { hostId: this.uid }); } catch (e) {} }
            await remove(roomRef);
          } else {
            await remove(this.roomRef(`players/${this.uid}`));
          }
        } catch (e) {}
      }
      this._dcMode = null;
      this.leaveLocal();
    }

    /* ---------- Réglages lobby (hôte) ---------- */
    setSpice(level) { if (!this.isHost()) return; feedback('soft'); update(this.roomRef('meta'), { spice: level }); }
    addCustomScenario(text) {
      if (!this.isHost()) return;
      const clean = (text || '').trim(); if (!clean) return;
      feedback('soft');
      const id = randomCode(6); // identifiant interne, sans rapport avec le code de partie
      set(this.roomRef(`customScenarios/${id}`), { text: clean });
      this.focusScenario = true;
    }
    removeCustomScenario(id) { if (!this.isHost()) return; feedback('soft'); remove(this.roomRef(`customScenarios/${id}`)); }
    kickPlayer(id) { if (!this.isHost() || id === this.uid) return; feedback('soft'); remove(this.roomRef(`players/${id}`)); }

    /* ---------- Pioche ---------- */
    scenarioPool() {
      const spice = this.meta().spice || 2;
      let pool = [];
      for (let l = 1; l <= spice; l++) pool = pool.concat(SCENARIOS_BY_TIER[l]);
      const custom = this.room.customScenarios ? Object.values(this.room.customScenarios).map(s => s.text) : [];
      return pool.concat(custom);
    }
    rulePool() { const spice = this.meta().spice || 2; let pool = []; for (let l = 1; l <= spice; l++) pool = pool.concat(SECRET_RULES_BY_TIER[l]); return pool; }

    /* ---------- Démarrer une manche (hôte) ---------- */
    async startRound() {
      if (!this.isHost()) return;
      feedback('tada');
      const connected = this.connectedGameIds();
      if (connected.length < MIN_PLAYERS) return;

      const used = this.meta().usedScenarios || [];
      const pool = this.scenarioPool();
      let avail = pool.filter(s => !used.includes(s));
      if (avail.length === 0) avail = pool;
      const scenario = avail[Math.floor(Math.random() * avail.length)];
      const rules = this.rulePool();
      const secretRule = Math.random() < SECRET_RULE_CHANCE ? rules[Math.floor(Math.random() * rules.length)] : null;
      // Manche à l'aveugle (auteurs + votants anonymes) : jamais à la 1re manche — les joueurs
      // doivent d'abord assimiler la mécanique de base. `round` est encore l'ancien compteur ici,
      // donc `>= 1` signifie « à partir de la 2e manche ».
      const blind = (this.meta().round || 0) >= 1 && Math.random() < BLIND_ROUND_CHANCE;

      await update(this.roomRef(), {
        proposals: null, votes: null,
        meta: {
          ...this.meta(),
          phase: 'propose',
          round: (this.meta().round || 0) + 1,
          scenario, secretRule: secretRule || null,
          blind: blind || null,
          roundPlayers: connected,
          order: null,
          voteIndex: 0, revealIndex: 0,
          usedScenarios: [...used, scenario].slice(-USED_SCENARIOS_MAX),
          scored: this.meta().scored
        }
      });
    }

    /* ---------- Soumettre une proposition ---------- */
    submitProposal(text) {
      feedback();
      const clean = (text || '').trim().replace(/^mais\s+/i, ''); // "Mais" est déjà le préfixe fixe
      if (!clean) return;
      set(this.roomRef(`proposals/${this.uid}`), { text: clean });
    }

    /* ---------- Voter ---------- */
    submitVote(authorId, value) {
      feedback();
      set(this.roomRef(`votes/${authorId}/${this.uid}`), value);
    }

    /* ---------- Transitions pilotées par l'hôte ---------- */
    hostTick() {
      // En mode écran/salon, l'hôte EST l'écran : pas de migration (l'écran doit se reconnecter).
      if (!this.isTV()) {
        // Migration d'hôte : si l'hôte est déconnecté, le 1er joueur connecté (ordre alphabétique d'uid) reprend la main
        const players = this.players();
        const hostId = this.meta().hostId;
        const hostOk = hostId && players[hostId] && players[hostId].connected;
        if (!hostOk) {
          const candidate = this.connectedIds().sort()[0];
          if (candidate && candidate === this.uid) {
            update(this.roomRef('meta'), { hostId: this.uid });
            update(this.roomRef(`players/${this.uid}`), { isHost: true });
          }
          return; // on attend la stabilisation
        }
      }
      if (!this.isHost()) return;

      const phase = this.meta().phase;
      if (phase === 'propose' && this.allProposed()) this.openVote();
      else if (phase === 'vote') {
        if (this.isTV()) this.tvVoteTick();          // salon : une proposition à la fois, synchronisée
        else if (this.allVoted()) this.computeResults(); // téléphone : chacun vote à son rythme
      }
    }

    // Mode salon : avance automatiquement quand tous les joueurs CONNECTÉS ont voté la proposition courante
    tvVoteTick() {
      const order = this.meta().order || [];
      const vi = this.meta().voteIndex || 0;
      if (vi >= order.length) { this.computeResults(); return; }
      const author = order[vi];
      const voters = this.currentVoters(author);
      const votes = this.votes();
      const done = voters.length > 0 && voters.every(v => votes[author] && votes[author][v] !== undefined);
      if (done) {
        if (vi + 1 >= order.length) this.computeResults();
        else update(this.roomRef('meta'), { voteIndex: vi + 1 });
      }
    }

    // Votants attendus pour une proposition : joueurs connectés de la manche, sauf l'auteur
    currentVoters(author) {
      const p = this.players();
      return this.roundPlayers().filter(id => p[id] && p[id].connected && id !== author);
    }

    // Bouton "proposition suivante" de l'écran (force, pour un joueur AFK)
    tvNextVote() {
      if (!this.isScreen()) return;
      feedback('soft');
      const order = this.meta().order || [];
      const vi = this.meta().voteIndex || 0;
      if (vi + 1 >= order.length) this.computeResults();
      else update(this.roomRef('meta'), { voteIndex: vi + 1 });
    }

    activeRoundPlayers() {
      const players = this.players();
      return this.roundPlayers().filter(id => players[id]); // encore présents (connectés ou non)
    }
    // Joueurs de la manche encore présents ET connectés : ceux qu'on attend réellement (propositions, votes).
    // Un déconnecté ne peut plus agir — l'attendre figerait la manche.
    liveRoundPlayers() {
      const players = this.players();
      return this.roundPlayers().filter(id => players[id] && players[id].connected);
    }

    allProposed() {
      const props = this.proposals();
      const live = this.liveRoundPlayers();
      return live.length > 0 && live.every(id => props[id]);
    }

    async openVote() {
      if (this.meta().phase !== 'propose') return; // évite un re-mélange si l'ouverture est déclenchée deux fois
      const order = shuffle(this.activeRoundPlayers().filter(id => this.proposals()[id]));
      await update(this.roomRef('meta'), { phase: 'vote', order, voteIndex: 0 });
    }

    voterDone(voterId) {
      const order = this.meta().order || [];
      const votes = this.votes();
      return order.filter(a => a !== voterId).every(a => votes[a] && votes[a][voterId] !== undefined);
    }
    allVoted() {
      const voters = this.liveRoundPlayers();
      return voters.length > 0 && voters.every(v => this.voterDone(v));
    }

    // Dépouillement d'une proposition : qui a dit oui/non, % de oui, écart au 50/50, points.
    // Source unique de vérité pour le calcul des scores ET l'affichage des résultats.
    tallyFor(authorId) {
      const players = this.players();
      const name = (id) => players[id] ? players[id].name : '?';
      const entries = Object.entries(this.votes()[authorId] || {});
      const yes = entries.filter(([, v]) => v === 'yes').map(([id]) => name(id));
      const no = entries.filter(([, v]) => v === 'no').map(([id]) => name(id));
      const total = yes.length + no.length;
      const yesPercent = total > 0 ? (yes.length / total) * 100 : 0;
      const deviation = Math.abs(50 - yesPercent);
      // Aucun vote reçu (auteur dont tous les votants ont quitté) : neutre, pas de pénalité (≠ « 0 % de oui »).
      const points = total > 0 ? pointsFromDeviation(deviation) : 0;
      return { yes, no, total, yesPercent, deviation, points };
    }

    async computeResults() {
      if (this.meta().scored === this.meta().round) return; // déjà compté
      const players = this.players();
      const scoreUpdates = {};
      (this.meta().order || []).forEach(authorId => {
        if (!players[authorId]) return; // l'auteur a quitté la partie
        const { points } = this.tallyFor(authorId);
        scoreUpdates[`players/${authorId}/score`] = (players[authorId].score || 0) + points;
      });
      scoreUpdates['meta/phase'] = 'results';
      scoreUpdates['meta/scored'] = this.meta().round;
      scoreUpdates['meta/revealIndex'] = 0; // révélation des propositions une par une
      await update(this.roomRef(), scoreUpdates);
    }

    /* ---------- Révélation par étapes (mode écran/salon) ---------- */
    revealNext() {
      if (!this.isHost()) return;
      feedback('soft');
      const n = (this.meta().order || []).length;
      const i = this.meta().revealIndex || 0;
      if (i < n) update(this.roomRef('meta'), { revealIndex: i + 1 });
    }

    forceNext() {
      if (!this.isHost()) return;
      feedback('soft');
      if (this.meta().phase === 'propose') this.openVote();
      else if (this.meta().phase === 'vote') this.computeResults();
    }

    nextRound() { this.startRound(); }
    async finishGame() { if (!this.isHost()) return; feedback('tada'); await update(this.roomRef('meta'), { phase: 'final' }); }
    async backToLobby() { if (!this.isHost()) return; feedback('soft'); await update(this.roomRef('meta'), { phase: 'lobby' }); }

    /* ==========================================================
       RENDU
    ========================================================== */
    render() {
      const appDiv = document.getElementById('app');
      const pills = document.getElementById('pills');
      if (!this.drafts) this.drafts = {};

      const inRoom = !!(this.code && this.room);
      const phase = inRoom ? this.meta().phase : null;
      if (phase !== this._lastPhase) { this.drafts = {}; this._lastPhase = phase; }
      document.body.classList.toggle('home', !inRoom);
      document.body.classList.toggle('tv', inRoom && this.isScreen());

      // L'innerHTML remplace tout le DOM : on note le champ actif pour lui rendre le focus après.
      const active = document.activeElement;
      const restore = (active && active.id && appDiv.contains(active)) ? { id: active.id, s: active.selectionStart, e: active.selectionEnd } : null;

      pills.innerHTML = '';
      if (this.fatal) { appDiv.innerHTML = `<div class="card"><div class="banner-error">${escapeHtml(this.fatal)}</div></div>`; return; }
      if (!this.uid) { appDiv.innerHTML = `<div class="card wait"><div class="spinner"></div><p class="muted">Connexion…</p></div>`; return; }

      if (!inRoom) { appDiv.innerHTML = this.renderHome(); this.bindHome(); this.restoreFocus(restore); return; }

      pills.innerHTML = `<button class="chip chip--code" id="pillCode" title="Copier le code">Code ${escapeHtml(this.code)}</button>` +
        (this.meta().round > 0 && phase !== 'final' ? `<span class="chip chip--round">Manche ${this.meta().round}</span>` : '');

      // Une table de vues par rôle : grand écran, manette (téléphone en mode salon), ou mode normal.
      const views = this.isScreen() ? {
        lobby:   () => this.renderScreenLobby(),
        propose: () => this.renderScreenPropose(),
        vote:    () => this.renderScreenVote(),
        results: () => this.renderScreenResults(),
        final:   () => this.renderFinal(),
      } : this.isTV() ? {
        lobby:   () => this.renderControllerWait("Tu es connecté", "Regarde l'écran, l'hôte va lancer la partie."),
        propose: () => this.renderControllerPropose(),
        vote:    () => this.renderControllerVote(),
        results: () => this.renderControllerWait("Résultats en cours", "Tout se passe sur l'écran."),
        final:   () => this.renderControllerWait("Partie terminée", "Classement final sur l'écran."),
      } : {
        lobby:   () => this.renderLobby(),
        propose: () => this.renderPropose(),
        vote:    () => this.renderVote(),
        results: () => this.renderResults(),
        final:   () => this.renderFinal(),
      };
      appDiv.innerHTML = views[phase] ? views[phase]() : '';

      this.bindRoom();
      this.restoreFocus(restore);
    }

    restoreFocus(restore) {
      if (!restore) return;
      const el = document.getElementById(restore.id);
      if (!el) return;
      el.focus({ preventScroll: true });
      if (restore.s != null && typeof el.setSelectionRange === 'function') {
        try { el.setSelectionRange(restore.s, restore.e); } catch (e) {}
      }
    }

    renderHome() {
      return `
        <div class="hero">
          <img src="favicon_logo.png" alt="" class="hero-logo">
          <h1>50/50</h1>
          <p>Coupez la salle en deux.</p>
        </div>
        <div class="card">
          ${this.error ? `<div class="banner-error">${escapeHtml(this.error)}</div>` : ''}
          <div class="input-group">
            <label for="pseudo">Ton pseudo</label>
            <input type="text" id="pseudo" maxlength="16" autocomplete="nickname" placeholder="Ton prénom" value="${escapeHtml(this.pseudo)}">
          </div>
          <div class="input-group">
            <label for="joinCode">Le code de la partie</label>
            <input type="text" id="joinCode" maxlength="4" class="code-input" autocapitalize="characters" autocomplete="off" spellcheck="false" placeholder="ABCD" value="${escapeHtml(this.drafts.joinCode || '')}">
          </div>
          <button class="btn btn--primary" id="btnJoin">Rejoindre la partie</button>
          <div class="or-divider"><span>ou</span></div>
          <button class="btn btn--secondary" id="btnCreate">Créer une partie</button>
          <button class="btn btn--ghost btn--mode" id="btnCreateTV">Créer un écran de salon<span class="sub">Sur l'ordi ou le projecteur — tout le monde joue au téléphone</span></button>
        </div>
        <section class="principle">
          <h3 class="section-title center">Le principe</h3>
          <ol class="steps">
            <li><span class="n">1</span><span>Tout le monde reçoit le même <strong>super-pouvoir</strong>.</span></li>
            <li><span class="n">2</span><span>Chacun invente en secret sa pire contrepartie : <strong>« Mais… »</strong></span></li>
            <li><span class="n">3</span><span>On vote la contrepartie de chacun : <strong>j'accepte ou je refuse</strong>.</span></li>
            <li><span class="n">4</span><span>Vise le <strong>50/50 pile</strong> — le plus petit écart gagne.</span></li>
          </ol>
        </section>`;
    }

    renderPlayerTags(opts = {}) {
      const players = this.players();
      const props = this.proposals();
      return this.gamePlayers().map(id => {
        const p = players[id];
        const host = this.meta().hostId === id;
        const submitted = opts.showSubmitted && props[id];
        const canKick = this.isHost() && id !== this.uid && this.meta().phase === 'lobby';
        return `<span class="chip-player">
          <span class="dot ${p.connected ? '' : 'off'}"></span>${escapeHtml(p.name)}
          ${host ? '<span class="badge badge--host">hôte</span>' : ''}
          ${submitted ? '<span class="badge badge--ready">prêt</span>' : ''}
          ${canKick ? `<button class="chip-x" data-action="kick" data-id="${id}" aria-label="Retirer ${escapeHtml(p.name)}">×</button>` : ''}
        </span>`;
      }).join('');
    }

    renderLeaderboard(showTitle = true, mask = false) {
      const players = this.players();
      const ids = this.gamePlayers();
      if ((this.meta().round || 0) === 0) return ''; // pas encore de manche jouée
      // À l'aveugle : on ne trie PAS par score et on masque tout chiffre (delta + total + rang).
      // Sinon le simple rang trahirait qui a gagné/perdu des points sur la manche → fin de l'anonymat.
      const rows = mask ? ids.map(id => players[id])
                        : ids.map(id => players[id]).sort((a, b) => (a.score || 0) - (b.score || 0));
      return `<div class="leaderboard">
        ${showTitle ? '<h3>Classement</h3>' : ''}
        <p class="lb-note">${mask ? 'Points attribués en secret — révélés à la prochaine manche' : 'Le plus petit écart total gagne'}</p>
        ${rows.map((p, i) =>
        `<div class="lb-row ${(!mask && i === 0) ? 'lead' : ''}"><span class="lb-rank">${mask ? '•' : (i + 1)}</span><span class="lb-name">${escapeHtml(p.name)}</span><span class="lb-score">${mask ? '???' : (p.score || 0)}</span></div>`).join('')}</div>`;
    }

    renderCustomScenarios() {
      const custom = this.room.customScenarios || {};
      return `
        <details class="custom-sc" id="customSc" ${this.customOpen ? 'open' : ''}>
          <summary>Scénarios maison <span class="opt">(facultatif)</span></summary>
          <div class="body">
            <div class="sc-list">
              ${Object.keys(custom).map(id => `<span class="chip-player">${escapeHtml(custom[id].text)} <button class="chip-x" data-action="rmscenario" data-id="${id}" aria-label="Supprimer ce scénario">×</button></span>`).join('')}
            </div>
            <div class="input-group" style="margin-bottom:10px;"><input type="text" id="newScenario" maxlength="90" placeholder="Vous pouvez parler aux fantômes…" aria-label="Nouveau scénario" value="${escapeHtml(this.drafts.newScenario || '')}"></div>
            <button class="btn btn--ghost" id="btnAddScenario">Ajouter ce scénario</button>
          </div>
        </details>`;
    }

    renderSpiceControl() {
      const spice = this.meta().spice || 2;
      return `
        <div class="input-group">
          <label>Intensité</label>
          <div class="seg" role="group" aria-label="Intensité des scénarios">${[1,2,3].map(l => `<button class="seg-btn ${spice === l ? 'active' : ''}" data-action="spice" data-level="${l}" aria-pressed="${spice === l}">${SPICE_LABELS[l]}</button>`).join('')}</div>
          <p class="hint">${spice === 3 ? 'Humour noir, contenu border assumé.' : spice === 1 ? 'Tranquille, sortable en famille.' : 'Le bon équilibre pour chauffer la salle.'}</p>
        </div>`;
    }

    renderLobby() {
      const count = this.connectedGameIds().length;
      return `
        <div class="card">
          ${this.renderLeaderboard()}
          ${this.renderShareCode('Partage ce code aux autres joueurs')}
          <h3 class="section-title center">Joueurs (${count})</h3>
          <div class="players">${this.renderPlayerTags()}</div>
          ${this.isHost()
            ? this.renderSpiceControl() + this.renderCustomScenarios() + this.renderStartButton(count)
            : `<div class="note">L'hôte lance la manche dès que tout le monde est là…</div>`}
          <button class="btn btn--ghost" id="btnQuit" style="margin-top:12px;">Quitter la partie</button>
        </div>`;
    }

    // Bannière « Manche à l'aveugle » — rappel visuel constant que tout est anonyme.
    renderBlindBanner() {
      if (!this.isBlind()) return '';
      return `<div class="blind-banner">
        <span class="eye" aria-hidden="true">🙈</span>
        <span class="bb-txt">
          <span class="bb-kicker">Manche à l'aveugle</span>
          <span class="bb-sub">Personne ne saura qui a proposé ni qui a voté quoi — lâchez-vous.</span>
        </span>
      </div>`;
    }

    renderScenarioCard(small) {
      const m = this.meta();
      return `${this.renderBlindBanner()}<div class="scenario-card ${small ? 'scenario-card--small' : ''}">
        <div class="scenario-kicker">Le pouvoir</div>
        <div class="scenario-text">${escapeHtml(m.scenario)}</div>
        ${(!small && m.secretRule) ? `<div class="secret-rule"><div class="tag">Règle secrète</div><div class="txt">${escapeHtml(m.secretRule)}</div></div>` : ''}
      </div>`;
    }

    /* ---------- Briques d'interface partagées ---------- */

    // Écran d'attente : disque 50/50 (optionnel), titre, compteur géant, sous-titre, contenu libre.
    renderWait({ title, counter = '', sub = '', extra = '', mark = true }) {
      return `
        <div class="card wait">
          ${mark ? '<div class="mark"></div>' : ''}
          <h2>${escapeHtml(title)}</h2>
          ${counter ? `<div class="progress-big">${counter}</div>` : ''}
          ${sub ? `<p class="muted">${escapeHtml(sub)}</p>` : ''}
          ${extra}
        </div>`;
    }

    // Formulaire de contrepartie (téléphone et manette) ; `intro` = note optionnelle au-dessus.
    renderProposalForm(intro = '') {
      return `
        <div class="card">
          ${intro}
          <div class="input-group">
            <label for="txtProposal">Ta pire contrepartie <span class="opt">— objectif : 50 % de oui</span></label>
            <div class="prop-field"><span class="prefix">Mais…</span><textarea id="txtProposal" placeholder="tu dois manger un citron chaque matin.">${escapeHtml(this.drafts.txtProposal || '')}</textarea></div>
          </div>
          <button class="btn btn--primary" id="btnSubmitProposal">Valider en secret</button>
        </div>`;
    }

    // Les deux moitiés du logo : J'accepte (magenta) / Je refuse (bleu).
    renderVotePair(author) {
      return `
        <div class="vote-pair">
          <button class="vote-btn vote-btn--oui" data-action="vote" data-author="${author}" data-value="yes">J'accepte</button>
          <button class="vote-btn vote-btn--non" data-action="vote" data-author="${author}" data-value="no">Je refuse</button>
        </div>`;
    }

    // Code de partie géant, copiable au tap (lobby téléphone et écran de salon).
    renderShareCode(label) {
      return `
        <div class="share-code">
          <p class="lbl">${label}</p>
          <div class="big-code" id="bigCode" role="button" tabindex="0" title="Copier le code">${escapeHtml(this.code)}</div>
        </div>`;
    }

    // Bouton « Lancer / Manche suivante », désactivé tant qu'on n'est pas assez nombreux.
    renderStartButton(count) {
      return `
        <button class="btn btn--primary" id="btnStart" ${count >= MIN_PLAYERS ? '' : 'disabled'}>${this.meta().round > 0 ? 'Manche suivante' : 'Lancer la partie'}</button>
        ${count < MIN_PLAYERS ? `<p class="hint">Il faut au moins ${MIN_PLAYERS} joueurs connectés pour lancer.</p>` : ''}`;
    }

    // Les contrôles pour l'hôte, une note d'attente pour tous les autres.
    hostControls(actionHtml, waitText) {
      return this.isHost() ? actionHtml : `<div class="note">${escapeHtml(waitText)}</div>`;
    }

    /* ---------- Écrans du mode normal ---------- */

    renderPropose() {
      const props = this.proposals();
      const roundIds = this.liveRoundPlayers();
      const total = roundIds.length;
      const done = roundIds.filter(id => props[id]).length;
      if (props[this.uid]) {
        return this.renderScenarioCard(true) + this.renderWait({
          title: 'Proposition envoyée',
          counter: `${done}/${total}`,
          sub: 'On attend les autres joueurs…',
          extra: `
            <div class="players">${this.renderPlayerTags({ showSubmitted: true })}</div>
            ${this.isHost() && done >= MIN_PLAYERS ? '<button class="btn btn--ghost" id="btnForce">Forcer le vote (sans les retardataires)</button>' : ''}`
        });
      }
      return this.renderScenarioCard(false) + this.renderProposalForm();
    }

    renderVote() {
      const order = this.meta().order || [];
      const votes = this.votes();
      const votable = order.filter(a => a !== this.uid);
      const next = votable.find(a => !(votes[a] && votes[a][this.uid] !== undefined));

      if (!next) {
        const voters = this.liveRoundPlayers();
        const done = voters.filter(v => this.voterDone(v)).length;
        return this.renderScenarioCard(true) + this.renderWait({
          title: 'Vote terminé',
          counter: `${done}/${voters.length}`,
          sub: 'On attend les derniers votes…',
          extra: this.isHost() ? '<button class="btn btn--ghost" id="btnForce">Forcer les résultats</button>' : ''
        });
      }

      const proposal = this.proposals()[next];
      const pos = votable.filter(a => votes[a] && votes[a][this.uid] !== undefined).length + 1;
      return this.renderScenarioCard(true) + `
        <div class="card">
          <div class="counter">Vote ${pos} / ${votable.length}</div>
          <div class="quote">« Mais ${escapeHtml(proposal.text)} »</div>
          ${this.renderVotePair(next)}
        </div>`;
    }

    // Carte de révélation d'une proposition (partagée entre le téléphone et le grand écran).
    renderRevealCard(r, i, total, controls) {
      const noVotes = r.total === 0;              // aucun votant (tous partis) : pas de résultat exploitable
      const pct = Math.max(0, Math.min(100, r.yesPercent || 0)); // borné : évite tout débordement de la jauge
      const fillMod = pct >= 100 ? ' splitbar-fill--full' : pct <= 0 ? ' splitbar-fill--empty' : '';
      const oui = Math.round(pct), non = 100 - oui; // % OUI / % NON — somme garantie = 100
      // OUI à gauche, NON à droite. À l'unanimité on masque le côté à 0 % : « 0 % NON » flottant sur une barre
      // 100 % magenta (sans zone bleue) paraîtrait orphelin — le côté gagnant suffit à tout dire.
      const tags = noVotes
        ? '<span class="splitbar-tag splitbar-tag--none">—</span>'
        : (oui > 0 ? `<span class="splitbar-tag splitbar-tag--oui">${oui} % OUI</span>` : '')
        + (non > 0 ? `<span class="splitbar-tag splitbar-tag--non">${non} % NON</span>` : '');
      // Un 50/50 pile est mathématiquement IMPOSSIBLE avec un nombre impair de votants.
      // On n'annonce « parfait » que si les votants sont en nombre pair ET exactement 50 % de oui.
      const isPerfect = r.total > 0 && r.total % 2 === 0 && r.yesPercent === 50;
      const isBest = i === total - 1 && !noVotes; // dernière révélée = la plus proche du 50/50
      const bestLabel = isPerfect ? 'Dilemme parfait de la manche' : 'Le plus proche du 50/50';
      const ptsLabel = noVotes ? 'Aucun vote'
                     : this.isBlind() ? 'Score masqué'   // à l'aveugle : les points sont attribués mais cachés
                     : isPerfect ? 'Écart zéro — 50/50 parfait !'
                     : `+${r.points} d’écart`;
      return `
        <div class="card reveal-pop ${isBest ? 'card--best' : ''}">
          <div class="counter">Proposition ${i + 1} / ${total}</div>
          ${isBest ? `<p class="reveal-best"><span class="pts">${bestLabel}</span></p>` : ''}
          <div class="quote">« Mais ${escapeHtml(r.text)} »</div>
          <div class="splitbar" role="img" aria-label="${noVotes ? 'Aucun vote' : `${oui} % oui, ${non} % non`}">
            <div class="splitbar-fill${fillMod}" style="--pct:${pct}%"></div>
            <div class="splitbar-mid"></div>
            ${tags}
          </div>
          <p class="pts-line"><span class="pts">${ptsLabel}</span></p>
          <div class="author-line"><div class="author-title">${escapeHtml(r.title)}</div><div class="author-name">${escapeHtml(r.authorName)}</div></div>
          <div class="who-voted">
            <div class="col"><span class="h h--oui">Oui</span>${r.yes.map(escapeHtml).join('<br>') || '<span class="muted">Personne</span>'}</div>
            <div class="col"><span class="h h--non">Non</span>${r.no.map(escapeHtml).join('<br>') || '<span class="muted">Personne</span>'}</div>
          </div>
          ${controls}
        </div>`;
    }

    renderResults() {
      const i = this.meta().revealIndex || 0;
      // Même ordre que l'écran de salon : du moins clivant au plus clivant (le Dilemme Parfait en dernier).
      const rows = this.resultRows().sort((a, b) => b.deviation - a.deviation);
      const total = rows.length;

      // Étape 1 : propositions une par une (auteur + votes affichés direct), l'hôte fait avancer
      if (i < total) {
        const last = i + 1 >= total;
        const controls = this.hostControls(
          `<button class="btn btn--primary" id="btnRevealNext" style="margin-top:20px;">${last ? 'Voir le classement' : 'Proposition suivante'}</button>`,
          "L'hôte fait défiler les résultats…");
        return this.renderScenarioCard(true) + this.renderRevealCard(rows[i], i, total, controls);
      }

      // Étape 2 : classement de la manche
      return `
        <div class="card">
          <h2 class="center" style="margin-bottom:18px;">Classement de la manche</h2>
          ${this.renderLeaderboard(false, this.isBlind())}
          ${this.hostControls(
            '<button class="btn btn--primary" id="btnNextRound">Manche suivante</button><button class="btn btn--secondary" id="btnFinish">Terminer la partie</button>',
            "L'hôte décide de la suite…")}
        </div>`;
    }

    renderFinal() {
      const players = this.players();
      const sorted = this.gamePlayers().map(id => players[id]).sort((a, b) => (a.score || 0) - (b.score || 0));
      const top = sorted.slice(0, 3);
      const order = [1, 0, 2]; // 2e à gauche, 1er au centre, 3e à droite
      return `
        <div class="card center">
          <h2 style="font-size:32px;">Partie terminée</h2>
          <p class="muted" style="margin:6px 0 20px;">${this.meta().round} manche${(this.meta().round || 0) > 1 ? 's' : ''} — le plus petit écart gagne</p>
          <div class="podium">
            ${order.filter(i => top[i]).map(i => `<div class="podium-col">
              <div class="podium-rank">${i + 1}</div>
              <div class="podium-name">${escapeHtml(top[i].name)}</div>
              <div class="podium-bar podium-bar--${i + 1}">${top[i].score || 0}</div>
              <div class="podium-pts">d’écart</div></div>`).join('')}
          </div>
          ${sorted.length > 3 ? `<div class="leaderboard">${sorted.slice(3).map((p, i) => `<div class="lb-row"><span class="lb-rank">${i + 4}</span><span class="lb-name">${escapeHtml(p.name)}</span><span class="lb-score">${p.score || 0}</span></div>`).join('')}</div>` : ''}
          ${this.hostControls('<button class="btn btn--primary" id="btnLobby">Rejouer — retour au salon</button>', "L'hôte peut relancer une partie…")}
          <button class="btn btn--ghost" id="btnQuit">Quitter</button>
        </div>`;
    }

    /* ==========================================================
       MODE ÉCRAN / SALON
    ========================================================== */
    renderScreenLobby() {
      const count = this.connectedGameIds().length;
      return `
        <div class="card center">
          ${this.renderLeaderboard()}
          ${this.renderShareCode('Rejoignez sur vos téléphones avec le code')}
          <h3 class="section-title center">Joueurs connectés (${count})</h3>
          <div class="players">
            ${this.renderPlayerTags()}
            ${count === 0 ? '<em class="muted">En attente des joueurs…</em>' : ''}
          </div>
          ${this.renderSpiceControl()}
          ${this.renderCustomScenarios()}
          ${this.renderStartButton(count)}
          <button class="btn btn--ghost" id="btnQuit" style="margin-top:12px;">Fermer l'écran</button>
        </div>`;
    }

    renderScreenPropose() {
      const total = this.liveRoundPlayers().length;
      const done = this.liveRoundPlayers().filter(id => this.proposals()[id]).length;
      return this.renderScenarioCard(false) + this.renderWait({
        mark: false,
        title: 'Écrivez votre contrepartie sur vos téléphones',
        counter: `${done}/${total}`,
        sub: 'ont validé leur proposition',
        extra: `
          <div class="players">${this.renderPlayerTags({ showSubmitted: true })}</div>
          ${done >= MIN_PLAYERS ? '<button class="btn btn--ghost" id="btnForce">Forcer le vote</button>' : ''}`
      });
    }

    renderScreenVote() {
      const order = this.meta().order || [];
      const vi = this.meta().voteIndex || 0;
      if (vi >= order.length) {
        return `<div class="card wait"><div class="spinner"></div><p class="muted">Comptage des votes…</p></div>`;
      }
      const author = order[vi];
      const proposal = this.proposals()[author] || { text: '' };
      const voters = this.currentVoters(author);
      const votes = this.votes();
      const done = voters.filter(v => votes[author] && votes[author][v] !== undefined).length;
      const last = vi + 1 >= order.length;
      return `
        ${this.renderScenarioCard(true)}
        <div class="card wait">
          <div class="counter">Proposition ${vi + 1} / ${order.length}</div>
          <div class="quote">« Mais ${escapeHtml(proposal.text)} »</div>
          <h2 style="margin-top:20px;">Votez sur vos téléphones</h2>
          <div class="progress-big">${done}/${voters.length}</div>
          <p class="muted">ont voté</p>
          <button class="btn btn--ghost" id="btnVoteNext">${last ? 'Terminer le vote' : 'Passer à la suivante'}</button>
        </div>`;
    }

    // Lignes de résultats prêtes pour l'affichage : dépouillement + texte + auteur + titre honorifique.
    resultRows() {
      const props = this.proposals();
      const players = this.players();
      const blind = this.isBlind();
      return (this.meta().order || []).map(authorId => {
        const tally = this.tallyFor(authorId);
        return {
          ...tally,
          // À l'aveugle : aucun nom n'est envoyé au DOM (ni l'auteur, ni les votants). Les COMPTES restent
          // ceux de tallyFor — donc le score (basé sur le nombre de oui/non) est strictement inchangé.
          yes: blind ? tally.yes.map(() => 'Anonyme') : tally.yes,
          no:  blind ? tally.no.map(() => 'Anonyme') : tally.no,
          authorId,
          text: props[authorId] ? props[authorId].text : '',
          authorName: blind ? 'Anonyme' : (players[authorId] ? players[authorId].name : '???'),
          title: honoraryTitle(tally.yesPercent)
        };
      });
    }

    renderScreenResults() {
      const i = this.meta().revealIndex || 0;
      // Du moins clivant au plus clivant : le "Dilemme Parfait" (le plus proche de 50/50) arrive en dernier.
      const rows = this.resultRows().sort((a, b) => b.deviation - a.deviation);
      const total = rows.length;

      // Étape 1 : les propositions une par une, chacune AVEC l'auteur et les votes
      if (i < total) {
        const last = i + 1 >= total;
        const controls = `<button class="btn btn--primary" id="btnRevealNext" style="margin-top:22px;">${last ? 'Voir le classement' : 'Proposition suivante'}</button>`;
        return this.renderScenarioCard(true) + this.renderRevealCard(rows[i], i, total, controls);
      }

      // Étape 2 : le classement clôt la manche
      return `
        <div class="card center">
          <h2 style="margin-bottom:18px;">Classement de la manche</h2>
          ${this.renderLeaderboard(false, this.isBlind())}
          <button class="btn btn--primary" id="btnNextRound">Manche suivante</button>
          <button class="btn btn--secondary" id="btnFinish">Terminer la partie</button>
        </div>`;
    }

    /* ==========================================================
       MANETTE (téléphone en mode salon)
    ========================================================== */
    renderControllerWait(title, sub) {
      return this.renderWait({ title, sub, extra: '<button class="btn btn--ghost" id="btnQuit">Quitter</button>' });
    }

    renderControllerPropose() {
      const banner = this.renderBlindBanner();
      if (this.proposals()[this.uid]) {
        return banner + this.renderControllerWait("Proposition envoyée", "Regarde l'écran pour la suite.");
      }
      return banner + this.renderProposalForm(
        '<div class="note">Le pouvoir est sur l\'écran — invente la pire contrepartie pour couper la salle en deux.</div>');
    }

    renderControllerVote() {
      const order = this.meta().order || [];
      const vi = this.meta().voteIndex || 0;
      if (vi >= order.length) return this.renderControllerWait("Vote terminé", "Regarde l'écran pour les résultats.");

      const author = order[vi];
      if (author === this.uid) return this.renderControllerWait("C'est ta proposition !", "Tu ne votes pas pour celle-ci — regarde l'écran.");
      const votes = this.votes();
      if (votes[author] && votes[author][this.uid] !== undefined) {
        return this.renderControllerWait("Voté", "Regarde l'écran, on passe à la suite.");
      }
      return this.renderBlindBanner() + `
        <div class="card center">
          <div class="counter">Proposition ${vi + 1} / ${order.length}</div>
          <p style="font-size:17px;">La contrepartie est sur l'écran.<br><strong>Tu l'acceptes ?</strong></p>
          ${this.renderVotePair(author)}
        </div>`;
    }

    /* ---------- Bindings ---------- */
    bindHome() {
      const pseudo = document.getElementById('pseudo');
      if (pseudo) pseudo.oninput = (e) => { this.pseudo = e.target.value; };
      const code = document.getElementById('joinCode');
      if (code) {
        code.oninput = (e) => { this.drafts.joinCode = e.target.value; };
        code.onkeydown = (e) => { if (e.key === 'Enter') this.joinRoom(code.value); };
      }
      const c = document.getElementById('btnCreate'); if (c) c.onclick = () => this.createRoom('phone');
      const tv = document.getElementById('btnCreateTV'); if (tv) tv.onclick = () => this.createRoom('tv');
      const j = document.getElementById('btnJoin'); if (j) j.onclick = () => this.joinRoom(document.getElementById('joinCode').value);
    }

    bindRoom() {
      const app = document.getElementById('app');
      const copyCode = (id, resetText) => {
        navigator.clipboard && navigator.clipboard.writeText(this.code);
        const el = document.getElementById(id);
        if (el) el.textContent = 'COPIÉ';
        setTimeout(() => { const n = document.getElementById(id); if (n) n.textContent = resetText; }, COPY_FEEDBACK_MS);
      };
      const pillCode = document.getElementById('pillCode');
      if (pillCode) pillCode.onclick = () => copyCode('pillCode', `Code ${this.code}`);
      const bigCode = document.getElementById('bigCode');
      if (bigCode) {
        bigCode.onclick = () => copyCode('bigCode', this.code);
        bigCode.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); copyCode('bigCode', this.code); } };
      }

      // Boutons d'action : chaque écran ne rend que ceux qui le concernent.
      const actions = {
        btnStart: () => this.startRound(),
        btnSubmitProposal: () => this.submitProposal(document.getElementById('txtProposal').value),
        btnForce: () => this.forceNext(),
        btnNextRound: () => this.nextRound(),
        btnFinish: () => this.finishGame(),
        btnLobby: () => this.backToLobby(),
        btnQuit: () => this.quitRoom(),
        btnRevealNext: () => this.revealNext(),
        btnVoteNext: () => this.tvNextVote(),
      };
      for (const [id, fn] of Object.entries(actions)) {
        const el = document.getElementById(id);
        if (el) el.onclick = fn;
      }

      // Brouillons : l'app re-rend à chaque évènement réseau, on préserve ce qui est en cours de saisie.
      const txtProposal = document.getElementById('txtProposal');
      if (txtProposal) txtProposal.oninput = (e) => { this.drafts.txtProposal = e.target.value; };
      const customSc = document.getElementById('customSc');
      if (customSc) customSc.ontoggle = () => { this.customOpen = customSc.open; };

      const addSc = document.getElementById('btnAddScenario');
      const scIn = document.getElementById('newScenario');
      if (addSc && scIn) {
        scIn.oninput = (e) => { this.drafts.newScenario = e.target.value; };
        addSc.onclick = () => { this.drafts.newScenario = ''; this.addCustomScenario(scIn.value); };
        scIn.onkeypress = (e) => { if (e.key === 'Enter') { this.drafts.newScenario = ''; this.addCustomScenario(scIn.value); } };
        if (this.focusScenario) { scIn.focus(); this.focusScenario = false; }
      }

      app.onclick = (e) => {
        const el = e.target.closest('[data-action]');
        if (!el) return;
        const a = el.dataset.action;
        if (a === 'spice') this.setSpice(parseInt(el.dataset.level, 10));
        else if (a === 'rmscenario') this.removeCustomScenario(el.dataset.id);
        else if (a === 'kick') this.kickPlayer(el.dataset.id);
        else if (a === 'vote') this.submitVote(el.dataset.author, el.dataset.value);
      };
    }
  }

  window.app = new App();
</script>
</body>
</html>
