<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>50/50 - Édition Neo-Pop Party</title>
  
  <link rel="icon" type="image/png" href="logo.png">
  
  <style>
    /* ===== RESET & FONTS ===== */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    
    /* ===== BACKGROUND ANIMÉ ===== */
    body { 
      background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #e94560);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh; 
      padding: 20px; 
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ===== CONTAINER RESPONSIVE ===== */
    .container { width: 100%; max-width: 650px; margin: auto; }

    /* ===== HEADER ===== */
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { 
      font-size: 56px; font-weight: 900; margin-bottom: 5px; 
      background: -webkit-linear-gradient(0deg, #ff00cc, #3333ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0px 4px 10px rgba(255, 0, 204, 0.3));
    }
    .header .subtitle { font-size: 18px; font-weight: 600; color: #a0aec0; letter-spacing: 2px; text-transform: uppercase; }

    /* ===== GLASSMORPHISM CARDS ===== */
    .card { 
      background: rgba(25, 30, 50, 0.6); backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); 
      border-radius: 24px; padding: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
      margin-bottom: 25px; 
    }

    /* ===== SCÉNARIOS ET RÈGLES ===== */
    .scenario-card { 
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
      color: #1a1a2e; text-align: center; padding: 40px 30px; position: relative; overflow: hidden; 
      border: none; box-shadow: 0 15px 35px rgba(255, 154, 158, 0.3);
    }
    .scenario-text { font-size: 26px; font-weight: 800; line-height: 1.4; margin-bottom: 15px; word-wrap: break-word; }
    .scenario-label { font-size: 14px; opacity: 0.8; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 15px; }
    
    .secret-rule-box { 
      margin-top: 25px; padding: 15px; background: #1a1a2e; color: #fff;
      border-radius: 12px; border: 2px dashed #ff00cc; 
      animation: pulseRule 2s infinite; 
    }
    .secret-rule-title { font-weight: 900; color: #ff00cc; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; font-size: 13px; }
    @keyframes pulseRule { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 204, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 0, 204, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 204, 0); } }

    /* ===== INPUTS & TEXTAREA ===== */
    .input-group { margin-bottom: 25px; }
    label { display: block; margin-bottom: 10px; font-weight: 600; color: #cbd5e1; font-size: 14px; }
    input, textarea { 
      width: 100%; padding: 18px; background: rgba(0, 0, 0, 0.2); color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 16px; font-size: 16px; 
    }
    input:focus, textarea:focus { outline: none; border-color: #00f2fe; background: rgba(0, 0, 0, 0.4); }
    textarea { resize: vertical; min-height: 120px; }

    /* ===== BOUTONS ===== */
    button { 
      width: 100%; padding: 18px; background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%); 
      color: white; border: none; border-radius: 16px; font-size: 18px; font-weight: 800; 
      cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 10px 20px rgba(0, 114, 255, 0.3);
    }
    button.secondary { background: rgba(255,255,255,0.1); margin-top: 10px; border: 1px solid rgba(255,255,255,0.2); }

    /* ===== VOTES ===== */
    .vote-buttons { display: flex; gap: 15px; margin-top: 25px; }
    .vote-btn { flex: 1; padding: 20px 10px; background: rgba(0,0,0,0.3); border: 2px solid; border-radius: 16px; font-weight: 800; font-size: 18px; }
    .vote-btn.yes { border-color: #00e676; color: #00e676; }
    .vote-btn.no { border-color: #ff1744; color: #ff1744; }

    /* ===== RÉSULTATS & ANIMATIONS ===== */
    .result-item { background: rgba(0, 0, 0, 0.2); border-radius: 16px; padding: 25px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
    .winner { border: 2px solid #ffd700; }
    .winner-badge { position: absolute; top: -12px; right: 20px; background: #ffd700; color: #000; padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: 900; text-transform: uppercase; }
    
    .vote-bar-container { position: relative; height: 40px; background: rgba(255, 23, 68, 0.2); border-radius: 20px; overflow: hidden; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
    .vote-bar-fill { position: absolute; left: 0; top: 0; height: 100%; background: linear-gradient(90deg, #00e676, #1de9b6); width: 0%; transition: width 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; align-items: center; padding-left: 15px; color: #000; font-weight: 900; }
    
    .author-reveal-btn { background: rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 12px; margin-top: 15px; width: 100%; cursor: pointer; }
    .author-info { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; }
    .author-name { font-size: 26px; font-weight: 900; color: #00f2fe; margin-bottom: 5px; }

    /* ===== DIVERS ===== */
    .info-box { background: rgba(0, 198, 255, 0.1); border-left: 4px solid #00c6ff; padding: 15px 20px; border-radius: 0 12px 12px 0; margin-bottom: 25px; font-weight: 600; }
    .player-tag { display: inline-block; background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 20px; margin: 5px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>50/50</h1>
    <div class="subtitle">Party Édition 📱</div>
  </div>
  <div id="app"></div>
</div>

<script type="module">
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function generateId() { return Math.random().toString(36).substring(2, 9); }

  const SCENARIOS = ["Vous gagnez 10 millions", "Vous pouvez voler", "Vous lisez dans les pensées", "Immortel", "Célébrité mondiale", "Santé parfaite 100 ans", "Téléportation", "Parler aux animaux"];
  const SECRET_RULES = ["Contrainte animalière", "Lié à la nourriture", "Handicap physique", "Embarrassant public", "Membre famille", "Ruine financière", "Mot 'Toujours' ou 'Jamais'"];

  class Game {
    constructor() {
      this.players = []; this.phase = 'setup'; this.proposals = []; this.votes = {}; this.results = [];
      this.render();
    }

    addPlayer(name) {
      if (name.trim() && !this.players.includes(name.trim())) { this.players.push(name.trim()); this.render(); }
    }

    removePlayer(name) { this.players = this.players.filter(p => p !== name); this.render(); }

    startGame() {
      if (this.players.length < 2) return alert("Min 2 joueurs !");
      this.scenario = SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)];
      this.secretRule = Math.random() < 0.3 ? SECRET_RULES[Math.floor(Math.random() * SECRET_RULES.length)] : null;
      this.proposals = []; this.votes = {}; this.currentPlayerIndex = 0; this.phase = 'transition_propose';
      this.render();
    }

    submitProposal(text) {
      if (!text.trim()) return;
      this.proposals.push({ id: generateId(), author: this.players[this.currentPlayerIndex], text: text.trim() });
      this.currentPlayerIndex++;
      if (this.currentPlayerIndex >= this.players.length) {
        this.proposals.sort(() => Math.random() - 0.5);
        this.currentPlayerIndex = 0; this.currentVoteIndex = 0; this.phase = 'transition_vote';
      } else { this.phase = 'transition_propose'; }
      this.render();
    }

    submitVote(val) {
      const p = this.proposals[this.currentVoteIndex];
      if (!this.votes[p.id]) this.votes[p.id] = { yes: [], no: [] };
      this.votes[p.id][val].push(this.players[this.currentPlayerIndex]);
      this.currentVoteIndex++;
      if (this.currentVoteIndex >= this.proposals.length) {
        this.currentVoteIndex = 0; this.currentPlayerIndex++;
        if (this.currentPlayerIndex >= this.players.length) { this.calculate(); this.phase = 'results'; }
        else { this.phase = 'transition_vote'; }
      }
      this.render();
    }

    calculate() {
      this.results = this.proposals.map(p => {
        const v = this.votes[p.id] || { yes: [], no: [] };
        const total = v.yes.length + v.no.length;
        const yesPercent = total > 0 ? (v.yes.length / total) * 100 : 0;
        return { ...p, yesPercent, deviation: Math.abs(50 - yesPercent) };
      }).sort((a, b) => a.deviation - b.deviation);
    }

    revealAuthor(id) {
      document.getElementById('btn-reveal-'+id).style.display = 'none';
      document.getElementById('info-'+id).style.display = 'block';
    }

    render() {
      const app = document.getElementById('app');
      if (this.phase === 'setup') app.innerHTML = `
        <div class="card">
          <h2 style="text-align:center;">👥 Les Joueurs</h2>
          <div style="display:flex; flex-wrap:wrap; justify-content:center;">${this.players.map(p => `<span class="player-tag">${p} <span onclick="window.game.removePlayer('${p}')" style="color:red;cursor:pointer">✖</span></span>`).join('')}</div>
          <input type="text" id="pname" placeholder="Prénom...">
          <button onclick="window.game.addPlayer(document.getElementById('pname').value); document.getElementById('pname').value=''">+ Ajouter</button>
          <button style="margin-top:20px" onclick="window.game.startGame()">🚀 Lancer</button>
        </div>`;
      else if (this.phase === 'results') {
        app.innerHTML = `<div class="card">
          ${this.results.map(r => {
            const v = this.votes[r.id];
            return `<div class="result-item">
              <h3 style="margin-bottom:10px;">"${r.text}"</h3>
              <div class="vote-bar-container"><div class="vote-bar-fill" style="width:${r.yesPercent}%">${Math.round(r.yesPercent)}% OUI</div></div>
              <button class="author-reveal-btn" id="btn-reveal-${r.id}" onclick="window.game.revealAuthor('${r.id}')">Révéler auteur et votes</button>
              <div class="author-info" id="info-${r.id}">
                <div class="author-name">${r.author}</div>
                <div style="display:flex; justify-content:center; gap:20px;">
                  <div><span style="color:#00e676">✅ OUI:</span> ${v.yes.join(', ') || 'Aucun'}</div>
                  <div><span style="color:#ff1744">❌ NON:</span> ${v.no.join(', ') || 'Aucun'}</div>
                </div>
              </div>
            </div>`;
          }).join('')}
          <button onclick="window.game.resetGame()">🔄 Rejouer</button>
        </div>`;
      } else {
        // Logique de rendu intermédiaire simplifiée pour l'affichage complet
        app.innerHTML = `<div class="card"><h2>${this.phase === 'propose' ? 'À toi de proposer !' : 'À toi de voter !'}</h2>
        <button onclick="window.phase === 'transition_propose' ? (this.phase='propose') : (this.phase='vote'); window.game.render()">Continuer</button></div>`;
      }
    }
  }
  window.game = new Game();
</script>
</body>
</html>
