    .vote-btn.no{ border-color:var(--no); color:var(--no); }

    .vote-bar-container::after{ content:''; position:absolute; left:50%; top:0; bottom:0; width:2px; background:rgba(242,238,255,.9); transform:translateX(-1px); z-index:2; }
    .points-tag{ display:inline-block; margin-top:14px; padding:5px 12px; border-radius:6px; background:rgba(255,206,58,.12); border:1px solid rgba(255,206,58,.4); color:var(--gold); font-family:var(--mono); font-size:12px; }

    .podium-score{ font-family:var(--mono); font-size:12px; color:var(--muted); }

    .spice-btn{ flex:1; padding:13px 6px; font-size:14px; font-weight:600; letter-spacing:0; text-transform:none; background:var(--ink2); border:1px solid var(--line); border-radius:9px; color:var(--muted); }
    .spice-btn:hover{ filter:none; background:var(--surface2); }

    .hint{ text-align:center; margin-top:12px; font-size:13px; color:var(--faint); min-height:18px; }
    .custom-box{ background:var(--ink2); border:1px dashed var(--line2); border-radius:10px; padding:18px; margin-bottom:22px; }

    /* MISC */
    .info-box{ background:rgba(79,107,255,.1); border-left:3px solid var(--blue); padding:14px 16px; border-radius:0 8px 8px 0; margin-bottom:22px; font-size:15px; color:#dfe2ff; }
    .info-box.alert{ background:rgba(255,59,92,.14); border-left-color:var(--no); color:#ffd2da; }
    .info-box.ok{ background:rgba(25,224,138,.1); border-left-color:var(--yes); color:#cfeede; }
    .player-tag{ display:inline-flex; align-items:center; background:var(--ink2); border:1px solid var(--line); color:var(--paper); padding:8px 14px; border-radius:7px; margin:5px; font-weight:600; font-size:14px; }
    .player-tag .dot{ width:8px; height:8px; border-radius:50%; margin-right:8px; background:var(--yes); }
    .player-tag .dot.off{ background:var(--faint); }
    .player-tag .crown{ margin-left:8px; }
    .player-tag .check{ margin-left:8px; color:var(--yes); font-weight:900; }
    .player-tag .remove-x{ cursor:pointer; color:var(--no); margin-left:10px; font-weight:900; }

    .transition-screen,.watch-screen{ text-align:center; padding:46px 20px; }
    .watch-screen .big-emoji{ font-size:64px; margin-bottom:18px; }
    .spinner{ width:46px; height:46px; border:4px solid rgba(255,255,255,.14); border-top-color:var(--magenta); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 18px; }
    @keyframes spin{ to{ transform:rotate(360deg); } }
    .progress-text{ font-family:var(--display); font-size:34px; color:var(--paper); margin:8px 0; }
    .banner-error{ background:rgba(255,59,92,.14); border:1px solid var(--no); color:#ffd2da; border-radius:9px; padding:12px 14px; margin-bottom:20px; font-weight:600; font-size:14px; text-align:center; }

    /* SCREEN / SALON */
    .mode-row{ display:flex; gap:12px; margin-top:10px; }
    .mode-btn{ flex:1; padding:16px 10px; font-size:14px; font-weight:600; letter-spacing:0; text-transform:none; line-height:1.3; background:var(--ink2); border:1px solid var(--line); border-radius:10px; color:var(--muted); }
    .mode-btn:hover{ filter:none; background:var(--surface2); color:var(--paper); }
    .mode-btn .mb-emoji{ font-size:24px; display:block; margin-bottom:6px; }
    .big-code{ font-family:var(--mono); font-size:58px; letter-spacing:.22em; text-align:center; margin:6px 0; color:var(--paper); text-shadow:0 0 26px rgba(255,46,154,.4); }
    .screen-tag{ display:block; text-align:center; color:var(--muted); font-family:var(--mono); letter-spacing:.22em; text-transform:uppercase; font-size:12px; }
    .screen-scenario{ font-family:var(--display); font-size:44px; line-height:1.02; text-transform:uppercase; }
    .screen-big{ font-family:var(--display); font-size:30px; text-transform:uppercase; }
    .big-prop{ font-family:var(--display); font-size:34px; line-height:1.08; text-transform:uppercase; }
    .reveal-pop{ animation:pop .55s cubic-bezier(.2,.9,.3,1.2); }
    @keyframes pop{ from{ transform:scale(.96); opacity:0; } to{ transform:scale(1); opacity:1; } }

    button:focus-visible,input:focus-visible,textarea:focus-visible,[data-action]:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
    @media (prefers-reduced-motion: reduce){ *{ animation:none!important; transition:none!important; } }
  </style>

      this.unsub = null;         // désabonnement onValue
      this.error = null;
      this.pseudo = localStorage.getItem('pseudo5050') || '';
      this.fatal = null;

      try {
        const fbApp = initializeApp(firebaseConfig);
        this.auth = getAuth(fbApp);
        this.db = getDatabase(fbApp);
      } catch (e) {
        this.fatal = "Config Firebase invalide. As-tu collé ta vraie config en haut du fichier ?";
        this.render(); return;
      }

      signInAnonymously(this.auth).catch(() => {
        this.fatal = "Connexion anonyme refusée. Active 'Anonyme' dans Firebase > Authentication > Sign-in method.";
        this.render();
      });
      onAuthStateChanged(this.auth, (user) => {
        if (user) { this.uid = user.uid; this.tryResume(); this.render(); }
      });
      this.render();
    }

    // Reprise auto après un rechargement de page (l'uid anonyme est stable dans ce navigateur)
    async tryResume() {
      if (this._resumed || this.code) return;
      this._resumed = true;
      const code = localStorage.getItem('room5050');
      if (!code) return;
      try {
        const snap = await get(this.rref('rooms/' + code));
        if (snap.exists() && snap.val().players && snap.val().players[this.uid]) {
          this.joinSubscription(code);
        } else {
          localStorage.removeItem('room5050');
        }
      } catch (e) { localStorage.removeItem('room5050'); }
    }

    rref(path) { return ref(this.db, path); }
    meta() { return (this.room && this.room.meta) || {}; }
    players() { return (this.room && this.room.players) || {}; }
    proposals() { return (this.room && this.room.proposals) || {}; }
    votes() { return (this.room && this.room.votes) || {}; }
    me() { return this.players()[this.uid] || null; }
    isHost() { return this.meta().hostId === this.uid; }
    connectedIds() { const p = this.players(); return Object.keys(p).filter(id => p[id].connected); }
    roundPlayers() { return this.meta().roundPlayers || []; }

    // Mode écran/salon : l'ordinateur est l'écran + hôte, il ne joue pas.
    isTV() { return !!this.meta().tv; }
    isScreen() { return this.isTV() && this.meta().screenId === this.uid; }
    gamePlayers() { const p = this.players(); return Object.keys(p).filter(id => !p[id].isScreen); }            // vrais joueurs (hors écran)
    connectedGameIds() { const p = this.players(); return Object.keys(p).filter(id => p[id].connected && !p[id].isScreen); }

    /* ---------- Création / connexion ---------- */
    async createRoom(mode = 'phone') {
      initInteraction(); vibrate(50); playSound('click');
      const tv = (mode === 'tv');
      const name = this.pseudo.trim();
      if (!tv && !name) { this.error = "Choisis d'abord un pseudo."; return this.render(); }
      let code, exists = true, tries = 0;
      do { code = randomCode(4); exists = (await get(this.rref('rooms/' + code))).exists(); tries++; } while (exists && tries < 10);

      const meta = { phase: 'lobby', round: 0, spice: 2, hostId: this.uid, scored: -1, createdAt: serverTimestamp() };
      let players;
      if (tv) {
        meta.tv = true; meta.screenId = this.uid;
        // L'écran est enregistré comme un "joueur" marqué isScreen : il sert juste à la présence et au pilotage, il ne joue pas.
        players = { [this.uid]: { name: '📺 Écran', score: 0, connected: true, isHost: true, isScreen: true } };
      } else {
        players = { [this.uid]: { name, score: 0, connected: true, isHost: true } };
      }

      const roomObj = { meta, players };
      try {
        await update(ref(this.db), {
          ['rooms/' + code]: roomObj,
          ['throttle/' + this.uid]: serverTimestamp()
        });
      } catch (e) {
        this.error = "Tu crées des parties trop vite — attends quelques secondes et réessaie.";
        return this.render();
      }
      this.joinSubscription(code);
    }

    async joinRoom(codeRaw) {
      initInteraction(); vibrate(50); playSound('click');
      const name = this.pseudo.trim();
      const code = (codeRaw || '').trim().toUpperCase();
      if (!name) { this.error = "Choisis d'abord un pseudo."; return this.render(); }
      if (code.length !== 4) { this.error = "Le code fait 4 caractères."; return this.render(); }
      const snap = await get(this.rref('rooms/' + code));
      if (!snap.exists()) { this.error = "Aucune partie avec ce code."; return this.render(); }
      const data = snap.val();
      if (data.meta.phase !== 'lobby' && !(data.players && data.players[this.uid])) {
        this.error = "La partie a déjà commencé."; return this.render();
      }
      const existing = data.players && data.players[this.uid];
      await update(this.rref(`rooms/${code}/players/${this.uid}`), {
        name, connected: true, score: existing ? existing.score : 0, isHost: data.meta.hostId === this.uid
      });
      this.joinSubscription(code);
    }

    joinSubscription(code) {
      this.code = code; this.error = null; this._dcMode = null;
      localStorage.setItem('pseudo5050', this.pseudo.trim());
      localStorage.setItem('room5050', code);

      // Présence : on se marque en ligne ; la gestion de déconnexion est (ré)armée à chaque snapshot
      set(this.rref(`rooms/${code}/players/${this.uid}/connected`), true);

      if (this.unsub) this.unsub();
      this.unsub = onValue(this.rref('rooms/' + code), (snap) => {
        if (!snap.exists()) { this.leaveLocal("La partie a été fermée."); return; }
        this.room = snap.val();
        this.hostTick();                 // l'hôte fait avancer le jeu si besoin
        this.updateDisconnectHandler();  // dernier connecté => suppression de la room en partant
        this.render();
      });
    }

    // Recalcule, à chaque changement, ce qu'il faut faire si CET appareil se déconnecte.
    // - Seul connecté  => programmer la suppression de TOUTE la room.
    // - D'autres là    => se marquer simplement hors-ligne.
    updateDisconnectHandler() {
      if (!this.code || !this.uid) return;
      const me = this.players()[this.uid];
      if (!me) return;
      const solo = this.connectedIds().length <= 1; // moi seul encore connecté
      const mode = solo ? 'solo' : 'multi';
      if (mode === this._dcMode) return;             // déjà dans le bon mode, on évite le spam réseau
      this._dcMode = mode;

      const connRef = this.rref(`rooms/${this.code}/players/${this.uid}/connected`);
      const roomRef = this.rref('rooms/' + this.code);
      onDisconnect(connRef).cancel();
      onDisconnect(roomRef).cancel();
      if (solo) onDisconnect(roomRef).remove();      // ménage complet quand le dernier s'en va
      else      onDisconnect(connRef).set(false);    // sinon, juste hors-ligne
    }

    leaveLocal(msg) {
      if (this.unsub) { this.unsub(); this.unsub = null; }
      this._dcMode = null;
      localStorage.removeItem('room5050');
      this.code = null; this.room = null; this.error = msg || null; this.render();
    }

    async quitRoom() {
      initInteraction(); vibrate(50); playSound('click');
      if (this.code && this.uid) {
        const others = this.connectedIds().filter(id => id !== this.uid);
        const connRef = this.rref(`rooms/${this.code}/players/${this.uid}/connected`);
        const roomRef = this.rref('rooms/' + this.code);
        // On annule les actions de déconnexion : on fait le ménage nous-mêmes, maintenant.
        try { await onDisconnect(connRef).cancel(); } catch (e) {}
        try { await onDisconnect(roomRef).cancel(); } catch (e) {}
        try {
          if (others.length === 0) {
            // Dernier joueur : on supprime toute la room (on devient hôte si besoin, pour passer les règles)
            if (!this.isHost()) { try { await update(this.rref(`rooms/${this.code}/meta`), { hostId: this.uid }); } catch (e) {} }
            await remove(roomRef);
          } else {
            await remove(this.rref(`rooms/${this.code}/players/${this.uid}`));
          }
        } catch (e) {}
      }
      this._dcMode = null;
      this.leaveLocal();
    }

    /* ---------- Réglages lobby (hôte) ---------- */
    setSpice(level) { if (!this.isHost()) return; initInteraction(); playSound('click'); update(this.rref(`rooms/${this.code}/meta`), { spice: level }); }
    addCustomScenario(text) {
      if (!this.isHost()) return;
      const clean = (text || '').trim(); if (!clean) return;
      initInteraction(); playSound('click');
      const id = randomCode(6);
      set(this.rref(`rooms/${this.code}/customScenarios/${id}`), { text: clean });
      this.focusScenario = true;
    }
    removeCustomScenario(id) { if (!this.isHost()) return; playSound('click'); remove(this.rref(`rooms/${this.code}/customScenarios/${id}`)); }
    kickPlayer(id) { if (!this.isHost() || id === this.uid) return; playSound('click'); remove(this.rref(`rooms/${this.code}/players/${id}`)); }

    /* ---------- Pioche ---------- */
    scenarioPool() {
      const spice = this.meta().spice || 2;
      let pool = [];
      for (let l = 1; l <= spice; l++) pool = pool.concat(SCENARIOS_BY_TIER[l]);
      const custom = this.room.customScenarios ? Object.values(this.room.customScenarios).map(s => s.text) : [];
      return pool.concat(custom);
    }
    rulePool() { const spice = this.meta().spice || 2; let pool = []; for (let l = 1; l <= spice; l++) pool = pool.concat(SECRET_RULES_BY_TIER[l]); return pool; }

    /* ---------- Démarrer une manche (hôte) ---------- */
    async startRound() {
      if (!this.isHost()) return;
      initInteraction(); vibrate([50,50,50]); playSound('tada');
      const connected = this.connectedGameIds();
      if (connected.length < MIN_PLAYERS) return;

      const used = this.meta().usedScenarios || [];
      const pool = this.scenarioPool();
      let avail = pool.filter(s => !used.includes(s));
      if (avail.length === 0) avail = pool;
      const scenario = avail[Math.floor(Math.random() * avail.length)];
      const rules = this.rulePool();
      const secretRule = Math.random() < 0.35 ? rules[Math.floor(Math.random() * rules.length)] : null;

      await update(this.rref(`rooms/${this.code}`), {
        proposals: null, votes: null,
        meta: {
          ...this.meta(),
          phase: 'propose',
          round: (this.meta().round || 0) + 1,
          scenario, secretRule: secretRule || null,
          roundPlayers: connected,
          order: null,
          usedScenarios: [...used, scenario].slice(-40),
          scored: this.meta().scored
        }
      });
    }

    /* ---------- Soumettre une proposition ---------- */
    submitProposal(text) {
      initInteraction(); vibrate(50); playSound('click');
      let clean = (text || '').trim().replace(/^mais\s+/i, ''); // "Mais" est déjà le préfixe fixe
      if (!clean) return;
      set(this.rref(`rooms/${this.code}/proposals/${this.uid}`), { text: clean });
    }

    /* ---------- Voter ---------- */
    submitVote(authorId, value) {
      initInteraction(); vibrate(50); playSound('click');
      set(this.rref(`rooms/${this.code}/votes/${authorId}/${this.uid}`), value);
    }

    /* ---------- Transitions pilotées par l'hôte ---------- */
    hostTick() {
      // En mode écran/salon, l'hôte EST l'écran : pas de migration (l'écran doit se reconnecter).
      if (!this.isTV()) {
        // Migration d'hôte : si l'hôte est déconnecté, le 1er joueur connecté (ordre alphabétique d'uid) reprend la main
        const players = this.players();
        const hostId = this.meta().hostId;
        const hostOk = hostId && players[hostId] && players[hostId].connected;
        if (!hostOk) {
          const candidate = this.connectedIds().sort()[0];
          if (candidate && candidate === this.uid) {
            update(this.rref(`rooms/${this.code}/meta`), { hostId: this.uid });
            update(this.rref(`rooms/${this.code}/players/${this.uid}`), { isHost: true });
          }
          return; // on attend la stabilisation
        }
      }
      if (!this.isHost()) return;

      const phase = this.meta().phase;
      if (phase === 'propose' && this.allProposed()) this.openVote();
      else if (phase === 'vote') {
        if (this.isTV()) this.tvVoteTick();          // salon : une proposition à la fois, synchronisée
        else if (this.allVoted()) this.computeResults(); // téléphone : chacun vote à son rythme
      }
    }

    // Mode salon : avance automatiquement quand tous les joueurs CONNECTÉS ont voté la proposition courante
    tvVoteTick() {
      const order = this.meta().order || [];
      const vi = this.meta().voteIndex || 0;
      if (vi >= order.length) { this.computeResults(); return; }
      const author = order[vi];
      const voters = this.currentVoters(author);
      const votes = this.votes();
      const done = voters.length > 0 && voters.every(v => votes[author] && votes[author][v] !== undefined);
      if (done) {
        if (vi + 1 >= order.length) this.computeResults();
        else update(this.rref(`rooms/${this.code}/meta`), { voteIndex: vi + 1 });
      }
    }

    // Votants attendus pour une proposition : joueurs connectés de la manche, sauf l'auteur
    currentVoters(author) {
      const p = this.players();
      return this.roundPlayers().filter(id => p[id] && p[id].connected && id !== author);
    }

    // Bouton "proposition suivante" de l'écran (force, pour un joueur AFK)
    tvNextVote() {
      if (!this.isScreen()) return;
      initInteraction(); playSound('click');
      const order = this.meta().order || [];
      const vi = this.meta().voteIndex || 0;
      if (vi + 1 >= order.length) this.computeResults();
      else update(this.rref(`rooms/${this.code}/meta`), { voteIndex: vi + 1 });
    }

    activeRoundPlayers() {
      const players = this.players();
      return this.roundPlayers().filter(id => players[id]); // encore présents
    }

    allProposed() {
      const props = this.proposals();
      return this.activeRoundPlayers().every(id => props[id]);
    }

    async openVote() {
      const order = shuffle(this.activeRoundPlayers().filter(id => this.proposals()[id]));
      await update(this.rref(`rooms/${this.code}/meta`), { phase: 'vote', order, voteIndex: 0 });
    }

    voterDone(voterId) {
      const order = this.meta().order || [];
      const votes = this.votes();
      return order.filter(a => a !== voterId).every(a => votes[a] && votes[a][voterId] !== undefined);
    }
    allVoted() {
      const voters = this.activeRoundPlayers();
      return voters.length > 0 && voters.every(v => this.voterDone(v));
    }

    async computeResults() {
      if (this.meta().scored === this.meta().round) return; // déjà compté
      const order = this.meta().order || [];
      const votes = this.votes();
      const players = this.players();
      const scoreUpdates = {};
      order.forEach(authorId => {
        const v = votes[authorId] || {};
        const vals = Object.values(v);
        const yes = vals.filter(x => x === 'yes').length;
        const total = vals.length;
        const yesPercent = total > 0 ? (yes / total) * 100 : 0;
        const pts = pointsFromDeviation(Math.abs(50 - yesPercent));
        if (players[authorId]) scoreUpdates[`players/${authorId}/score`] = (players[authorId].score || 0) + pts;
      });
      scoreUpdates['meta/phase'] = 'results';
      scoreUpdates['meta/scored'] = this.meta().round;
      scoreUpdates['meta/revealIndex'] = 0;       // révélation des propositions une par une (mode écran)
      scoreUpdates['meta/revealAuthors'] = false;  // auteurs encore cachés
      await update(this.rref('rooms/' + this.code), scoreUpdates);
    }

    /* ---------- Révélation par étapes (mode écran/salon) ---------- */
    revealNext() {
      if (!this.isHost()) return;
      initInteraction(); playSound('click');
      const n = (this.meta().order || []).length;
      const i = this.meta().revealIndex || 0;
      if (i < n) update(this.rref(`rooms/${this.code}/meta`), { revealIndex: i + 1 });
    }

    forceNext() {
      if (!this.isHost()) return;
      initInteraction(); playSound('click');
      if (this.meta().phase === 'propose') this.openVote();
      else if (this.meta().phase === 'vote') this.computeResults();
    }

    nextRound() { this.startRound(); }
    async finishGame() { if (!this.isHost()) return; playSound('tada'); await update(this.rref(`rooms/${this.code}/meta`), { phase: 'final' }); }
    async backToLobby() { if (!this.isHost()) return; playSound('click'); await update(this.rref(`rooms/${this.code}/meta`), { phase: 'lobby' }); }

    /* ==========================================================
       RENDU
    ========================================================== */
    render() {
      const appDiv = document.getElementById('app');
      const pills = document.getElementById('pills');
      pills.innerHTML = '';

      if (this.fatal) { appDiv.innerHTML = `<div class="card"><div class="banner-error">⚠️ ${escapeHtml(this.fatal)}</div></div>`; return; }
      if (!this.uid) { appDiv.innerHTML = `<div class="card transition-screen"><div class="spinner"></div><p style="color:var(--muted);">Connexion…</p></div>`; return; }

      if (!this.code || !this.room) { appDiv.innerHTML = this.renderHome(); this.bindHome(); return; }

      // Pills (code room + manche)
      const phase = this.meta().phase;
      pills.innerHTML = `<span class="pill code" id="pillCode">CODE ${escapeHtml(this.code)} 📋</span>` +
        (this.meta().round > 0 && phase !== 'final' ? `<span class="pill round">Manche ${this.meta().round}</span>` : '');

      const animateBars = () => setTimeout(() => document.querySelectorAll('.vote-bar-fill').forEach(b => b.style.width = b.dataset.w), 80);

      if (this.isScreen()) {
        // ===== AFFICHAGE GRAND ÉCRAN (l'ordinateur / projecteur) =====
        if (phase === 'lobby') appDiv.innerHTML = this.renderScreenLobby();
        else if (phase === 'propose') appDiv.innerHTML = this.renderScreenPropose();
        else if (phase === 'vote') appDiv.innerHTML = this.renderScreenVote();
        else if (phase === 'results') { appDiv.innerHTML = this.renderScreenResults(); animateBars(); }
        else if (phase === 'final') appDiv.innerHTML = this.renderFinal();
      } else if (this.isTV()) {
        // ===== MANETTE (téléphone, en mode salon) =====
        if (phase === 'propose') appDiv.innerHTML = this.renderControllerPropose();
        else if (phase === 'vote') appDiv.innerHTML = this.renderControllerVote();
        else if (phase === 'lobby') appDiv.innerHTML = this.renderControllerWait("Tu es connecté ✅", "Regarde l'écran 📺, l'hôte va lancer la partie.");
        else if (phase === 'results') appDiv.innerHTML = this.renderControllerWait("Résultats en cours 🏆", "Tout se passe sur l'écran 📺");
        else if (phase === 'final') appDiv.innerHTML = this.renderControllerWait("Partie terminée 🎉", "Classement final sur l'écran 📺");
      } else {
        // ===== MODE NORMAL (chacun sur son téléphone) =====
        if (phase === 'lobby') appDiv.innerHTML = this.renderLobby();
        else if (phase === 'propose') appDiv.innerHTML = this.renderPropose();
        else if (phase === 'vote') appDiv.innerHTML = this.renderVote();
        else if (phase === 'results') { appDiv.innerHTML = this.renderResults(); animateBars(); }
        else if (phase === 'final') appDiv.innerHTML = this.renderFinal();
      }

      this.bindRoom();
    }

    renderHome() {
      return `
        <div class="card">
          ${this.error ? `<div class="banner-error">${escapeHtml(this.error)}</div>` : ''}
          <div class="rules-box">
            <h3>📜 Le principe</h3>
            <ul class="rules-list">
              <li>⚡ <strong>1.</strong> Le jeu donne un super-pouvoir à tout le monde.</li>
              <li>😈 <strong>2.</strong> Chacun invente en secret une contrepartie ("...mais...").</li>
              <li>🗳️ <strong>3.</strong> Tout le monde vote sur chaque contrepartie (sauf la sienne).</li>
              <li>⚖️ <strong>4.</strong> Tu marques un max de points en t'approchant du <strong>50/50</strong> !</li>
            </ul>
          </div>
          <div class="input-group">
            <label>Ton pseudo</label>
            <input type="text" id="pseudo" maxlength="16" placeholder="Ton prénom..." value="${escapeHtml(this.pseudo)}">
          </div>
          <button id="btnCreate">🚀 Créer une partie</button>
          <div class="mode-row">
            <button class="mode-btn" id="btnCreateTV"><span class="mb-emoji">📺</span>Créer un écran de salon<br><span style="color:var(--faint);">(ordi / projecteur)</span></button>
          </div>
          <div style="text-align:center; color:var(--faint); margin:18px 0; font-weight:700;">— ou —</div>
          <div class="input-group">
            <label>Rejoindre avec un code</label>
            <input type="text" id="joinCode" maxlength="4" class="code-input" placeholder="ABCD">
          </div>
          <button id="btnJoin" class="secondary">Rejoindre la partie</button>
        </div>`;
    }

    renderPlayerTags(opts = {}) {
      const players = this.players();
      const props = this.proposals();
      return this.gamePlayers().map(id => {
        const p = players[id];
        const host = this.meta().hostId === id;
        const submitted = opts.showSubmitted && props[id];
        const canKick = this.isHost() && id !== this.uid && this.meta().phase === 'lobby';
        return `<span class="player-tag">
          <span class="dot ${p.connected ? '' : 'off'}"></span>${escapeHtml(p.name)}
          ${host ? '<span class="crown">👑</span>' : ''}
          ${submitted ? '<span class="check">✓</span>' : ''}
          ${canKick ? `<span class="remove-x" data-action="kick" data-id="${id}">✖</span>` : ''}
        </span>`;
      }).join('');
    }

    renderLeaderboard() {
      const players = this.players();
      const ids = this.gamePlayers();
      if ((this.meta().round || 0) === 0) return ''; // pas encore de manche jouée
      const sorted = ids.map(id => players[id]).sort((a, b) => (a.score || 0) - (b.score || 0));
      const medals = ['🥇', '🥈', '🥉'];
      return `<div class="leaderboard"><h3>🏅 Classement <span style="font-size:12px; color:var(--muted); font-weight:700; text-transform:none; letter-spacing:0;">· le + petit score gagne</span></h3>${sorted.map((p, i) =>
        `<div class="lb-row ${i === 0 ? 'lead' : ''}"><span class="lb-rank">${medals[i] || (i + 1)}</span><span class="lb-name">${escapeHtml(p.name)}</span><span class="lb-score">${p.score || 0} pts</span></div>`).join('')}</div>`;
    }

    renderLobby() {
      const spice = this.meta().spice || 2;
      const count = this.connectedGameIds().length;
      const custom = this.room.customScenarios || {};
      return `
        <div class="card">
          ${this.renderLeaderboard()}
          <div class="info-box ok">Partagez le code <strong>${escapeHtml(this.code)}</strong> aux autres joueurs pour qu'ils rejoignent !</div>
          <h2 style="text-align:center; margin-bottom:18px; font-weight:800;">👥 Salon (${count})</h2>
          <div style="margin-bottom: 25px; display:flex; flex-wrap:wrap; justify-content:center;">${this.renderPlayerTags()}</div>

          ${this.isHost() ? `
            <div class="spice-select">
              <label style="text-align:center;">🔥 Intensité</label>
              <div class="spice-row">${[1,2,3].map(l => `<button class="spice-btn ${spice === l ? 'active' : ''}" data-action="spice" data-level="${l}">${SPICE_LABELS[l]}</button>`).join('')}</div>
              <p class="hint">${spice === 3 ? 'Humour noir / contenu border assumé 💀' : spice === 1 ? 'Tranquille, sortable en famille.' : 'Le bon équilibre pour chauffer la salle.'}</p>
            </div>
            <div class="custom-box">
              <label style="text-align:center;">✍️ Scénarios maison <span style="color:var(--faint);">(facultatif)</span></label>
              <div style="margin:10px 0; display:flex; flex-wrap:wrap; justify-content:center;">
                ${Object.keys(custom).map(id => `<span class="player-tag" style="max-width:100%;">${escapeHtml(custom[id].text)} <span class="remove-x" data-action="rmscenario" data-id="${id}">✖</span></span>`).join('')}
              </div>
              <div class="input-group" style="margin-bottom:12px;"><input type="text" id="newScenario" maxlength="90" placeholder="Vous pouvez parler aux fantômes..."></div>
              <button id="btnAddScenario" class="ghost">+ Ajouter ce scénario</button>
            </div>
            <button id="btnStart" ${count >= MIN_PLAYERS ? '' : 'disabled'}>🎬 ${this.meta().round > 0 ? 'Manche suivante' : 'Lancer la partie'}</button>
            ${count < MIN_PLAYERS ? `<p class="hint">Il faut au moins ${MIN_PLAYERS} joueurs connectés.</p>` : ''}
          ` : `<div class="info-box">En attente de l'hôte 👑 pour lancer la manche…</div>`}
          <button id="btnQuit" class="ghost" style="margin-top:14px;">🚪 Quitter</button>
        </div>`;
    }

    renderScenarioCard(small) {
      const m = this.meta();
      return `<div class="card scenario-card" ${small ? 'style="padding:25px;"' : ''}>
        <div class="scenario-label">${small ? 'Rappel' : 'Le Scénario'}</div>
        <div class="${small ? '' : 'scenario-text'}" style="${small ? 'font-size:20px;font-weight:800;' : ''}">${escapeHtml(m.scenario)}</div>
        ${(!small && m.secretRule) ? `<div class="secret-rule-box"><div class="secret-rule-title">⚠️ Règle Secrète ⚠️</div><div style="font-size:16px;font-weight:600;">${escapeHtml(m.secretRule)}</div></div>` : ''}
      </div>`;
    }

    renderPropose() {
      const props = this.proposals();
      const mine = props[this.uid];
      const total = this.activeRoundPlayers().length;
      const done = this.activeRoundPlayers().filter(id => props[id]).length;
      if (mine) {
        return this.renderScenarioCard(true) + `
          <div class="card transition-screen">
            <div class="transition-icon">⏳</div>
            <h2 style="margin-bottom:10px;">Proposition envoyée !</h2>
            <div class="progress-text">${done}/${total}</div>
            <p style="color:var(--muted);">On attend les autres joueurs…</p>
            <div style="margin-top:20px; display:flex; flex-wrap:wrap; justify-content:center;">${this.renderPlayerTags({ showSubmitted: true })}</div>
            ${this.isHost() && done >= MIN_PLAYERS ? `<button id="btnForce" class="ghost" style="margin-top:20px;">⏭️ Forcer le vote (sans les retardataires)</button>` : ''}
          </div>`;
      }
      return this.renderScenarioCard(false) + `
        <div class="card">
          <div class="input-group">
            <label>Ta pire contrepartie (objectif : 50% de oui)</label>
            <div class="prop-field"><span class="prefix">Mais…</span><textarea id="txtProposal" placeholder="tu dois manger un citron chaque matin."></textarea></div>
          </div>
          <button id="btnSubmitProposal">Valider en secret</button>
        </div>`;
    }

    renderVote() {
      const order = this.meta().order || [];
      const votes = this.votes();
      const votable = order.filter(a => a !== this.uid);
      const next = votable.find(a => !(votes[a] && votes[a][this.uid] !== undefined));

      if (!next) {
        const voters = this.activeRoundPlayers();
        const done = voters.filter(v => this.voterDone(v)).length;
        return this.renderScenarioCard(true) + `
          <div class="card transition-screen">
            <div class="transition-icon">🗳️</div>
            <h2 style="margin-bottom:10px;">Vote terminé !</h2>
            <div class="progress-text">${done}/${voters.length}</div>
            <p style="color:var(--muted);">On attend les derniers votes…</p>
            ${this.isHost() ? `<button id="btnForce" class="ghost" style="margin-top:20px;">⏭️ Forcer les résultats</button>` : ''}
          </div>`;
      }

      const proposal = this.proposals()[next];
      const pos = votable.filter(a => votes[a] && votes[a][this.uid] !== undefined).length + 1;
      return this.renderScenarioCard(true) + `
        <div class="card">
          <div class="info-box">À ton tour de voter. (${pos}/${votable.length})</div>
          <div style="background: rgba(0,0,0,0.3); padding: 30px; border-radius: 16px; text-align: center; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05);">
            <p style="color:var(--muted); font-size:14px; margin-bottom:15px; text-transform:uppercase; letter-spacing:1px; font-weight:800;">La contrepartie proposée :</p>
            <h3 style="font-size:24px; color:var(--paper); font-weight:800;">« Mais ${escapeHtml(proposal.text)} »</h3>
          </div>
          <div class="vote-buttons">
            <button class="vote-btn yes" data-action="vote" data-author="${next}" data-value="yes">J'ACCEPTE</button>
            <button class="vote-btn no" data-action="vote" data-author="${next}" data-value="no">JE REFUSE</button>
          </div>
        </div>`;
    }

    renderResults() {
      const i = this.meta().revealIndex || 0;
      // Même ordre que l'écran de salon : du moins clivant au plus clivant (le Dilemme Parfait en dernier).
      const rows = this.resultRows().sort((a, b) => b.deviation - a.deviation);
      const total = rows.length;
      const host = this.isHost();

      // Étape 1 : propositions une par une (auteur + votes affichés direct), l'hôte fait avancer
      if (i < total) {
        const r = rows[i];
        const isBest = i === total - 1;
        const last = i + 1 >= total;
        return this.renderScenarioCard(true) + `
          <div class="card" style="${isBest ? 'border:2px solid var(--gold); box-shadow:0 0 22px rgba(255,215,0,0.18);' : ''}">
            <div style="text-align:center; color:var(--muted); font-size:13px; font-weight:800; letter-spacing:1px; text-transform:uppercase; margin-bottom:14px;">Proposition ${i + 1} / ${total}</div>
            ${isBest ? '<div style="text-align:center;"><span class="points-tag" style="margin-bottom:14px;">🏆 Dilemme Parfait de la manche !</span></div>' : ''}
            <h3 style="font-size:22px; margin-bottom:12px; color:var(--paper); font-weight:800; text-align:center;">« Mais ${escapeHtml(r.text)} »</h3>
            <div class="vote-bar-container"><div class="vote-bar-fill" data-w="${r.yesPercent}%">${Math.round(r.yesPercent)}% OUI</div></div>
            <div class="points-tag" style="display:block; text-align:center; width:fit-content; margin:0 auto;">+${r.points} pts</div>
            <div class="author-line"><div class="author-title">${escapeHtml(r.title)}</div><div class="author-name">👑 ${escapeHtml(r.authorName)}</div></div>
            <div class="who-voted">
              <div style="flex:1;"><span style="color:var(--yes); font-weight:900; display:block; margin-bottom:5px;">✅ OUI</span><span style="color:var(--paper);">${r.yes.map(escapeHtml).join('<br>') || 'Aucun'}</span></div>
              <div style="width:1px; background:rgba(255,255,255,0.1);"></div>
              <div style="flex:1;"><span style="color:var(--no); font-weight:900; display:block; margin-bottom:5px;">❌ NON</span><span style="color:var(--paper);">${r.no.map(escapeHtml).join('<br>') || 'Aucun'}</span></div>
            </div>
            ${host
              ? `<button id="btnRevealNext" style="margin-top:22px;">${last ? '📊 Voir le classement' : '➡️ Proposition suivante'}</button>`
              : `<div class="info-box" style="margin-top:22px; margin-bottom:0;">En attente de l'hôte 👑…</div>`}
          </div>`;
      }

      // Étape 2 : classement de la manche
      return `
        <div class="card">
          <h2 style="text-align:center; margin-bottom:25px; font-size:30px; font-weight:900;">📊 Classement de la manche</h2>
          ${this.renderLeaderboard()}
          ${host
            ? `<button id="btnNextRound" style="margin-top:10px;">▶️ Manche suivante</button><button id="btnFinish" class="secondary">🏁 Terminer la partie</button>`
            : `<div class="info-box">En attente de l'hôte 👑…</div>`}
        </div>`;
    }

    renderFinal() {
      const players = this.players();
      const sorted = this.gamePlayers().map(id => players[id]).sort((a, b) => (a.score || 0) - (b.score || 0));
      const top = sorted.slice(0, 3);
      const order = [1, 0, 2]; const heights = { 0: 130, 1: 95, 2: 70 };
      const colors = { 0: 'linear-gradient(180deg,var(--gold),#bfa100)', 1: 'linear-gradient(180deg,#c0c0c0,#8a8a8a)', 2: 'linear-gradient(180deg,#cd7f32,#8a5524)' };
      const medals = ['🥇', '🥈', '🥉'];
      return `
        <div class="card" style="text-align:center;">
          <h2 style="font-size:34px; font-weight:900; margin-bottom:6px;">🎉 Partie terminée !</h2>
          <p style="color:var(--muted); margin-bottom:30px; font-weight:600;">${this.meta().round} manche(s) jouée(s)</p>
          <div class="podium">
            ${order.filter(i => top[i]).map(i => `<div class="podium-col">
              <div class="podium-name">${medals[i]} ${escapeHtml(top[i].name)}</div>
              <div class="podium-bar" style="height:${heights[i]}px; background:${colors[i]}; color:#1a1a2e;">${top[i].score || 0}</div>
              <div class="podium-score">pts</div></div>`).join('')}
          </div>
          ${sorted.length > 3 ? `<div class="leaderboard">${sorted.slice(3).map((p, i) => `<div class="lb-row"><span class="lb-rank">${i + 4}</span><span class="lb-name">${escapeHtml(p.name)}</span><span class="lb-score">${p.score || 0} pts</span></div>`).join('')}</div>` : ''}
          ${this.isHost() ? `<button id="btnLobby" style="margin-top:20px;">🔁 Retour au salon (rejouer)</button>` : `<div class="info-box">En attente de l'hôte 👑…</div>`}
          <button id="btnQuit" class="ghost" style="margin-top:14px;">🚪 Quitter</button>
        </div>`;
    }

    /* ==========================================================
       MODE ÉCRAN / SALON
    ========================================================== */
    renderScreenLobby() {
      const spice = this.meta().spice || 2;
      const count = this.connectedGameIds().length;
      const custom = this.room.customScenarios || {};
      return `
        <div class="card" style="text-align:center;">
          ${this.renderLeaderboard()}
          <span class="screen-tag">Rejoignez sur vos téléphones</span>
          <div class="big-code">${escapeHtml(this.code)}</div>
          <h2 style="margin:18px 0 12px; font-weight:800;">👥 Joueurs connectés (${count})</h2>
          <div style="margin-bottom: 20px; display:flex; flex-wrap:wrap; justify-content:center;">
            ${this.renderPlayerTags()}
            ${count === 0 ? '<em style="color:var(--faint);">En attente des joueurs…</em>' : ''}
          </div>
          <div class="spice-select">
            <label style="text-align:center;">🔥 Intensité</label>
            <div class="spice-row">${[1,2,3].map(l => `<button class="spice-btn ${spice === l ? 'active' : ''}" data-action="spice" data-level="${l}">${SPICE_LABELS[l]}</button>`).join('')}</div>
          </div>
          <div class="custom-box">
            <label style="text-align:center;">✍️ Scénarios maison <span style="color:var(--faint);">(facultatif)</span></label>
            <div style="margin:10px 0; display:flex; flex-wrap:wrap; justify-content:center;">
              ${Object.keys(custom).map(id => `<span class="player-tag" style="max-width:100%;">${escapeHtml(custom[id].text)} <span class="remove-x" data-action="rmscenario" data-id="${id}">✖</span></span>`).join('')}
            </div>
            <div class="input-group" style="margin-bottom:12px;"><input type="text" id="newScenario" maxlength="90" placeholder="Vous pouvez parler aux fantômes..."></div>
            <button id="btnAddScenario" class="ghost">+ Ajouter ce scénario</button>
          </div>
          <button id="btnStart" ${count >= MIN_PLAYERS ? '' : 'disabled'}>🎬 ${this.meta().round > 0 ? 'Manche suivante' : 'Lancer la partie'}</button>
          ${count < MIN_PLAYERS ? `<p class="hint">Il faut au moins ${MIN_PLAYERS} joueurs connectés.</p>` : ''}
          <button id="btnQuit" class="ghost" style="margin-top:14px;">🚪 Fermer l'écran</button>
        </div>`;
    }

    renderScreenPropose() {
      const m = this.meta();
      const total = this.activeRoundPlayers().length;
      const done = this.activeRoundPlayers().filter(id => this.proposals()[id]).length;
      return `
        <div class="card scenario-card">
          <div class="scenario-label">Le Scénario</div>
          <div class="screen-scenario">${escapeHtml(m.scenario)}</div>
          ${m.secretRule ? `<div class="secret-rule-box"><div class="secret-rule-title">⚠️ Règle Secrète ⚠️</div><div style="font-size:18px;font-weight:600;">${escapeHtml(m.secretRule)}</div></div>` : ''}
        </div>
        <div class="card" style="text-align:center;">
          <h2 style="font-weight:800; margin-bottom:10px;">✍️ Écrivez votre contrepartie sur vos téléphones</h2>
          <div class="progress-text" style="font-size:34px;">${done}/${total}</div>
          <p style="color:var(--muted); margin-bottom:20px;">ont validé leur proposition</p>
          <div style="display:flex; flex-wrap:wrap; justify-content:center;">${this.renderPlayerTags({ showSubmitted: true })}</div>
          ${done >= MIN_PLAYERS ? `<button id="btnForce" class="ghost" style="margin-top:20px;">⏭️ Forcer le vote</button>` : ''}
        </div>`;
    }

    renderScreenVote() {
      const order = this.meta().order || [];
      const vi = this.meta().voteIndex || 0;
      if (vi >= order.length) {
        return `<div class="card watch-screen"><div class="spinner"></div><p style="color:var(--muted);">Comptage des votes…</p></div>`;
      }
      const author = order[vi];
      const proposal = this.proposals()[author] || { text: '' };
      const voters = this.currentVoters(author);
      const votes = this.votes();
      const done = voters.filter(v => votes[author] && votes[author][v] !== undefined).length;
      const last = vi + 1 >= order.length;
      return `
        <div class="card scenario-card" style="padding:25px;">
          <div class="scenario-label">Vote — proposition ${vi + 1} / ${order.length}</div>
          <div class="screen-big">${escapeHtml(this.meta().scenario)}</div>
        </div>
        <div class="card" style="text-align:center;">
          <h3 class="big-prop" style="margin-bottom:18px;">« Mais ${escapeHtml(proposal.text)} »</h3>
          <h2 style="font-weight:800; margin-bottom:10px;">🗳️ Votez sur vos téléphones !</h2>
          <div class="progress-text" style="font-size:34px;">${done}/${voters.length}</div>
          <p style="color:var(--muted);">ont voté</p>
          <button id="btnVoteNext" class="ghost" style="margin-top:20px;">${last ? '⏭️ Terminer le vote' : '⏭️ Proposition suivante'}</button>
        </div>`;
    }

    // Calcule les lignes de résultats (texte, %, oui/non, auteur)
    resultRows() {
      const order = this.meta().order || [];
      const votes = this.votes();
      const props = this.proposals();
      const players = this.players();
      return order.map(authorId => {
        const v = votes[authorId] || {};
        const entries = Object.entries(v);
        const yes = entries.filter(([, x]) => x === 'yes').map(([id]) => players[id] ? players[id].name : '?');
        const no = entries.filter(([, x]) => x === 'no').map(([id]) => players[id] ? players[id].name : '?');
        const total = yes.length + no.length;
        const yesPercent = total > 0 ? (yes.length / total) * 100 : 0;
        return {
          authorId, text: props[authorId] ? props[authorId].text : '',
          authorName: players[authorId] ? players[authorId].name : '???',
          yesPercent, deviation: Math.abs(50 - yesPercent), points: pointsFromDeviation(Math.abs(50 - yesPercent)),
          title: honoraryTitle(yesPercent), yes, no
        };
      });
    }

    renderScreenResults() {
      const i = this.meta().revealIndex || 0;
      // Du moins clivant au plus clivant : le "Dilemme Parfait" (le plus proche de 50/50) arrive en dernier.
      const rows = this.resultRows().sort((a, b) => b.deviation - a.deviation);
      const total = rows.length;

      // Étape 1 : les propositions une par une, chacune AVEC l'auteur et les votes
      if (i < total) {
        const r = rows[i];
        const isBest = i === total - 1; // dernière = la plus proche de 50/50
        const last = i + 1 >= total;
        return `
          <div class="card scenario-card" style="padding:25px;">
            <div class="scenario-label">Proposition ${i + 1} / ${total}</div>
            <div class="screen-big">${escapeHtml(this.meta().scenario)}</div>
          </div>
          <div class="card reveal-pop" style="text-align:center; ${isBest ? 'border:2px solid var(--gold); box-shadow:0 0 25px rgba(255,215,0,0.2);' : ''}">
            ${isBest ? '<div class="points-tag" style="margin-bottom:14px;">🏆 Dilemme Parfait de la manche !</div>' : ''}
            <h3 class="big-prop" style="margin-bottom:12px;">« Mais ${escapeHtml(r.text)} »</h3>
            <div class="vote-bar-container" style="height:54px;"><div class="vote-bar-fill" data-w="${r.yesPercent}%" style="font-size:20px;">${Math.round(r.yesPercent)}% OUI</div></div>
            <div class="points-tag">+${r.points} pts</div>
            <div class="author-line"><div class="author-title">${escapeHtml(r.title)}</div><div class="author-name">👑 ${escapeHtml(r.authorName)}</div></div>
            <div class="who-voted">
              <div style="flex:1;"><span style="color:var(--yes); font-weight:900; display:block; margin-bottom:5px;">✅ OUI</span><span style="color:var(--paper);">${r.yes.map(escapeHtml).join('<br>') || 'Aucun'}</span></div>
              <div style="width:1px; background:rgba(255,255,255,0.1);"></div>
              <div style="flex:1;"><span style="color:var(--no); font-weight:900; display:block; margin-bottom:5px;">❌ NON</span><span style="color:var(--paper);">${r.no.map(escapeHtml).join('<br>') || 'Aucun'}</span></div>
            </div>
            <button id="btnRevealNext" style="margin-top:24px;">${last ? '📊 Voir le classement' : '➡️ Proposition suivante'}</button>
          </div>`;
      }

      // Étape 2 : le classement clôt la manche
      return `
        <div class="card" style="text-align:center;">
          <h2 style="font-size:30px; font-weight:900; margin-bottom:20px;">📊 Classement de la manche</h2>
          ${this.renderLeaderboard()}
          <button id="btnNextRound" style="margin-top:10px;">▶️ Manche suivante</button>
          <button id="btnFinish" class="secondary">🏁 Terminer la partie</button>
        </div>`;
    }

    /* ==========================================================
       MANETTE (téléphone en mode salon)
    ========================================================== */
    renderControllerWait(title, sub) {
      return `
        <div class="card watch-screen">
          <div class="big-emoji">📺</div>
          <h2 style="font-weight:800; margin-bottom:10px;">${escapeHtml(title)}</h2>
          <p style="color:var(--muted); font-size:17px;">${escapeHtml(sub)}</p>
          <button id="btnQuit" class="ghost" style="margin-top:30px;">🚪 Quitter</button>
        </div>`;
    }

    renderControllerPropose() {
      if (this.proposals()[this.uid]) {
        return this.renderControllerWait("Proposition envoyée ✅", "Regarde l'écran 📺 pour la suite.");
      }
      return `
        <div class="card">
          <div class="info-box">📺 Le pouvoir est affiché sur l'écran — invente la pire contrepartie pour couper la salle en deux.</div>
          <div class="input-group">
            <label>Ta contrepartie (objectif : 50% de oui)</label>
            <div class="prop-field"><span class="prefix">Mais…</span><textarea id="txtProposal" placeholder="tu dois manger un citron chaque matin."></textarea></div>
          </div>
          <button id="btnSubmitProposal">Valider en secret</button>
        </div>`;
    }

    renderControllerVote() {
      const order = this.meta().order || [];
      const vi = this.meta().voteIndex || 0;
      if (vi >= order.length) return this.renderControllerWait("Vote terminé ✅", "Regarde l'écran 📺 pour les résultats.");

      const author = order[vi];
      if (author === this.uid) return this.renderControllerWait("🙈 C'est ta proposition !", "Tu ne votes pas celle-ci. Regarde l'écran 📺");
      const votes = this.votes();
      if (votes[author] && votes[author][this.uid] !== undefined) {
        return this.renderControllerWait("Voté ✅", "Regarde l'écran 📺, on passe à la suite.");
      }
      return `
        <div class="card" style="text-align:center;">
          <div class="info-box" style="margin-bottom:30px;">📺 La contrepartie est sur l'écran — proposition ${vi + 1}/${order.length}.<br>Tu l'acceptes ?</div>
          <div class="vote-buttons">
            <button class="vote-btn yes" data-action="vote" data-author="${author}" data-value="yes">J'ACCEPTE</button>
            <button class="vote-btn no" data-action="vote" data-author="${author}" data-value="no">JE REFUSE</button>
          </div>
        </div>`;
    }

    /* ---------- Bindings ---------- */
    bindHome() {
      const pseudo = document.getElementById('pseudo');
      if (pseudo) pseudo.oninput = (e) => { this.pseudo = e.target.value; };
      const c = document.getElementById('btnCreate'); if (c) c.onclick = () => this.createRoom('phone');
      const tv = document.getElementById('btnCreateTV'); if (tv) tv.onclick = () => this.createRoom('tv');
      const j = document.getElementById('btnJoin'); if (j) j.onclick = () => this.joinRoom(document.getElementById('joinCode').value);
    }

    bindRoom() {
      const app = document.getElementById('app');
      const pillCode = document.getElementById('pillCode');
      if (pillCode) pillCode.onclick = () => {
        navigator.clipboard && navigator.clipboard.writeText(this.code);
        pillCode.textContent = 'COPIÉ ✓';
        setTimeout(() => { if (document.getElementById('pillCode')) document.getElementById('pillCode').textContent = `CODE ${this.code} 📋`; }, 1200);
      };

      const bind = (id, fn) => { const el = document.getElementById(id); if (el) el.onclick = fn; };
      bind('btnStart', () => this.startRound());
      bind('btnSubmitProposal', () => this.submitProposal(document.getElementById('txtProposal').value));
      bind('btnForce', () => this.forceNext());
      bind('btnNextRound', () => this.nextRound());
      bind('btnFinish', () => this.finishGame());
      bind('btnLobby', () => this.backToLobby());
      bind('btnQuit', () => this.quitRoom());
      bind('btnRevealNext', () => this.revealNext());
      bind('btnVoteNext', () => this.tvNextVote());

      const addSc = document.getElementById('btnAddScenario');
      const scIn = document.getElementById('newScenario');
      if (addSc && scIn) {
        addSc.onclick = () => this.addCustomScenario(scIn.value);
        scIn.onkeypress = (e) => { if (e.key === 'Enter') this.addCustomScenario(scIn.value); };
        if (this.focusScenario) { scIn.focus(); this.focusScenario = false; }
      }

      app.onclick = (e) => {
        const el = e.target.closest('[data-action]');
        if (!el) return;
        const a = el.dataset.action;
        if (a === 'spice') this.setSpice(parseInt(el.dataset.level, 10));
        else if (a === 'rmscenario') this.removeCustomScenario(el.dataset.id);
        else if (a === 'kick') this.kickPlayer(el.dataset.id);
        else if (a === 'vote') this.submitVote(el.dataset.author, el.dataset.value);
      };
    }
  }

  window.app = new App();
</script>
</body>
</html>
