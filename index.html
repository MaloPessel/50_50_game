<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>50/50 - Le Jeu du Dilemme Parfait (Multijoueur)</title>
  <style>
    /* ===== TON STYLE EXISTANT ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
      color: white;
    }
    .header h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    .header .subtitle {
      font-size: 18px;
      opacity: 0.95;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }
    .scenario-card {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      text-align: center;
      padding: 40px 30px;
    }
    .scenario-text {
      font-size: 24px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 15px;
      word-wrap: break-word;
    }
    .scenario-label {
      font-size: 14px;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }
    .phase-indicator {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
      gap: 10px;
    }
    .phase-step {
      flex: 1;
      text-align: center;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #999;
      transition: all 0.3s;
    }
    .phase-step.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      transform: scale(1.05);
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
      font-size: 14px;
    }
    input, textarea {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.3s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    button.secondary {
      background: #6c757d;
      margin-top: 10px;
    }
    .proposal-item {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      border: 2px solid transparent;
      transition: all 0.3s;
    }
    .proposal-item:hover {
      border-color: #667eea;
    }
    .proposal-author {
      font-weight: 700;
      color: #667eea;
      margin-bottom: 8px;
      font-size: 14px;
      word-break: break-word;
    }
    .proposal-text {
      font-size: 16px;
      color: #333;
      margin-bottom: 15px;
      line-height: 1.5;
    }
    .vote-buttons {
      display: flex;
      gap: 10px;
    }
    .vote-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid;
      background: white;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 16px;
    }
    .vote-btn.yes {
      border-color: #10b981;
      color: #10b981;
    }
    .vote-btn.yes:hover, .vote-btn.yes.selected {
      background: #10b981;
      color: white;
    }
    .vote-btn.no {
      border-color: #ef4444;
      color: #ef4444;
    }
    .vote-btn.no:hover, .vote-btn.no.selected {
      background: #ef4444;
      color: white;
    }
    .result-item {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      border: 3px solid #e0e0e0;
      position: relative;
    }
    .result-item.winner {
      border-color: #fbbf24;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    }
    .winner-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #fbbf24;
      color: #92400e;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .result-author {
      font-weight: 700;
      color: #667eea;
    }
    .result-score {
      font-size: 24px;
      font-weight: 800;
    }
    .result-score.perfect {
      color: #10b981;
    }
    .vote-bar-container {
      position: relative;
      height: 30px;
      background: #e0e0e0;
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .vote-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: linear-gradient(90deg, #10b981 0%, #34d399 100%);
      transition: width 0.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }
    .vote-bar-no {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      background: linear-gradient(90deg, #f87171 0%, #ef4444 100%);
      transition: width 0.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }
    .vote-stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #666;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    .countdown {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 15px;
      font-weight: 600;
    }
    .player-count {
      text-align: center;
      margin-top: 15px;
      padding: 12px;
      background: #f0fdf4;
      border-radius: 10px;
      color: #166534;
      font-weight: 600;
      font-size: 14px;
    }
    .info-box {
      background: #eff6ff;
      border-left: 4px solid #3b82f6;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #1e40af;
    }
    .error-box {
      background: #fee;
      border-left: 4px solid #ef4444;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #991b1b;
    }
    .room-code {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      margin-bottom: 20px;
      font-family: monospace;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    @media (max-width: 640px) {
      .header h1 { font-size: 36px; }
      .scenario-text { font-size: 20px; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>50/50</h1>
    <div class="subtitle">Le jeu du dilemme parfait - Multijoueur</div>
  </div>
  <div id="app"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBPbFNDsn5CVF-4krrYtw1z2IzwkkILLoE",
    authDomain: "game-ef3a0.firebaseapp.com",
    databaseURL: "https://game-ef3a0-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "game-ef3a0",
    storageBucket: "game-ef3a0.firebasestorage.app",
    messagingSenderId: "1091069158786",
    appId: "1:1091069158786:web:fd14c503c7726de7a51b9b",
    measurementId: "G-ZMJ2TLB230"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ========== SÉCURITÉ ==========
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function sanitizeUsername(name) {
    if (typeof name !== 'string') return '';
    return name.trim().slice(0, 20).replace(/\s+/g, ' ');
  }

  function sanitizeText(text) {
    if (typeof text !== 'string') return '';
    return text.trim().slice(0, 500).replace(/\s+/g, ' ');
  }

  function validateGameData(game) {
    if (!game || typeof game !== 'object') return false;
    if (typeof game.scenario !== 'string' || game.scenario.length > 500) return false;
    if (!['propose', 'vote', 'results'].includes(game.phase)) return false;
    
    // 🔥 Firebase supprime les tableaux/objets vides. On les recrée par défaut s'ils sont absents.
    game.proposals = game.proposals || [];
    game.votes = game.votes || {};
    
    if (!Array.isArray(game.proposals)) return false;
    if (typeof game.votes !== 'object') return false;
    return true;
  }

  const PHASE_DURATION = { propose: 120000, vote: 180000 };

  const SCENARIOS = [
    "Vous gagnez 10 millions d'euros",
    "Vous pouvez voler comme un oiseau",
    "Vous avez la capacité de lire dans les pensées",
    "Vous découvrez le secret de l'immortalité",
    "Vous pouvez remonter le temps à volonté",
    "Vous devenez instantanément célèbre dans le monde entier",
    "Vous avez une santé de fer jusqu'à la fin de vos jours",
    "Vous pouvez manger tout ce que vous voulez sans jamais grossir",
    "Vous possédez le pouvoir de vous téléporter n'importe où",
    "Vous maîtrisez instantanément toutes les langues humaines",
    "Vous réussissez absolument tout ce que vous entreprenez",
    "Vous trouvez instantanément l'âme sœur parfaite",
    "Vous ne ressentez plus jamais ni fatigue ni besoin de dormir",
    "Vous accomplissez le plus grand rêve de votre vie",
    "Vous trouvez une valise inépuisable remplie de billets de 100€"
  ];

  function getRandomScenario() {
    return SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)];
  }

  // 🔥 FONCTION MANQUANTE
  function generateId() {
    return Math.random().toString(36).substring(2, 9);
  }

  class Game {
    constructor() {
      this.displayName = null;
      this.currentGame = null;
      this.roomId = null;
      this.unsubscribe = null;
      this.errorMessage = null;
      this.phaseInterval = null;
      this.isTyping = false;
      this.isDeleting = false; // 🔥 FIX race condition
      this.init();
    }


    init() {
      // Charger le pseudo depuis localStorage
      const savedName = localStorage.getItem('game50_playerName');
      if (savedName) {
        this.displayName = sanitizeUsername(savedName);
      }
      // Vérifier si un salon était en cours
      const savedRoom = localStorage.getItem('game50_currentRoom');
      if (savedRoom && this.displayName) {
        this.joinRoomById(savedRoom);
      } else {
        this.render();
      }

      this.phaseInterval = setInterval(() => this.checkPhaseTimeout(), 1000);

      // Éviter les re-renders intempestifs pendant la saisie
      document.addEventListener('focusin', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') this.isTyping = true;
      });
      document.addEventListener('focusout', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
          setTimeout(() => {
            this.isTyping = false;
            this.render();
          }, 200); // Délai pour laisser le temps au clic (onclick) de s'exécuter
        }
      });
    }

    async savePlayerName(name) {
      const sanitized = sanitizeUsername(name);
      if (!sanitized) {
        this.errorMessage = 'Pseudo invalide (vide ou trop d\'espaces)';
        this.render();
        return false;
      }
      this.displayName = sanitized;
      localStorage.setItem('game50_playerName', sanitized);
      this.errorMessage = null;
      this.render(); // ← Affiche le lobby
      return true;
    }

    async createRoom() {
      const id = Math.random().toString(36).substring(2, 8).toUpperCase();
  
      const gameData = {
        scenario: getRandomScenario(),
        phase: 'propose',
        phaseStartTime: Date.now(),
        proposals: [],
        votes: {},
        createdAt: Date.now()
      };
  
      try {
        await set(ref(db, 'rooms/' + id), gameData);
  
        this.roomId = id;
        this.currentGame = gameData;
  
        localStorage.setItem('game50_currentRoom', id);
  
        this.setupRoomListener();
        this.render();
  
        alert(`Salon créé ! Code : ${id}`);
      } catch (err) {
        console.error(err);
        this.errorMessage = 'Erreur création';
        this.render();
      }
    }

    async joinRoomById(roomId) {
      if (!roomId) return;
      const cleanId = roomId.trim().toUpperCase();
      try {
        const snapshot = await get(ref(db, 'rooms/' + cleanId));
        if (snapshot.exists()) {
          const gameData = snapshot.val();
          
          if (validateGameData(gameData)) {
            this.roomId = cleanId;
            this.currentGame = gameData;
            localStorage.setItem('game50_currentRoom', cleanId);
            this.setupRoomListener();
            this.errorMessage = null;
            this.render();
          } else {
            this.errorMessage = 'Données de ce salon corrompues.';
            this.render();
          }
        } else {
          this.errorMessage = 'Salon introuvable. Vérifie le code.';
          this.render();
        }
      } catch (err) {
        console.error(err);
        this.errorMessage = 'Erreur lors de la connexion au salon';
        this.render();
      }
    }

    setupRoomListener() {
      if (this.unsubscribe) this.unsubscribe();
      const roomRef = ref(db, 'rooms/' + this.roomId);
      this.unsubscribe = onValue(roomRef, (snapshot) => {
        if (snapshot.exists()) {
          const newData = snapshot.val();
          if (validateGameData(newData)) {
            this.currentGame = newData;
            if (!this.isTyping) this.render();
          } else {
            console.warn("Données de jeu invalides");
          }
        } else {
          this.resetGame();
          this.errorMessage = 'La partie a été terminée par le créateur.';
          this.render();
        }
      });
    }

    async saveGame() {
      if (!this.roomId || !this.currentGame) return;
      try {
        await set(ref(db, 'rooms/' + this.roomId), this.currentGame);
      } catch (err) {
        console.error("Erreur sauvegarde:", err);
      }
    }

    async deleteRoom() {
      if (!this.roomId || this.isDeleting) return;
  
      this.isDeleting = true;
  
      try {
        await remove(ref(db, 'rooms/' + this.roomId));
      } catch (e) {
        console.error(e);
      }
  
      this.isDeleting = false;
    }


    async resetGame() {
      if (this.unsubscribe) {
        this.unsubscribe();
        this.unsubscribe = null;
      }
      if (this.roomId) await this.deleteRoom();
      this.currentGame = null;
      this.roomId = null;
      this.errorMessage = null;
      localStorage.removeItem('game50_currentRoom');
      this.render();
    }

    async nextRound() {
      if (!this.roomId) return;
      const gameData = {
        scenario: getRandomScenario(),
        phase: 'propose',
        phaseStartTime: Date.now(),
        proposals: [],
        votes: {},
        createdAt: Date.now()
      };
      try {
        await set(ref(db, 'rooms/' + this.roomId), gameData);
      } catch (err) {
        console.error("Erreur nouvelle manche:", err);
      }
    }

    checkPhaseTimeout() {
      if (!this.currentGame) return;
      const now = Date.now();
      const elapsed = now - this.currentGame.phaseStartTime;
      let phaseChanged = false;
      if (this.currentGame.phase === 'propose' && elapsed > PHASE_DURATION.propose) {
        this.currentGame.phase = 'vote';
        this.currentGame.phaseStartTime = now;
        phaseChanged = true;
      } else if (this.currentGame.phase === 'vote' && elapsed > PHASE_DURATION.vote) {
        this.currentGame.phase = 'results';
        this.calculateResults();
        phaseChanged = true;
      }
      if (phaseChanged) {
        this.saveGame();
        if (!this.isTyping) this.render();
      }
    }

    getTimeRemaining() {
      if (!this.currentGame) return "0:00";
      const elapsed = Date.now() - this.currentGame.phaseStartTime;
      const duration = this.currentGame.phase === 'propose' ? PHASE_DURATION.propose : PHASE_DURATION.vote;
      const remaining = Math.max(0, duration - elapsed);
      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    async submitProposal(counterpart) {
      if (!this.currentGame || this.currentGame.phase !== 'propose') return;
  
      const sanitized = sanitizeText(counterpart);
      if (!sanitized) return;
  
      const existingIndex = this.currentGame.proposals.findIndex(
        p => p.author === this.displayName
      );
  
      const proposal = {
        author: this.displayName,
        text: sanitized,
        id: existingIndex >= 0
          ? this.currentGame.proposals[existingIndex].id
          : generateId() // 🔥 FIX ID UNIQUE
      };
  
      if (existingIndex >= 0) {
        this.currentGame.proposals[existingIndex] = proposal;
      } else {
        this.currentGame.proposals.push(proposal);
      }
  
      await this.saveGame();
      this.render();
    }


    async submitVote(proposalId, vote) {
      if (!this.currentGame || this.currentGame.phase !== 'vote') return;
  
      proposalId = String(proposalId); // 🔥 FIX type
  
      if (!this.currentGame.votes[proposalId]) {
        this.currentGame.votes[proposalId] = { yes: [], no: [] };
      }
  
      const votes = this.currentGame.votes[proposalId];
  
      votes.yes = (votes.yes || []).filter(n => n !== this.displayName);
      votes.no = (votes.no || []).filter(n => n !== this.displayName);
  
      if (vote === 'yes') votes.yes.push(this.displayName);
      if (vote === 'no') votes.no.push(this.displayName);
  
      await this.saveGame();
    }


    calculateResults() {
      if (!this.currentGame) return;
  
      this.currentGame.results = this.currentGame.proposals.map(p => {
        const votes = this.currentGame.votes[p.id] || {};
        const yesVotes = votes.yes || [];
        const noVotes = votes.no || [];
  
        const total = yesVotes.length + noVotes.length;
        const percent = total ? (yesVotes.length / total) * 100 : 0;
  
        return {
          ...p,
          yesVotes: yesVotes.length,
          noVotes: noVotes.length,
          yesPercent: percent,
          deviation: Math.abs(50 - percent)
        };
      });
  
      this.currentGame.results.sort((a, b) => a.deviation - b.deviation);
    }

    // ---------- RENDU ----------
    render() {
      try {
        const appDiv = document.getElementById('app');
        if (!this.displayName) {
          appDiv.innerHTML = this.renderNameEntry();
        } else if (!this.currentGame) {
          appDiv.innerHTML = this.renderLobby();
        } else {
          switch (this.currentGame.phase) {
            case 'propose': appDiv.innerHTML = this.renderProposePhase(); break;
            case 'vote': appDiv.innerHTML = this.renderVotePhase(); break;
            case 'results': appDiv.innerHTML = this.renderResults(); break;
            default: appDiv.innerHTML = '<div class="card">Erreur de phase</div>';
          }
        }
        this.attachEventListeners();
      } catch (err) {
        console.error("ERREUR RENDER:", err);
        document.getElementById('app').innerHTML = `<div class="card error-box">Erreur d'affichage: ${err.message}</div>`;
      }
    }

    renderNameEntry() {
      return `
        <div class="card">
          <h2 style="margin-bottom:20px;">Bienvenue !</h2>
          ${this.errorMessage ? `<div class="error-box">${escapeHtml(this.errorMessage)}</div>` : ''}
          <div class="info-box">Choisis un pseudo pour commencer à jouer.</div>
          <div class="input-group">
            <label>Ton pseudo</label>
            <input type="text" id="playerName" placeholder="Ex: Joueur01" maxlength="20" autocomplete="off">
          </div>
          <button id="submitName">Commencer</button>
        </div>
      `;
    }

    renderLobby() {
      return `
        <div class="card">
          <h2 style="margin-bottom:20px;">Menu principal</h2>
          <div class="info-box">👋 Bonjour ${escapeHtml(this.displayName)} !</div>
          ${this.errorMessage ? `<div class="error-box">${escapeHtml(this.errorMessage)}</div>` : ''}
          <div style="margin-bottom:30px;">
            <h3 style="margin-bottom:15px;color:#667eea;">🎲 Créer une partie</h3>
            <div class="info-box">Un scénario aléatoire sera généré pour vous et vos amis !</div>
            <button id="createGame">Créer un salon</button>
          </div>
          <div style="border-top:1px solid #e0e0e0; padding-top:20px;">
            <h3 style="margin-bottom:15px;color:#667eea;">🔗 Rejoindre une partie</h3>
            <div class="input-group">
              <label>Code du salon</label>
              <input type="text" id="roomCode" placeholder="Ex: AB3F7K" maxlength="6" style="text-transform:uppercase;" autocomplete="off">
            </div>
            <button id="joinGame">Rejoindre</button>
          </div>
        </div>
      `;
    }

    renderProposePhase() {
      const myProposal = this.currentGame.proposals.find(p => p.author === this.displayName);
      const timeRemaining = this.getTimeRemaining();
      return `
        <div class="card scenario-card">
          <div class="scenario-label">Scénario</div>
          <div class="scenario-text">${escapeHtml(this.currentGame.scenario)}</div>
        </div>
        <div class="card">
          <div class="phase-indicator">
            <div class="phase-step active">1. Propositions</div>
            <div class="phase-step">2. Votes</div>
            <div class="phase-step">3. Résultats</div>
          </div>
          <div class="room-code">🔑 Code salon : ${escapeHtml(this.roomId)}</div>
          ${this.errorMessage ? `<div class="error-box">${escapeHtml(this.errorMessage)}</div>` : ''}
          <div class="info-box">Propose une contrepartie qui divisera l'opinion en 50/50 !</div>
          <div class="input-group">
            <label>Ta contrepartie</label>
            <textarea id="counterpart" placeholder="Ex: Mais vous ne pourrez plus jamais manger de chocolat..." maxlength="500">${myProposal ? escapeHtml(myProposal.text) : ''}</textarea>
          </div>
          <button id="submitProposal">${myProposal ? 'Modifier ma proposition' : 'Envoyer ma proposition'}</button>
          ${myProposal ? '<div class="player-count">✓ Proposition enregistrée !</div>' : ''}
          <div class="countdown">⏱️ Temps restant : ${escapeHtml(timeRemaining)}</div>
          <div class="player-count">📝 ${this.currentGame.proposals.length} proposition${this.currentGame.proposals.length > 1 ? 's' : ''}</div>
          <button id="leaveGame" class="secondary" style="margin-top:15px;">Quitter la partie</button>
        </div>
      `;
    }

    renderVotePhase() {
      const timeRemaining = this.getTimeRemaining();
      return `
        <div class="card scenario-card">
          <div class="scenario-label">Scénario</div>
          <div class="scenario-text">${escapeHtml(this.currentGame.scenario)}</div>
        </div>
        <div class="card">
          <div class="phase-indicator">
            <div class="phase-step">1. Propositions</div>
            <div class="phase-step active">2. Votes</div>
            <div class="phase-step">3. Résultats</div>
          </div>
          <div class="room-code">🔑 Code salon : ${escapeHtml(this.roomId)}</div>
          <div class="info-box">Vote pour chaque proposition : accepterais-tu ce deal ?</div>
          <div class="countdown">⏱️ Temps restant : ${escapeHtml(timeRemaining)}</div>
          ${this.currentGame.proposals.length === 0 ? `
            <div class="empty-state"><div class="empty-state-icon">🤷</div><p>Aucune proposition n'a été faite...</p></div>
          ` : this.currentGame.proposals.map(proposal => {
            const votes = this.currentGame.votes[proposal.id] || {};
            const yesVotes = votes.yes || [];
            const noVotes = votes.no || [];
            const myVote = yesVotes.includes(this.displayName) ? 'yes' : noVotes.includes(this.displayName) ? 'no' : null;
            return `
              <div class="proposal-item">
                <div class="proposal-author">${escapeHtml(proposal.author)}</div>
                <div class="proposal-text">${escapeHtml(proposal.text)}</div>
                <div class="vote-buttons">
                  <button class="vote-btn yes ${myVote === 'yes' ? 'selected' : ''}" data-proposal-id="${proposal.id}" data-vote="yes">${myVote === 'yes' ? '✓ ' : ''}OUI</button>
                  <button class="vote-btn no ${myVote === 'no' ? 'selected' : ''}" data-proposal-id="${proposal.id}" data-vote="no">${myVote === 'no' ? '✓ ' : ''}NON</button>
                </div>
              </div>
            `;
          }).join('')}
          <button id="leaveGame" class="secondary" style="margin-top:15px;">Quitter la partie</button>
        </div>
      `;
    }

    renderResults() {
      if (!this.currentGame.results || this.currentGame.results.length === 0) {
        return `
          <div class="card scenario-card"><div class="scenario-label">Scénario</div><div class="scenario-text">${escapeHtml(this.currentGame.scenario)}</div></div>
          <div class="card">
            <div class="phase-indicator"><div class="phase-step">1. Propositions</div><div class="phase-step">2. Votes</div><div class="phase-step active">3. Résultats</div></div>
            <div class="empty-state"><div class="empty-state-icon">🤷</div><p>Aucun vote n'a été enregistré...</p></div>
            <button id="newGame" style="margin-bottom: 10px;">Manche suivante</button>
            <button id="leaveGameResults" class="secondary">Quitter le salon</button>
          </div>
        `;
      }
      return `
        <div class="card scenario-card"><div class="scenario-label">Scénario</div><div class="scenario-text">${escapeHtml(this.currentGame.scenario)}</div></div>
        <div class="card">
          <div class="phase-indicator"><div class="phase-step">1. Propositions</div><div class="phase-step">2. Votes</div><div class="phase-step active">3. Résultats</div></div>
          <h2 style="margin-bottom:20px;text-align:center;">🏆 Résultats</h2>
          ${this.currentGame.results.map((result, idx) => {
            const isWinner = idx === 0;
            const total = result.yesVotes + result.noVotes;
            const yesWidth = total > 0 ? (result.yesVotes / total) * 100 : 50;
            const noWidth = total > 0 ? (result.noVotes / total) * 100 : 50;
            return `
              <div class="result-item ${isWinner ? 'winner' : ''}">
                ${isWinner ? '<div class="winner-badge">🏆 Gagnant</div>' : ''}
                <div class="result-header"><div class="result-author">${escapeHtml(result.author)}</div><div class="result-score ${result.deviation < 1 ? 'perfect' : ''}">${result.yesPercent.toFixed(1)}% OUI</div></div>
                <div class="result-text">${escapeHtml(result.text)}</div>
                <div class="vote-bar-container"><div class="vote-bar" style="width:${yesWidth}%;">${result.yesVotes > 0 ? result.yesVotes + ' OUI' : ''}</div><div class="vote-bar-no" style="width:${noWidth}%;">${result.noVotes > 0 ? result.noVotes + ' NON' : ''}</div></div>
                <div class="vote-stats"><span>Écart au 50/50 : ${result.deviation.toFixed(1)}%</span><span>${total} vote${total > 1 ? 's' : ''}</span></div>
              </div>
            `;
          }).join('')}
          <button id="newGame" style="margin-bottom: 10px;">Manche suivante</button>
          <button id="leaveGameResults" class="secondary">Quitter le salon</button>
        </div>
      `;
    }

    attachEventListeners() {
      // ENTER pseudo
      const nameInput = document.getElementById('playerName');
      if (nameInput) {
        nameInput.onkeydown = (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            this.savePlayerName(nameInput.value);
          }
        };
      }

      // ENTER room code
      const roomCodeInput = document.getElementById('roomCode');
      if (roomCodeInput) {
        roomCodeInput.onkeydown = (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            this.joinRoomById(roomCodeInput.value);
          }
        };
      }

      // ENTER counterpart
      const counterpartInput = document.getElementById('counterpart');
      if (counterpartInput) {
        counterpartInput.onkeydown = (e) => {
          if (e.key === 'Enter' && e.ctrlKey) {
            e.preventDefault();
            this.submitProposal(counterpartInput.value);
          }
        };
      }

      // Bouton "Commencer"
      const submitName = document.getElementById('submitName');
      if (submitName) {
        submitName.onclick = async () => {
          const nameInput = document.getElementById('playerName');
          if (nameInput && nameInput.value.trim()) {
            await this.savePlayerName(nameInput.value);
          }
        };
      }

      // Créer un salon
      const createGame = document.getElementById('createGame');
      if (createGame) {
        createGame.onclick = () => {
          this.createRoom();
        };
      }

      // Rejoindre un salon
      const joinGame = document.getElementById('joinGame');
      if (joinGame) {
        joinGame.onclick = () => {
          const code = document.getElementById('roomCode').value;
          if (code.trim()) {
            this.joinRoomById(code);
          }
        };
      }

      // Proposer une contrepartie
      const submitProposal = document.getElementById('submitProposal');
      if (submitProposal) {
        submitProposal.onclick = () => {
          const counterpart = document.getElementById('counterpart').value;
          if (counterpart.trim()) {
            this.submitProposal(counterpart);
          }
        };
      }

      // Nouvelle partie (après résultats)
      const newGame = document.getElementById('newGame');
      if (newGame) {
        newGame.onclick = () => this.nextRound();
      }
      
      const leaveGameResults = document.getElementById('leaveGameResults');
      if (leaveGameResults) {
        leaveGameResults.onclick = () => {
          if (confirm('Quitter la partie définitivement ?')) this.resetGame();
        };
      }

      // Quitter la partie
      const leaveGame = document.getElementById('leaveGame');
      if (leaveGame) {
        leaveGame.onclick = () => {
          if (confirm('Quitter la partie ? Tu pourras la rejoindre plus tard avec le code.')) this.resetGame();
        };
      }

      // Votes
      document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.onclick = () => {
          const proposalId = btn.dataset.proposalId;
          const vote = btn.dataset.vote;
          this.submitVote(proposalId, vote);
        };
      });
    }
  }

  // Démarrer le jeu
  window.game = new Game();
</script>
</body>
</html>
